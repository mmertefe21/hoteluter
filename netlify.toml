[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Firebase web API key public olmak zorunda (frontend SDK gerektiriyor).
  # Domain restriction Firebase Console + Firestore rules ile sağlanıyor.
  # Netlify secrets scan'in yanlış-pozitif fail etmemesi için omit:
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
  # Smart-detection (AIza... pattern heuristic) OMIT_KEYS'ten bağımsız
  # çalışıyor ve Firebase web key'ini hâlâ "likely secret" sayıyordu.
  # Pattern-bazlı heuristic kapatılır; gerçek env-tabanlı scan açık kalır.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# SPA routing — tüm path'ler index.html'e
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache policy — assets uzun, HTML kısa
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
