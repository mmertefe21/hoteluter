const ReportsAralikTab = () => {
  const [start, setStart] = useState(addDays(todayISO(), -29));
  const [end, setEnd] = useState(todayISO());
  const ana = getAnaParaBirimi();

  const reservations = db.list('rezervasyonlar');
  const tahsilatlar = db.list('tahsilatlar');
  const odalar = db.list('odalar');
  const odaTipleri = db.list('odaTipleri');

  const reports = useMemo(() => {
    if (!start || !end || end < start) return null;
    const periodDays = diffDays(start, end) + 1;
    const totalRoomNights = odalar.length * periodDays;

    let dolu = 0;
    let odaGeliri = 0;
    const aktifDurumlar = ['onayli', 'giris-yapildi', 'cikis-yapildi'];
    reservations.forEach(r => {
      if (!aktifDurumlar.includes(r.durum)) return;
      let d = r.girisTarihi;
      while (d < r.cikisTarihi) {
        if (d >= start && d <= end) {
          dolu++;
          if (r.fiyatModu === 'detay' && Array.isArray(r.geceFiyatlari)) {
            const idx = diffDays(r.girisTarihi, d);
            odaGeliri += Number(r.geceFiyatlari[idx]) || Number(r.geceFiyati) || 0;
          } else {
            odaGeliri += Number(r.geceFiyati) || 0;
          }
        }
        d = addDays(d, 1);
      }
    });

    const ciro = tahsilatlar.filter(t => t.tarih >= start && t.tarih <= end).reduce((s,t) => s + Number(t.tutarAna != null ? t.tutarAna : t.tutar||0), 0);
    const dolulukOrani = totalRoomNights > 0 ? (dolu / totalRoomNights) * 100 : 0;
    const adr = dolu > 0 ? odaGeliri / dolu : 0;
    const revpar = totalRoomNights > 0 ? odaGeliri / totalRoomNights : 0;

    const tipBreakdown = odaTipleri.map(t => {
      const tipOdalar = odalar.filter(o => o.odaTipiId === t.id);
      const tipPotansiyel = tipOdalar.length * periodDays;
      let tipDolu = 0, tipGelir = 0;
      reservations.forEach(r => {
        if (!aktifDurumlar.includes(r.durum) || r.odaTipiId !== t.id) return;
        let d = r.girisTarihi;
        while (d < r.cikisTarihi) {
          if (d >= start && d <= end) {
            tipDolu++;
            if (r.fiyatModu === 'detay' && Array.isArray(r.geceFiyatlari)) {
              const idx = diffDays(r.girisTarihi, d);
              tipGelir += Number(r.geceFiyatlari[idx]) || Number(r.geceFiyati) || 0;
            } else {
              tipGelir += Number(r.geceFiyati) || 0;
            }
          }
          d = addDays(d, 1);
        }
      });
      return {
        tip: t,
        odaSayisi: tipOdalar.length,
        dolu: tipDolu,
        potansiyel: tipPotansiyel,
        doluluk: tipPotansiyel > 0 ? (tipDolu / tipPotansiyel) * 100 : 0,
        gelir: tipGelir,
        adr: tipDolu > 0 ? tipGelir / tipDolu : 0
      };
    });

    return { periodDays, totalRoomNights, dolu, odaGeliri, ciro, dolulukOrani, adr, revpar, tipBreakdown };
  }, [start, end, reservations.length, tahsilatlar.length]);

  return (
    <div className="space-y-4">
      <div className="htl-card">
        <div className="htl-card-header">
          <div className="flex gap-2 items-center flex-wrap">
            <label className="htl-label" style={{margin: 0}}>Tarih Aralığı:</label>
            <input type="date" className="htl-input" style={{maxWidth: 160}} value={start} onChange={e=>setStart(e.target.value)} />
            <span style={{color: 'var(--ink-faint)'}}>—</span>
            <input type="date" className="htl-input" style={{maxWidth: 160}} value={end} onChange={e=>setEnd(e.target.value)} />
            <button className="htl-btn htl-btn-ghost" onClick={() => { setStart(addDays(todayISO(),-6)); setEnd(todayISO()); }}>Son 7 Gün</button>
            <button className="htl-btn htl-btn-ghost" onClick={() => { setStart(addDays(todayISO(),-29)); setEnd(todayISO()); }}>Son 30 Gün</button>
            <button className="htl-btn htl-btn-ghost" onClick={() => { const d=new Date();d.setDate(1); setStart(d.toISOString().slice(0,10)); setEnd(todayISO()); }}>Bu Ay</button>
          </div>
        </div>
      </div>

      {!reports ? (
        <div className="htl-card htl-card-body htl-empty">Tarih aralığı geçersiz.</div>
      ) : (
        <>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="htl-stat">
              <div className="htl-stat-label">Doluluk Oranı</div>
              <div className="htl-stat-value">%{reports.dolulukOrani.toFixed(1)}</div>
              <div className="htl-stat-sub">{reports.dolu} / {reports.totalRoomNights} oda-gece</div>
            </div>
            <div className="htl-stat">
              <div className="htl-stat-label">Tahsilat (Ciro)</div>
              <div className="htl-stat-value" style={{fontSize: 24}}>{fmtMoney(reports.ciro, ana)}</div>
              <div className="htl-stat-sub">tarih aralığında</div>
            </div>
            <div className="htl-stat">
              <div className="htl-stat-label">ADR (Ort. Gece)</div>
              <div className="htl-stat-value" style={{fontSize: 24}}>{fmtMoney(reports.adr, ana)}</div>
              <div className="htl-stat-sub">dolu gece başına</div>
            </div>
            <div className="htl-stat">
              <div className="htl-stat-label">RevPAR</div>
              <div className="htl-stat-value" style={{fontSize: 24}}>{fmtMoney(reports.revpar, ana)}</div>
              <div className="htl-stat-sub">mevcut oda-gece başına</div>
            </div>
          </div>

          <div className="htl-card">
            <div className="htl-card-header">
              <div>
                <h3 className="font-display text-lg font-medium">Oda Tipi Dökümü</h3>
                <p className="text-xs" style={{color: 'var(--ink-soft)'}}>Oda tipine göre doluluk ve gelir</p>
              </div>
            </div>
            <div className="overflow-x-auto">
              <table className="htl-table">
                <thead><tr><th>Tip</th><th>Oda Sayısı</th><th>Dolu Gece</th><th>Doluluk</th><th className="text-right">Gelir</th><th className="text-right">ADR</th></tr></thead>
                <tbody>
                  {reports.tipBreakdown.map(b => (
                    <tr key={b.tip.id}>
                      <td>
                        <div className="flex items-center gap-2">
                          <div className="w-2 h-2 rounded-full" style={{background: b.tip.renk}}/>
                          <span className="font-medium">{b.tip.ad}</span>
                        </div>
                      </td>
                      <td>{b.odaSayisi}</td>
                      <td>{b.dolu} / {b.potansiyel}</td>
                      <td>
                        <div className="flex items-center gap-2">
                          <div className="flex-1 h-2 rounded-full" style={{background: 'var(--line-soft)', maxWidth: 120}}>
                            <div style={{width: `${b.doluluk}%`, height: '100%', background: b.tip.renk, borderRadius: 999}}/>
                          </div>
                          <span className="text-sm">%{b.doluluk.toFixed(1)}</span>
                        </div>
                      </td>
                      <td className="text-right font-medium">{fmtMoney(b.gelir, ana)}</td>
                      <td className="text-right">{fmtMoney(b.adr, ana)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div className="htl-card htl-card-body">
            <div className="text-xs" style={{color: 'var(--ink-soft)'}}>
              <strong>Hesaplama notları:</strong> Doluluk = aktif rezervasyon-gece / (oda sayısı × periyot gün); ADR = oda geliri / dolu gece; RevPAR = oda geliri / mevcut oda-gece. <strong>Ciro</strong> seçilen tarih aralığındaki tahsilatlardan, <strong>oda geliri</strong> ise rezervasyonun gece fiyatından hesaplanır.
            </div>
          </div>
        </>
      )}
    </div>
  );
};

/* ===== YILLIK CİRO TAB ===== */
const ReportsYillikTab = () => {
  const [yil, setYil] = useState(new Date().getFullYear());
  const ana = getAnaParaBirimi();

  const reservations = db.list('rezervasyonlar');
  const odalar = db.list('odalar');

  const yilStats = useMemo(() => {
    const yilBasIso = `${yil}-01-01`;
    const yilSonIso = `${yil}-12-31`;
    const aktifDurumlar = ['onayli', 'giris-yapildi', 'cikis-yapildi'];

    // Aylık döküm: 12 ay
    const aylar = Array.from({length: 12}, (_, i) => {
      const ayIlk = new Date(yil, i, 1);
      const aySon = new Date(yil, i + 1, 0);
      const ilkIso = ayIlk.toISOString().slice(0,10);
      const sonIso = aySon.toISOString().slice(0,10);
      const ayGunSayisi = aySon.getDate();
      const totalRoomNights = odalar.length * ayGunSayisi;
      let doluGece = 0, ciro = 0;

      reservations.forEach(r => {
        if (!aktifDurumlar.includes(r.durum)) return;
        let d = r.girisTarihi;
        while (d < r.cikisTarihi) {
          if (d >= ilkIso && d <= sonIso) {
            doluGece++;
            if (r.fiyatModu === 'detay' && Array.isArray(r.geceFiyatlari)) {
              const idx = diffDays(r.girisTarihi, d);
              ciro += Number(r.geceFiyatlari[idx]) || Number(r.geceFiyati) || 0;
            } else {
              ciro += Number(r.geceFiyati) || 0;
            }
          }
          d = addDays(d, 1);
        }
      });

      return {
        ay: i + 1,
        ad: ayIlk.toLocaleDateString('tr-TR', { month: 'long' }),
        kisaAd: ayIlk.toLocaleDateString('tr-TR', { month: 'short' }),
        ciro,
        doluGece,
        totalRoomNights,
        doluluk: totalRoomNights > 0 ? (doluGece / totalRoomNights) * 100 : 0,
        adr: doluGece > 0 ? ciro / doluGece : 0
      };
    });

    const toplamCiro = aylar.reduce((s,a) => s + a.ciro, 0);
    const toplamDoluGece = aylar.reduce((s,a) => s + a.doluGece, 0);
    const toplamPotansiyel = aylar.reduce((s,a) => s + a.totalRoomNights, 0);
    const yilDoluluk = toplamPotansiyel > 0 ? (toplamDoluGece / toplamPotansiyel) * 100 : 0;
    const yilADR = toplamDoluGece > 0 ? toplamCiro / toplamDoluGece : 0;
    const yilRevPAR = toplamPotansiyel > 0 ? toplamCiro / toplamPotansiyel : 0;
    const maxAyCiro = Math.max(...aylar.map(a => a.ciro), 1);

    return { aylar, toplamCiro, toplamDoluGece, toplamPotansiyel, yilDoluluk, yilADR, yilRevPAR, maxAyCiro };
  }, [yil, reservations.length, odalar.length]);

  const yilOpts = (() => {
    const cur = new Date().getFullYear();
    return [cur, cur-1, cur-2, cur-3, cur+1];
  })();

  // Bar chart için ölçeklendirme
  const chartHeight = 280;
  const chartPaddingTop = 30;
  const chartPaddingBottom = 50;
  const chartPlotHeight = chartHeight - chartPaddingTop - chartPaddingBottom;

  return (
    <div className="space-y-4">
      <div className="htl-card">
        <div className="htl-card-header">
          <div className="flex gap-2 items-center flex-wrap">
            <label className="htl-label" style={{margin: 0}}>Yıl:</label>
            <select className="htl-input" style={{maxWidth: 120}} value={yil} onChange={e => setYil(Number(e.target.value))}>
              {yilOpts.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
            <span className="text-xs" style={{color: 'var(--ink-soft)'}}>· Tüm rezervasyon durumları (iptal & no-show hariç)</span>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="htl-stat">
          <div className="htl-stat-label">Toplam Ciro</div>
          <div className="htl-stat-value" style={{fontSize: 24}}>{fmtMoney(yilStats.toplamCiro, ana)}</div>
          <div className="htl-stat-sub">{yil} yılı</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Doluluk (%)</div>
          <div className="htl-stat-value">%{yilStats.yilDoluluk.toFixed(2)}</div>
          <div className="htl-stat-sub">{yilStats.toplamDoluGece} / {yilStats.toplamPotansiyel} gece</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Ortalama Günlük (ADR)</div>
          <div className="htl-stat-value" style={{fontSize: 24}}>{fmtMoney(yilStats.yilADR, ana)}</div>
          <div className="htl-stat-sub">dolu gece başına</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">RevPAR</div>
          <div className="htl-stat-value" style={{fontSize: 24}}>{fmtMoney(yilStats.yilRevPAR, ana)}</div>
          <div className="htl-stat-sub">mevcut oda-gece başına</div>
        </div>
      </div>

      <div className="htl-card">
        <div className="htl-card-header">
          <h3 className="font-display text-lg font-medium">Yıllık Performans: Toplam Ciro</h3>
        </div>
        <div className="htl-card-body" style={{padding: '20px 24px'}}>
          {/* Bar chart - Custom SVG */}
          <div style={{width: '100%', overflowX: 'auto'}}>
            <svg viewBox={`0 0 1000 ${chartHeight}`} preserveAspectRatio="none" style={{width: '100%', minWidth: 700, height: chartHeight, display: 'block'}}>
              {/* Y-axis grid */}
              {[0, 0.25, 0.5, 0.75, 1].map(p => {
                const y = chartPaddingTop + chartPlotHeight * (1 - p);
                const value = yilStats.maxAyCiro * p;
                return (
                  <g key={p}>
                    <line x1="50" y1={y} x2="990" y2={y} stroke="var(--line-soft)" strokeWidth="1" strokeDasharray={p === 0 ? '' : '2,3'}/>
                    <text x="45" y={y+4} fontSize="10" fill="var(--ink-faint)" textAnchor="end">
                      {value >= 1000 ? `${(value/1000).toFixed(0)}k` : value.toFixed(0)}
                    </text>
                  </g>
                );
              })}
              {/* Bars */}
              {yilStats.aylar.map((a, i) => {
                const barWidth = 940 / 12 * 0.7;
                const barGap = 940 / 12;
                const x = 50 + barGap * i + (barGap - barWidth) / 2;
                const h = yilStats.maxAyCiro > 0 ? chartPlotHeight * (a.ciro / yilStats.maxAyCiro) : 0;
                const y = chartPaddingTop + chartPlotHeight - h;
                return (
                  <g key={i}>
                    {/* Bar */}
                    {a.ciro > 0 ? (
                      <rect x={x} y={y} width={barWidth} height={h} fill="var(--brass)" rx="2"/>
                    ) : (
                      <rect x={x} y={chartPaddingTop + chartPlotHeight - 1} width={barWidth} height="1" fill="var(--line)"/>
                    )}
                    {/* Üste değer yazısı */}
                    {a.ciro > 0 && h > 14 && (
                      <text x={x + barWidth/2} y={y + 13} fontSize="10" fill="white" textAnchor="middle" fontWeight="500">
                        {a.ciro >= 1000 ? `${(a.ciro/1000).toFixed(1)}k` : a.ciro.toFixed(0)}
                      </text>
                    )}
                    {a.ciro > 0 && h <= 14 && (
                      <text x={x + barWidth/2} y={y - 4} fontSize="10" fill="var(--ink)" textAnchor="middle">
                        {a.ciro >= 1000 ? `${(a.ciro/1000).toFixed(1)}k` : a.ciro.toFixed(0)}
                      </text>
                    )}
                    {/* Ay etiketi */}
                    <text x={x + barWidth/2} y={chartPaddingTop + chartPlotHeight + 18} fontSize="11" fill="var(--ink-soft)" textAnchor="middle">
                      {a.kisaAd}
                    </text>
                  </g>
                );
              })}
              {/* X-axis */}
              <line x1="50" y1={chartPaddingTop + chartPlotHeight} x2="990" y2={chartPaddingTop + chartPlotHeight} stroke="var(--ink-soft)" strokeWidth="1"/>
            </svg>
          </div>
        </div>
        <div className="overflow-x-auto" style={{borderTop: '1px solid var(--line-soft)'}}>
          <table className="htl-table">
            <thead>
              <tr>
                <th>Ay</th>
                <th className="text-right">Ciro</th>
                <th className="text-right">Dolu Gece</th>
                <th className="text-right">Doluluk</th>
                <th className="text-right">ADR</th>
              </tr>
            </thead>
            <tbody>
              {yilStats.aylar.map(a => (
                <tr key={a.ay}>
                  <td className="font-medium">{a.ad}</td>
                  <td className="text-right">{fmtMoney(a.ciro, ana)}</td>
                  <td className="text-right">{a.doluGece}</td>
                  <td className="text-right">%{a.doluluk.toFixed(1)}</td>
                  <td className="text-right">{a.adr > 0 ? fmtMoney(a.adr, ana) : '—'}</td>
                </tr>
              ))}
              <tr style={{background: 'var(--bone-warm)', fontWeight: 600}}>
                <td>Yıl Toplamı</td>
                <td className="text-right">{fmtMoney(yilStats.toplamCiro, ana)}</td>
                <td className="text-right">{yilStats.toplamDoluGece}</td>
                <td className="text-right">%{yilStats.yilDoluluk.toFixed(1)}</td>
                <td className="text-right">{fmtMoney(yilStats.yilADR, ana)}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div className="htl-card-body">
          <div className="text-xs" style={{color: 'var(--ink-soft)'}}>
            <strong>Not:</strong> Aylık ciro rezervasyonların gece fiyatlarından hesaplanır (gece-bazında fiyat varsa o, yoksa standart gece fiyatı). Tahsilat değil, <strong>tahakkuk</strong> bazlıdır — yani o ayda konaklanan gece için faturalanan tutar. Doluluk = (dolu gece) / (oda sayısı × ay günü).
          </div>
        </div>
      </div>
    </div>
  );
};

/* ========================================================================
   PAGE: USERS (sadece superadmin)
   ======================================================================== */
const UsersPage = ({ embedded = false }) => {
  const { user: currentUser, refreshUser } = useAuth();
  const { show } = useToast();
  const [refreshKey, setRefreshKey] = useState(0);
  const refresh = () => setRefreshKey(k => k+1);
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);

  if (currentUser.rol !== 'superadmin') {
    return <div className={embedded ? "htl-empty" : "htl-card htl-card-body htl-empty"}>Bu sayfayı görüntülemek için yetkiniz yok (sadece süperadmin).</div>;
  }

  const users = db.list('users');

  const FormModal = () => {
    const target = editing;
    const [form, setForm] = useState({});
    useEffect(() => {
      if (target) {
        setForm({ ...target });
      } else {
        setForm({
          kullaniciAdi: '', sifre: '', adSoyad: '', email: '',
          rol: 'user', aktif: true, permissions: buildDefaultPermissions(false)
        });
      }
    }, [target, creating]);

    const togglePerm = (modKey, action) => {
      setForm(f => ({
        ...f,
        permissions: {
          ...f.permissions,
          [modKey]: { ...(f.permissions?.[modKey]||{}), [action]: !(f.permissions?.[modKey]?.[action]) }
        }
      }));
    };

    const save = () => {
      if (!form.kullaniciAdi) return show('Kullanıcı adı zorunlu.', 'error');
      if (!form.adSoyad) return show('Ad soyad zorunlu.', 'error');
      if (!target && !form.sifre) return show('Yeni kullanıcı için şifre zorunlu.', 'error');

      const existing = users.find(u => u.kullaniciAdi === form.kullaniciAdi && u.id !== target?.id);
      if (existing) return show('Bu kullanıcı adı zaten alınmış.', 'error');

      const payload = { ...form };
      if (form.rol === 'superadmin') payload.permissions = buildDefaultPermissions(true);
      // şifreyi boşken update'te bozmamak için
      if (target && !form.sifre) payload.sifre = target.sifre;

      if (target) { db.update('users', target.id, payload); show('Kullanıcı güncellendi.'); if (target.id === currentUser.id) refreshUser(); }
      else { db.add('users', { ...payload, olusturmaTarihi: new Date().toISOString() }); show('Kullanıcı eklendi.'); }
      refresh();
      setCreating(false); setEditing(null);
    };

    const isSuper = form.rol === 'superadmin';

    return (
      <Modal open={creating || !!editing} onClose={() => { setCreating(false); setEditing(null); }}
        title={target ? 'Kullanıcıyı Düzenle' : 'Yeni Kullanıcı'} size="lg"
        footer={<>
          <button className="htl-btn htl-btn-ghost" onClick={() => { setCreating(false); setEditing(null); }}>Vazgeç</button>
          <button className="htl-btn htl-btn-primary" onClick={save}><Icon name="save" size={16}/>Kaydet</button>
        </>}>
        <div className="grid md:grid-cols-2 gap-4 mb-6">
          <div><label className="htl-label">Ad Soyad *</label><input className="htl-input" value={form.adSoyad||''} onChange={e=>setForm({...form, adSoyad:e.target.value})}/></div>
          <div><label className="htl-label">E-posta</label><input className="htl-input" type="email" value={form.email||''} onChange={e=>setForm({...form, email:e.target.value})}/></div>
          <div><label className="htl-label">Kullanıcı Adı *</label><input className="htl-input" value={form.kullaniciAdi||''} onChange={e=>setForm({...form, kullaniciAdi:e.target.value})}/></div>
          <div><label className="htl-label">Şifre {target ? '(boş bırakırsanız değişmez)' : '*'}</label><input className="htl-input" type="text" value={form.sifre||''} onChange={e=>setForm({...form, sifre:e.target.value})}/></div>
          <div><label className="htl-label">Rol</label>
            <select className="htl-input" value={form.rol||'user'} onChange={e=>setForm({...form, rol:e.target.value})}>
              <option value="user">Kullanıcı</option>
              <option value="superadmin">Süperadmin</option>
            </select>
          </div>
          <div className="flex items-center gap-3">
            <label className="htl-label" style={{margin: 0}}>Aktif</label>
            <div className={`htl-switch ${form.aktif ? 'on' : ''}`} onClick={() => setForm({...form, aktif: !form.aktif})}/>
          </div>
        </div>

        <div>
          <h4 className="font-display text-lg font-medium mb-1" style={{color: 'var(--forest)'}}>Modül Yetkileri</h4>
          <p className="text-xs mb-4" style={{color: 'var(--ink-soft)'}}>
            {isSuper ? 'Süperadmin tüm yetkilere sahiptir, ayar gerekmez.' : 'Bu kullanıcının erişebileceği modülleri ve yapabileceği işlemleri seçin.'}
          </p>
          {isSuper ? (
            <div className="px-4 py-3 rounded-md flex items-center gap-2" style={{background: 'var(--brass-soft)', color: 'var(--forest)'}}>
              <Icon name="shield-check" size={18}/>
              <span className="text-sm">Bu rol tüm modüllere erişebilir.</span>
            </div>
          ) : (
            <div className="rounded-lg overflow-hidden" style={{border: '1px solid var(--line)'}}>
              <table className="htl-table">
                <thead><tr><th>Modül</th><th className="text-center">Görüntüle</th><th className="text-center">Ekle</th><th className="text-center">Düzenle</th><th className="text-center">Sil</th></tr></thead>
                <tbody>
                  {ALL_MODULES.filter(m => !m.superadminOnly).map(mod => (
                    <tr key={mod.key}>
                      <td className="font-medium">
                        <div className="flex items-center gap-2"><Icon name={mod.icon} size={16}/>{mod.label}</div>
                      </td>
                      {['goruntule','ekle','duzenle','sil'].map(act => {
                        const has = mod.actions.includes(act);
                        if (!has) return <td key={act} className="text-center" style={{color: 'var(--ink-faint)'}}>—</td>;
                        const checked = !!(form.permissions?.[mod.key]?.[act]);
                        return (
                          <td key={act} className="text-center">
                            <input type="checkbox" checked={checked} onChange={() => togglePerm(mod.key, act)}
                              style={{width: 18, height: 18, accentColor: 'var(--forest)'}} />
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </Modal>
    );
  };

  const tableContent = (
    <div className="overflow-x-auto">
      <table className="htl-table">
        <thead><tr><th>Ad Soyad</th><th>Kullanıcı Adı</th><th>Rol</th><th>Durum</th><th>E-posta</th><th></th></tr></thead>
        <tbody>
          {users.map(u => (
            <tr key={u.id}>
              <td>
                <div className="flex items-center gap-2">
                  <div className="htl-avatar" style={{width: 28, height: 28, fontSize: 11}}>{initials(u.adSoyad)}</div>
                  <span className="font-medium">{u.adSoyad}</span>
                  {u.id === currentUser.id && <span className="htl-badge htl-badge-info">Siz</span>}
                </div>
              </td>
              <td className="font-mono text-xs">{u.kullaniciAdi}</td>
              <td>
                {u.rol === 'superadmin'
                  ? <span className="htl-badge htl-badge-warn">Süperadmin</span>
                  : <span className="htl-badge htl-badge-neutral">Kullanıcı</span>}
              </td>
              <td>
                {u.aktif
                  ? <span className="htl-badge htl-badge-success">Aktif</span>
                  : <span className="htl-badge htl-badge-danger">Pasif</span>}
              </td>
              <td>{u.email || '-'}</td>
              <td>
                <div className="flex justify-end gap-1">
                  <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setEditing(u)}><Icon name="pencil" size={14} stroke="var(--ink-soft)" /></button>
                  {u.id !== currentUser.id && (
                    <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setConfirmDel(u)}><Icon name="trash-2" size={14} stroke="var(--danger)" /></button>
                  )}
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <>
      {embedded ? (
        <>
          <div className="flex items-start justify-between mb-4 flex-wrap gap-2">
            <div>
              <h4 className="font-display text-lg font-medium" style={{color: 'var(--forest)'}}>Kullanıcılar</h4>
              <p className="text-sm" style={{color: 'var(--ink-soft)'}}>Sistem kullanıcıları ve yetkileri.</p>
            </div>
            <button className="htl-btn htl-btn-primary" onClick={() => setCreating(true)}>
              <Icon name="plus" size={16}/>Yeni Kullanıcı
            </button>
          </div>
          <div className="rounded-lg overflow-hidden" style={{border: '1px solid var(--line-soft)'}}>
            {tableContent}
          </div>
        </>
      ) : (
        <ListPageShell onAdd={() => setCreating(true)} canAdd={true} addLabel="Yeni Kullanıcı">
          {tableContent}
        </ListPageShell>
      )}
      <FormModal />
      <ConfirmModal open={!!confirmDel} title="Kullanıcı Sil"
        msg={`"${confirmDel?.adSoyad}" kullanıcısını silmek istediğinize emin misiniz?`}
        onConfirm={() => { db.delete('users', confirmDel.id); setConfirmDel(null); refresh(); show('Kullanıcı silindi.'); }}
        onCancel={() => setConfirmDel(null)} />
    </>
  );
};

const SettingsPage = () => {

  const [kurFetching, setKurFetching] = useState(false);
  const [manuelKurForm, setManuelKurForm] = useState(null);

  const canEdit = can('ayarlar', 'duzenle');
  const aktifKurlar = useMemo(() => getActiveKurlar(), [kurlarRefresh]);
  const ana = otel.anaParaBirimi || 'EUR';

  const saveOtel = () => {
    db.setOtel(otel);
    show('Otel bilgileri kaydedildi.');
  };

  const resetData = () => {
    if (!confirm('TÜM veriler silinecek ve demo veriler tekrar yüklenecek. Emin misiniz?')) return;
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem('hoteluter_session');
    localStorage.removeItem(KUR_CACHE_KEY);
    localStorage.removeItem('hoteluter_manuel_kurlar');
    window.location.reload();
  };

  const guncelleKurlari = async () => {
    setKurFetching(true);
    const data = await fetchKurlar();
    setKurFetching(false);
    if (data) { setKurlarRefresh(k => k+1); show('Kurlar güncellendi.'); }
    else { show('Kurlar çekilemedi. İnternet bağlantınızı kontrol edin veya manuel kur girin.', 'error'); }
  };

  const baslatManuelKur = () => {
    const baseRates = aktifKurlar?.rates || { EUR: 1, USD: 1.08, TRY: 38, GBP: 0.84 };
    setManuelKurForm({
      EUR: baseRates.EUR || 1,
      USD: baseRates.USD || '',
      TRY: baseRates.TRY || '',
      GBP: baseRates.GBP || ''
    });
  };

  const kaydetManuelKur = () => {
    const rates = {
      EUR: 1,
      USD: Number(manuelKurForm.USD) || 0,
      TRY: Number(manuelKurForm.TRY) || 0,
      GBP: Number(manuelKurForm.GBP) || 0
    };
    if (!rates.USD || !rates.TRY || !rates.GBP) {
      return show('Tüm kurlar 0\'dan büyük olmalı.', 'error');
    }
    setManuelKurlar({
      base: 'EUR', rates,
      date: todayISO(),
      fetchedAt: new Date().toISOString(),
      source: 'Manuel'
    });
    setKurlarRefresh(k => k+1);
    setManuelKurForm(null);
    show('Manuel kurlar kaydedildi.');
  };

  const kaldirManuelKur = () => {
    clearManuelKurlar();
    setKurlarRefresh(k => k+1);
    show('Manuel kurlar kaldırıldı, canlı kur kullanılacak.');
  };

  return (
    <div className="space-y-4">
      <div className="htl-card">
        <div className="htl-card-header" style={{paddingBottom: 0, borderBottom: 'none'}}>
          <div className="flex gap-1 -mb-[1px]" style={{borderBottom: '1px solid var(--line-soft)', flex: 1, flexWrap: 'wrap'}}>
            <div className={`htl-tab ${tab==='otel'?'active':''}`} onClick={()=>setTab('otel')}>Otel Bilgileri</div>
            <div className={`htl-tab ${tab==='paraBirimi'?'active':''}`} onClick={()=>setTab('paraBirimi')}>Para Birimi & Kur</div>
            <div className={`htl-tab ${tab==='kanallar'?'active':''}`} onClick={()=>setTab('kanallar')}>Kanallar</div>
            <div className={`htl-tab ${tab==='giderKategori'?'active':''}`} onClick={()=>setTab('giderKategori')}>Gider Kategorileri</div>
            <div className={`htl-tab ${tab==='kullanicilar'?'active':''}`} onClick={()=>setTab('kullanicilar')}>Kullanıcılar</div>
            <div className={`htl-tab ${tab==='sistem'?'active':''}`} onClick={()=>setTab('sistem')}>Sistem</div>
          </div>
        </div>

        {tab === 'otel' && (
          <div className="htl-card-body">
            <div className="grid md:grid-cols-2 gap-4">
              <div><label className="htl-label">Otel Adı</label><input className="htl-input" disabled={!canEdit} value={otel.ad||''} onChange={e=>setOtel({...otel, ad:e.target.value})}/></div>
              <div><label className="htl-label">Yıldız Sayısı</label><input type="number" min="1" max="5" className="htl-input" disabled={!canEdit} value={otel.yildizSayisi||0} onChange={e=>setOtel({...otel, yildizSayisi:Number(e.target.value)})}/></div>
              <div className="md:col-span-2"><label className="htl-label">Adres</label><input className="htl-input" disabled={!canEdit} value={otel.adres||''} onChange={e=>setOtel({...otel, adres:e.target.value})}/></div>
              <div><label className="htl-label">Telefon</label><input className="htl-input" disabled={!canEdit} value={otel.telefon||''} onChange={e=>setOtel({...otel, telefon:e.target.value})}/></div>
              <div><label className="htl-label">E-posta</label><input className="htl-input" disabled={!canEdit} value={otel.email||''} onChange={e=>setOtel({...otel, email:e.target.value})}/></div>
              <div><label className="htl-label">Vergi No</label><input className="htl-input" disabled={!canEdit} value={otel.vergiNo||''} onChange={e=>setOtel({...otel, vergiNo:e.target.value})}/></div>
            </div>
            {canEdit && (
              <div className="mt-6 flex justify-end">
                <button className="htl-btn htl-btn-primary" onClick={saveOtel}><Icon name="save" size={16}/>Kaydet</button>
              </div>
            )}
          </div>
        )}

        {tab === 'paraBirimi' && (
          <div className="htl-card-body space-y-6">
            <div>
              <h4 className="font-display text-lg font-medium mb-1" style={{color: 'var(--forest)'}}>Otelin Ana Para Birimi</h4>
              <p className="text-sm mb-3" style={{color: 'var(--ink-soft)'}}>
                Tüm raporlar, hesap bakiyeleri ve rezervasyon tutarları bu para biriminde tutulur. Farklı para biriminde alınan ödemeler kur ile bu birime çevrilir.
              </p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2 max-w-2xl">
                {PARA_BIRIMI_OPTS.map(p => (
                  <button key={p.v} type="button" onClick={() => canEdit && setOtel({...otel, anaParaBirimi: p.v})}
                    disabled={!canEdit}
                    className="px-4 py-3 rounded-lg flex flex-col items-center gap-1 transition"
                    style={{
                      background: ana === p.v ? 'var(--forest)' : 'var(--bone-warm)',
                      color: ana === p.v ? 'var(--bone-light)' : 'var(--ink)',
                      border: `1px solid ${ana === p.v ? 'var(--forest)' : 'var(--line-soft)'}`,
                      cursor: canEdit ? 'pointer' : 'not-allowed'
                    }}>
                    <div className="font-display text-2xl font-medium">{p.symbol}</div>
                    <div className="text-xs">{p.l}</div>
                  </button>
                ))}
              </div>
              {canEdit && (
                <div className="mt-3">
                  <button className="htl-btn htl-btn-primary" onClick={saveOtel}>
                    <Icon name="save" size={16}/>Kaydet
                  </button>
                </div>
              )}
            </div>

            <div className="pt-6" style={{borderTop: '1px solid var(--line-soft)'}}>
              <div className="flex items-start justify-between gap-3 mb-3 flex-wrap">
                <div>
                  <h4 className="font-display text-lg font-medium" style={{color: 'var(--forest)'}}>Döviz Kurları</h4>
                  <p className="text-sm" style={{color: 'var(--ink-soft)'}}>
                    Otomatik kurlar Avrupa Merkez Bankası (ECB) verilerinden alınır. Manuel kur da girebilirsiniz.
                  </p>
                </div>
                <div className="flex gap-2 flex-wrap">
                  <button className="htl-btn htl-btn-ghost" onClick={guncelleKurlari} disabled={kurFetching}>
                    {kurFetching ? <Icon name="loader-2" size={16} className="animate-spin"/> : <Icon name="refresh-cw" size={16}/>}
                    <span>Canlı Kuru Güncelle</span>
                  </button>
                  {canEdit && !manuelKurForm && (
                    <button className="htl-btn htl-btn-primary" onClick={baslatManuelKur}>
                      <Icon name="edit-3" size={16}/>Manuel Kur Gir
                    </button>
                  )}
                </div>
              </div>

              {/* Mevcut kur durumu */}
              {aktifKurlar ? (
                <div className="rounded-lg p-4 mb-3" style={{background: aktifKurlar.isManual ? 'var(--brass-soft)' : 'var(--info-soft)', border: `1px solid ${aktifKurlar.isManual ? 'var(--brass-light)' : 'var(--info)'}`}}>
                  <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
                    <div className="flex items-center gap-2">
                      <Icon name={aktifKurlar.isManual ? 'edit-3' : 'globe'} size={18} stroke={aktifKurlar.isManual ? 'var(--brass)' : 'var(--info)'}/>
                      <span className="font-medium">
                        {aktifKurlar.isManual ? 'Manuel Kur Aktif' : `Canlı Kur · ${aktifKurlar.date}`}
                      </span>
                      {aktifKurlar.isStale && !aktifKurlar.isManual && (
                        <span className="htl-badge htl-badge-warn">12 saatten eski</span>
                      )}
                    </div>
                    <div className="text-xs" style={{color: 'var(--ink-soft)'}}>{aktifKurlar.source}</div>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    {PARA_BIRIMI_OPTS.map(p => {
                      const oneInPB = cevirKur(1, p.v, ana, aktifKurlar);
                      return (
                        <div key={p.v} className="rounded-md p-2" style={{background: 'rgba(255,255,255,.5)'}}>
                          <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>1 {p.symbol} {p.v}</div>
                          <div className="font-display text-base font-medium mt-0.5">
                            {oneInPB ? oneInPB.toFixed(4) : '—'} {ana}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {aktifKurlar.isManual && canEdit && (
                    <button className="htl-btn htl-btn-ghost mt-3" onClick={kaldirManuelKur}>
                      <Icon name="x" size={14}/>Manuel Kuru Kaldır (Canlı Kura Dön)
                    </button>
                  )}
                </div>
              ) : (
                <div className="rounded-lg p-4 mb-3 flex items-center gap-2" style={{background: 'var(--warn-soft)', color: 'var(--warn)'}}>
                  <Icon name="alert-triangle" size={18}/>
                  <span className="text-sm">Kur bilgisi yok. "Canlı Kuru Güncelle" deneyin veya manuel kur girin.</span>
                </div>
              )}

              {/* Manuel kur formu */}
              {manuelKurForm && (
                <div className="rounded-lg p-4" style={{background: 'var(--bone-warm)', border: '1px solid var(--line)'}}>
                  <h5 className="font-medium mb-2">Manuel Kur Tablosu (1 birim → EUR cinsinden)</h5>
                  <p className="text-xs mb-3" style={{color: 'var(--ink-soft)'}}>
                    Tüm kurları 1 EUR baz alınarak girin. Örnek: 1 USD = 0.92 EUR yazın.<br/>
                    Tahsilat ekleme sırasında sistem bu kurları kullanarak ana para birimine çevirecek.
                  </p>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div><label className="htl-label">EUR (sabit)</label><input className="htl-input" value="1" disabled style={{background: 'var(--bone)'}}/></div>
                    <div><label className="htl-label">1 USD = ? EUR</label><input type="number" step="0.0001" className="htl-input" value={manuelKurForm.USD||''} onChange={e=>setManuelKurForm({...manuelKurForm, USD:e.target.value})}/></div>
                    <div><label className="htl-label">1 TRY = ? EUR</label><input type="number" step="0.0001" className="htl-input" value={manuelKurForm.TRY||''} onChange={e=>setManuelKurForm({...manuelKurForm, TRY:e.target.value})}/></div>
                    <div><label className="htl-label">1 GBP = ? EUR</label><input type="number" step="0.0001" className="htl-input" value={manuelKurForm.GBP||''} onChange={e=>setManuelKurForm({...manuelKurForm, GBP:e.target.value})}/></div>
                  </div>
                  <div className="text-xs mt-2 mb-3" style={{color: 'var(--ink-soft)'}}>
                    💡 Bizim sistem aslında ters yönde tutuyor: 1 EUR = X başka birim. Yukarıda girdiğiniz değerler otomatik tersine çevrilecek. (1 USD = 0.92 EUR ↔ 1 EUR = 1.087 USD)
                  </div>
                  <div className="flex justify-end gap-2 mt-3">
                    <button className="htl-btn htl-btn-ghost" onClick={() => setManuelKurForm(null)}>Vazgeç</button>
                    <button className="htl-btn htl-btn-primary" onClick={() => {
                      // 1 USD → EUR girilmiş, biz EUR base tutuyoruz: rates[USD] = 1 / (1 USD'nin EUR karşılığı)
                      const rates = {
                        EUR: 1,
                        USD: 1 / (Number(manuelKurForm.USD) || 1),
                        TRY: 1 / (Number(manuelKurForm.TRY) || 1),
                        GBP: 1 / (Number(manuelKurForm.GBP) || 1)
                      };
                      if (!Number(manuelKurForm.USD) || !Number(manuelKurForm.TRY) || !Number(manuelKurForm.GBP)) {
                        return show('Tüm kurlar 0\'dan büyük olmalı.', 'error');
                      }
                      setManuelKurlar({ base: 'EUR', rates, date: todayISO(), fetchedAt: new Date().toISOString(), source: 'Manuel' });
                      setKurlarRefresh(k => k+1);
                      setManuelKurForm(null);
                      show('Manuel kurlar kaydedildi.');
                    }}>
                      <Icon name="save" size={16}/>Kaydet
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {tab === 'kanallar' && (
          <div className="htl-card-body">
            <KanallarSettings canEdit={canEdit} />
          </div>
        )}

        {tab === 'giderKategori' && (
          <div className="htl-card-body">
            <GiderKategoriSettings canEdit={canEdit} />
          </div>
        )}

        {tab === 'kullanicilar' && (
          <div className="htl-card-body">
            <UsersPage embedded={true} />
          </div>
        )}

        {tab === 'sistem' && (
          <div className="htl-card-body space-y-4">
            <div>
              <h4 className="font-display text-lg font-medium mb-1" style={{color: 'var(--forest)'}}>Veri Yönetimi</h4>
              <p className="text-sm mb-3" style={{color: 'var(--ink-soft)'}}>
                Veriler tarayıcınızın yerel hafızasında (localStorage) tutulur.
              </p>
              <button className="htl-btn htl-btn-danger" onClick={resetData}>
                <Icon name="trash-2" size={16}/>Verileri Sıfırla & Demo Yükle
              </button>
            </div>
            <div className="pt-4" style={{borderTop: '1px solid var(--line-soft)'}}>
              <h4 className="font-display text-lg font-medium mb-1" style={{color: 'var(--forest)'}}>Sürüm Bilgisi</h4>
              <div className="text-sm" style={{color: 'var(--ink-soft)'}}>
                <div>Hoteluter <strong>v0.7</strong> · Rezervasyon Bölme (Split), Toplam Ciro Stat</div>
                <div>Domain: hoteluter.com (lokalde test)</div>
                <div>Veri katmanı: localStorage</div>
                <div>Kur kaynağı: api.frankfurter.app (ECB)</div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ========================================================================
   APP ROOT
   ======================================================================== */
const PAGES = {
  dashboard:    DashboardPage,
  rezervasyon:  CalendarPage,
  rezervasyonListe: ReservationListPage,
  misafirler:   GuestsPage,
  odalar:       RoomsPage,
  odaTipleri:   RoomTypesPage,
  onMuhasebe:   AccountingPage,
  raporlar:     ReportsPage,
  kullanicilar: UsersPage,
  ayarlar:      SettingsPage
};

const ReservationDualView = () => {
  const [view, setView] = useState('takvim');
  return (
    <div className="space-y-4">
      <div className="flex gap-1 inline-flex p-1 rounded-lg" style={{background: 'var(--bone-warm)', width: 'fit-content'}}>
        <button className={`px-4 py-2 rounded-md text-sm font-medium transition ${view==='takvim' ? '' : ''}`}
          style={{background: view==='takvim' ? 'var(--bone-light)' : 'transparent', color: view==='takvim' ? 'var(--forest)' : 'var(--ink-soft)', boxShadow: view==='takvim' ? '0 1px 3px rgba(0,0,0,.08)' : 'none'}}
          onClick={() => setView('takvim')}>
          <Icon name="calendar-days" size={14} className="inline mr-1.5"/>Takvim
        </button>
        <button className={`px-4 py-2 rounded-md text-sm font-medium transition`}
          style={{background: view==='liste' ? 'var(--bone-light)' : 'transparent', color: view==='liste' ? 'var(--forest)' : 'var(--ink-soft)', boxShadow: view==='liste' ? '0 1px 3px rgba(0,0,0,.08)' : 'none'}}
          onClick={() => setView('liste')}>
          <Icon name="list" size={14} className="inline mr-1.5"/>Liste
        </button>
      </div>
      {view === 'takvim' ? <CalendarPage /> : <ReservationListPage />}
    </div>
  );
};

const AppShell = () => {
  const { user, can } = useAuth();
  const [activeModule, setActiveModule] = useState('dashboard');

  // İlk açılışta erişilebilir ilk modülü seç
  useEffect(() => {
    if (!user) return;  // Login öncesi user null olabilir
    if (!can(activeModule, 'goruntule')) {
      const first = ALL_MODULES.find(m => {
        if (m.hideFromSidebar) return false;
        if (m.superadminOnly && user.rol !== 'superadmin') return false;
        return can(m.key, 'goruntule');
      });
      if (first) setActiveModule(first.key);
    }
  }, [user]);

  if (!user) return <LoginScreen />;

  let PageComp = PAGES[activeModule];
  if (activeModule === 'rezervasyon') PageComp = ReservationDualView;

  return (
    <Layout activeModule={activeModule} setActiveModule={setActiveModule}>
      {PageComp ? <PageComp /> : <div className="htl-empty">Sayfa bulunamadı.</div>}
    </Layout>
  );
};

const App = () => {
  const [ready, setReady] = useState(false);
  useEffect(() => {
    seedIfEmpty();
    migrateHesaplarV02();
    migrateParaBirimiV03();
    migrateHesapParaBirimiV04();
    migrateKanalveGiderKategorileriV05();
    setReady(true);
    // Initial loader'ı kaldır
    const loader = document.getElementById('initial-loader');
    if (loader) loader.remove();
    // Kurları arka planda çek (cache'de yoksa veya 12 saatten eskiyse)
    const cache = getKurlar();
    if (!cache || cache.isStale) {
      fetchKurlar().then(d => {
        if (d) console.log('Kurlar güncellendi:', d.date);
      });
    }
  }, []);
  if (!ready) return null;
  return (
    <AuthProvider>
      <ToastProvider>
        <AppShell />
      </ToastProvider>
    </AuthProvider>
  );
};

try {
  // İlk önce loader'ı temizle ki #root div'i React için temiz olsun
  var rootEl = document.getElementById('root');
  rootEl.innerHTML = '';
  const root = ReactDOM.createRoot(rootEl);
  root.render(<App />);
  window.__htlAddLog && window.__htlAddLog('info', '✓ React root.render() çağrıldı');
} catch (e) {
  window.__htlAddLog && window.__htlAddLog('ERROR', 'React render hatası: ' + (e.stack || e.message));
  var s = document.getElementById('htl-status');
  if (s) { s.textContent = '⚠️ React mount edilemedi: ' + e.message; s.style.color = '#a64545'; }
  var dbg = document.getElementById('htl-debug-wrap');
  if (dbg) dbg.style.display = 'block';
  throw e;
}
</script>
</body>
