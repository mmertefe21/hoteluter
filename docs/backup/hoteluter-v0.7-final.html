const DashboardPage = () => {
  const today = todayISO();
  const reservations = db.list('rezervasyonlar');
  const odalar = db.list('odalar');
  const misafirler = db.list('misafirler');
  const tahsilatlar = db.list('tahsilatlar');
  const ana = getAnaParaBirimi();

  // Ay seçici state'i — varsayılan içinde olduğumuz ay
  const [selectedMonth, setSelectedMonth] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });

  const bugunGiris = reservations.filter(r => r.girisTarihi === today && r.durum !== 'iptal' && r.durum !== 'no-show');
  const bugunCikis = reservations.filter(r => r.cikisTarihi === today && r.durum !== 'iptal' && r.durum !== 'no-show');
  const gemide = reservations.filter(r => r.durum === 'giris-yapildi' || (r.girisTarihi <= today && r.cikisTarihi > today && r.durum === 'onayli'));
  const dolulukOrani = odalar.length > 0 ? Math.round((gemide.length / odalar.length) * 100) : 0;
  const musait = odalar.length - gemide.length;

  // Tahsilatlarda tutarAna kullan (multi-currency uyumu için)
  const sumTutarAna = (filterFn) => tahsilatlar.filter(filterFn).reduce((s,t) => s + Number(t.tutarAna != null ? t.tutarAna : t.tutar||0), 0);
  const bugunTahsilat = sumTutarAna(t => t.tarih === today);

  // Bu ayın cirosu (ana para biriminde)
  const ayBaslangic = new Date(); ayBaslangic.setDate(1); ayBaslangic.setHours(0,0,0,0);
  const ayBasIso = ayBaslangic.toISOString().slice(0,10);
  const buAyTahsilat = sumTutarAna(t => t.tarih >= ayBasIso);

  /* ===== "Bu Ayın İstatistikleri" Paneli (selectedMonth bazlı) ===== */
  const monthStats = useMemo(() => {
    const [yyy, mm] = selectedMonth.split('-').map(Number);
    if (!yyy || !mm) return null;
    const ayIlk = new Date(yyy, mm - 1, 1);
    const aySon = new Date(yyy, mm, 0); // ayın son günü
    const ilkIso = ayIlk.toISOString().slice(0,10);
    const sonIso = aySon.toISOString().slice(0,10);
    const ayGunSayisi = aySon.getDate();
    const totalRoomNights = odalar.length * ayGunSayisi;

    // O aya değen rezervasyonlar (girisi <= ay sonu, cikisi > ay başı)
    const aktifDurumlar = ['onayli', 'giris-yapildi', 'cikis-yapildi'];
    const ilgili = reservations.filter(r =>
      aktifDurumlar.includes(r.durum) &&
      r.girisTarihi <= sonIso &&
      r.cikisTarihi > ilkIso
    );

    // Toplam dolu gece (ay içine düşen geceler)
    let doluGece = 0;
    let odaGeliri = 0;
    ilgili.forEach(r => {
      let d = r.girisTarihi;
      while (d < r.cikisTarihi) {
        if (d >= ilkIso && d <= sonIso) {
          doluGece++;
          // Detay modu varsa o gecenin fiyatı, yoksa ortalama gece fiyatı
          if (r.fiyatModu === 'detay' && Array.isArray(r.geceFiyatlari)) {
            const idx = diffDays(r.girisTarihi, d);
            const gf = r.geceFiyatlari[idx];
            odaGeliri += Number(gf) || Number(r.geceFiyati) || 0;
          } else {
            odaGeliri += Number(r.geceFiyati) || 0;
          }
        }
        d = addDays(d, 1);
      }
    });

    const dolulukYuzde = totalRoomNights > 0 ? (doluGece / totalRoomNights) * 100 : 0;
    const adr = doluGece > 0 ? odaGeliri / doluGece : 0;
    const rezSayisi = ilgili.length;
    const ayLabel = ayIlk.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' });

    return { dolulukYuzde, rezSayisi, doluGece, totalRoomNights, adr, odaGeliri, ayLabel };
  }, [selectedMonth, reservations.length, odalar.length]);

  const renderRezRow = (r) => {
    const m = misafirler.find(x => x.id === r.anaMisafirId);
    const oda = odalar.find(x => x.id === r.odaId);
    return (
      <tr key={r.id}>
        <td className="font-medium">{m ? `${m.ad} ${m.soyad}` : '-'}</td>
        <td>{oda?.odaNumarasi || '-'}</td>
        <td>{r.yetiskinSayisi}Y / {r.cocukSayisi}Ç</td>
        <td>{fmtDateTR(r.girisTarihi)} → {fmtDateTR(r.cikisTarihi)}</td>
        <td className="text-right font-medium">{fmtMoney(r.toplamTutar, ana)}</td>
      </tr>
    );
  };

  // Son 12 ay seçenekleri
  const monthOptions = useMemo(() => {
    const opts = [];
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const v = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const l = d.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' });
      opts.push({ v, l });
    }
    return opts;
  }, []);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="htl-stat">
          <div className="htl-stat-label">Doluluk</div>
          <div className="htl-stat-value">%{dolulukOrani}</div>
          <div className="htl-stat-sub">{gemide.length} / {odalar.length} oda dolu</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Bugün Giriş</div>
          <div className="htl-stat-value">{bugunGiris.length}</div>
          <div className="htl-stat-sub">rezervasyon</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Bugün Çıkış</div>
          <div className="htl-stat-value">{bugunCikis.length}</div>
          <div className="htl-stat-sub">rezervasyon</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Bu Ay Tahsilat</div>
          <div className="htl-stat-value" style={{fontSize: 26}}>{fmtMoney(buAyTahsilat, ana)}</div>
          <div className="htl-stat-sub">bugün: {fmtMoney(bugunTahsilat, ana)}</div>
        </div>
      </div>

      {/* === BU AYIN İSTATİSTİKLERİ PANELİ === */}
      {monthStats && (
        <div className="htl-card">
          <div className="htl-card-header">
            <div className="flex items-center gap-2">
              <Icon name="bar-chart-3" size={18} stroke="var(--brass)"/>
              <h3 className="font-display text-lg font-medium" style={{color: 'var(--forest)'}}>İstatistikler</h3>
              <span className="text-sm" style={{color: 'var(--ink-soft)'}}>· {monthStats.ayLabel}</span>
            </div>
            <select className="htl-input" style={{maxWidth: 200}} value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
              {monthOptions.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          </div>
          <div className="htl-card-body" style={{padding: 0}}>
            <div className="divide-y" style={{borderColor: 'var(--line-soft)'}}>
              {[
                { icon: 'bar-chart-3', label: 'Doluluk', value: `%${monthStats.dolulukYuzde.toFixed(2)}`, sub: `${monthStats.doluGece} / ${monthStats.totalRoomNights} oda-gece` },
                { icon: 'book-open', label: 'Rezervasyon Sayısı', value: monthStats.rezSayisi, sub: 'aktif rezervasyon' },
                { icon: 'moon', label: 'Konaklanan Gece', value: monthStats.doluGece, sub: 'dolu oda-gece' },
                { icon: 'moon-star', label: 'Olası Toplam Gece', value: monthStats.totalRoomNights, sub: `${odalar.length} oda × ay günü` },
                { icon: 'banknote', label: 'Ortalama Oda Fiyatı (ADR)', value: fmtMoney(monthStats.adr, ana), sub: 'dolu gece başına' },
                { icon: 'wallet', label: 'Toplam Ciro', value: fmtMoney(monthStats.odaGeliri, ana), sub: `${monthStats.doluGece} gece × konaklama bedeli`, highlight: true }
              ].map((row, i) => (
                <div key={i} className="flex items-center px-5 py-4 gap-4" style={{
                  borderTop: i === 0 ? '1px solid var(--line-soft)' : 'none',
                  borderBottom: '1px solid var(--line-soft)',
                  background: row.highlight ? 'var(--brass-soft)' : undefined
                }}>
                  <div className="w-12 h-12 rounded-lg flex items-center justify-center flex-shrink-0" style={{background: row.highlight ? 'var(--brass)' : 'var(--bone-warm)'}}>
                    <Icon name={row.icon} size={22} stroke={row.highlight ? 'white' : 'var(--brass)'}/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm" style={{color: row.highlight ? 'var(--forest)' : 'var(--ink-soft)', fontWeight: row.highlight ? 600 : 400}}>{row.label}</div>
                    {row.sub && <div className="text-[11px]" style={{color: 'var(--ink-faint)'}}>{row.sub}</div>}
                  </div>
                  <div className="font-display text-2xl font-medium" style={{color: 'var(--forest)', fontSize: row.highlight ? 28 : 24}}>{row.value}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      <div className="grid lg:grid-cols-2 gap-6">
        <div className="htl-card">
          <div className="htl-card-header">
            <div className="flex items-center gap-2">
              <Icon name="log-in" size={18} stroke="var(--success)" />
              <h3 className="font-display text-lg font-medium">Bugün Gelenler</h3>
            </div>
            <span className="htl-badge htl-badge-success">{bugunGiris.length}</span>
          </div>
          <div className="overflow-x-auto">
            {bugunGiris.length === 0 ? (
              <div className="htl-empty">Bugün giriş yapacak misafir yok.</div>
            ) : (
              <table className="htl-table">
                <thead><tr><th>Misafir</th><th>Oda</th><th>Kişi</th><th>Tarih</th><th className="text-right">Tutar</th></tr></thead>
                <tbody>{bugunGiris.map(renderRezRow)}</tbody>
              </table>
            )}
          </div>
        </div>

        <div className="htl-card">
          <div className="htl-card-header">
            <div className="flex items-center gap-2">
              <Icon name="log-out" size={18} stroke="var(--warn)" />
              <h3 className="font-display text-lg font-medium">Bugün Çıkanlar</h3>
            </div>
            <span className="htl-badge htl-badge-warn">{bugunCikis.length}</span>
          </div>
          <div className="overflow-x-auto">
            {bugunCikis.length === 0 ? (
              <div className="htl-empty">Bugün çıkış yapacak misafir yok.</div>
            ) : (
              <table className="htl-table">
                <thead><tr><th>Misafir</th><th>Oda</th><th>Kişi</th><th>Tarih</th><th className="text-right">Tutar</th></tr></thead>
                <tbody>{bugunCikis.map(renderRezRow)}</tbody>
              </table>
            )}
          </div>
        </div>
      </div>

      <div className="htl-card">
        <div className="htl-card-header">
          <div className="flex items-center gap-2">
            <Icon name="bed-double" size={18} stroke="var(--info)" />
            <h3 className="font-display text-lg font-medium">Otelde (Gemide)</h3>
          </div>
          <span className="htl-badge htl-badge-info">{gemide.length} misafir</span>
        </div>
        <div className="overflow-x-auto">
          {gemide.length === 0 ? (
            <div className="htl-empty">Şu anda otelde misafir yok.</div>
          ) : (
            <table className="htl-table">
              <thead><tr><th>Misafir</th><th>Oda</th><th>Kişi</th><th>Tarih</th><th className="text-right">Tutar</th></tr></thead>
              <tbody>{gemide.map(renderRezRow)}</tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
};

/* ========================================================================
   RESERVATION FORM MODAL — v0.2: prefill (drag-to-create) + ödeme bölümü
   ======================================================================== */
const ReservationFormModal = ({ open, onClose, rezervasyon, prefill, onSaved }) => {
  const { show } = useToast();
  const { user } = useAuth();
  const odalar = db.list('odalar');
  const odaTipleri = db.list('odaTipleri');
  const misafirler = db.list('misafirler');
  const hesaplar = db.list('hesaplar');

  const [form, setForm] = useState({});
  const [err, setErr] = useState('');
  const [tahCount, setTahCount] = useState(0); // refresh trigger sonrası ödeme bölümünü yenile
  const [tahForm, setTahForm] = useState(null); // null kapalı, obje açık
  const [confirmTahDel, setConfirmTahDel] = useState(null);

  useEffect(() => {
    if (!open) return;
    if (rezervasyon) {
      setForm({
        ...rezervasyon,
        fiyatModu: rezervasyon.fiyatModu || (Array.isArray(rezervasyon.geceFiyatlari) && rezervasyon.geceFiyatlari.length ? 'detay' : 'gece')
      });
    } else {
      const base = {
        odaId: '', odaTipiId: '', anaMisafirId: '', ekMisafirIdler: [],
        yetiskinSayisi: 2, cocukSayisi: 0,
        girisTarihi: todayISO(), cikisTarihi: addDays(todayISO(), 1),
        durum: 'onayli', pansiyonTipi: 'oda-kahvalti', kanal: 'manuel',
        geceFiyati: 0, toplamTutar: 0,
        fiyatModu: 'gece',           // 'toplam' | 'gece' | 'detay'
        geceFiyatlari: [],           // detay modu için: array of numbers
        ekstralar: [], notlar: ''
      };
      // prefill geldiyse (drag-to-create) override
      if (prefill) {
        if (prefill.odaId) base.odaId = prefill.odaId;
        if (prefill.girisTarihi) base.girisTarihi = prefill.girisTarihi;
        if (prefill.cikisTarihi) base.cikisTarihi = prefill.cikisTarihi;
      }
      setForm(base);
    }
    setErr('');
  }, [rezervasyon, open, prefill?.odaId, prefill?.girisTarihi, prefill?.cikisTarihi]);

  const geceSayisi = useMemo(() => {
    if (!form.girisTarihi || !form.cikisTarihi) return 0;
    return Math.max(0, diffDays(form.girisTarihi, form.cikisTarihi));
  }, [form.girisTarihi, form.cikisTarihi]);

  // Gece tarih listesi (her gece için tarih)
  const geceTarihleri = useMemo(() => {
    if (!form.girisTarihi || geceSayisi <= 0) return [];
    return Array.from({length: geceSayisi}, (_, i) => addDays(form.girisTarihi, i));
  }, [form.girisTarihi, geceSayisi]);

  // Oda seçilince oda tipi & varsayılan fiyat
  useEffect(() => {
    if (form.odaId) {
      const oda = odalar.find(o => o.id === form.odaId);
      if (oda && oda.odaTipiId !== form.odaTipiId) {
        const tip = odaTipleri.find(t => t.id === oda.odaTipiId);
        setForm(f => ({ ...f, odaTipiId: oda.odaTipiId, geceFiyati: f.geceFiyati || tip?.varsayilanFiyat || 0 }));
      }
    }
  }, [form.odaId]);

  // Fiyat modu değiştiğinde geceFiyatlari array'ini güncelle (detay moduna girerken doldur)
  useEffect(() => {
    if (form.fiyatModu === 'detay') {
      setForm(f => {
        const mevcut = Array.isArray(f.geceFiyatlari) ? f.geceFiyatlari : [];
        const yeniArr = Array.from({length: geceSayisi}, (_, i) => {
          if (mevcut[i] != null && Number(mevcut[i]) > 0) return Number(mevcut[i]);
          return Number(f.geceFiyati) || 0;
        });
        return { ...f, geceFiyatlari: yeniArr };
      });
    }
  }, [form.fiyatModu, geceSayisi]);

  // Toplam ve gece fiyatı otomatik senkron — fiyat moduna göre
  useEffect(() => {
    setForm(f => {
      if (geceSayisi <= 0) return { ...f, toplamTutar: 0 };
      if (f.fiyatModu === 'toplam') {
        // Toplam'dan gece fiyatı (gösterim amaçlı)
        const gf = (Number(f.toplamTutar) || 0) / geceSayisi;
        return { ...f, geceFiyati: gf };
      } else if (f.fiyatModu === 'detay') {
        // Detay'dan toplam
        const arr = Array.isArray(f.geceFiyatlari) ? f.geceFiyatlari : [];
        const t = arr.reduce((s, x) => s + (Number(x) || 0), 0);
        const gf = t / geceSayisi;
        return { ...f, toplamTutar: t, geceFiyati: gf };
      } else {
        // 'gece' — gece fiyatından toplam
        const t = (Number(f.geceFiyati) || 0) * geceSayisi;
        return { ...f, toplamTutar: t };
      }
    });
  }, [form.fiyatModu, form.geceFiyati, form.toplamTutar, form.geceFiyatlari?.join(','), geceSayisi]);

  const handleSave = () => {
    setErr('');
    if (!form.odaId) return setErr('Oda seçimi zorunludur.');
    if (!form.anaMisafirId) return setErr('Ana misafir seçimi zorunludur.');
    if (!form.girisTarihi || !form.cikisTarihi) return setErr('Giriş ve çıkış tarihleri zorunludur.');
    if (form.cikisTarihi <= form.girisTarihi) return setErr('Çıkış tarihi giriş tarihinden sonra olmalıdır.');

    if (checkOverlap(form.odaId, form.girisTarihi, form.cikisTarihi, rezervasyon?.id)) {
      return setErr('Bu odada seçtiğiniz tarihlerde başka bir aktif rezervasyon var.');
    }

    const payload = {
      ...form, geceSayisi,
      yetiskinSayisi: Number(form.yetiskinSayisi) || 0,
      cocukSayisi: Number(form.cocukSayisi) || 0,
      geceFiyati: Number(form.geceFiyati) || 0,
      toplamTutar: Number(form.toplamTutar) || 0,
      fiyatModu: form.fiyatModu || 'gece',
      geceFiyatlari: form.fiyatModu === 'detay' && Array.isArray(form.geceFiyatlari)
        ? form.geceFiyatlari.map(x => Number(x) || 0)
        : []
    };

    if (rezervasyon) {
      db.update('rezervasyonlar', rezervasyon.id, payload);
      show('Rezervasyon güncellendi.');
    } else {
      payload.rezervasyonKodu = generateRezKodu();
      payload.olusturmaTarihi = new Date().toISOString();
      db.add('rezervasyonlar', payload);
      show('Rezervasyon oluşturuldu.');
    }
    onSaved?.();
    onClose();
  };

  // Ödeme bilgileri (sadece mevcut rezervasyonda gösterilir)
  const isExisting = !!rezervasyon;
  const ana = getAnaParaBirimi();
  const kurlar = getActiveKurlar();
  const tahsilatlar = isExisting ? db.list('tahsilatlar').filter(t => t.rezervasyonId === rezervasyon.id) : [];
  const odenen = tahsilatlar.reduce((s, t) => s + Number(t.tutarAna != null ? t.tutarAna : t.tutar||0), 0);
  const toplam = Number(form.toplamTutar) || 0;
  const kalan = toplam - odenen;

  const yeniTahsilatBaslat = () => {
    // Ana para birimindeki ilk aktif hesabı seç
    const aktifHesaplar = hesaplar.filter(h => h.aktif !== false);
    const anaPBHesap = aktifHesaplar.find(h => (h.paraBirimi || ana) === ana) || aktifHesaplar[0];
    setTahForm({
      tutar: kalan > 0 ? kalan : '',
      tarih: todayISO(),
      odemeYontemi: 'nakit',
      hesapId: anaPBHesap?.id || '',
      paraBirimi: ana,
      kur: 1,
      aciklama: ''
    });
  };

  const tahsilatKaydet = () => {
    if (!tahForm.hesapId) return show('Hesap seçilmeli.', 'error');
    if (!tahForm.tutar || Number(tahForm.tutar) <= 0) return show('Tutar 0\'dan büyük olmalı.', 'error');
    try {
      addTahsilatWithHareket({
        rezervasyonId: rezervasyon.id,
        tutar: Number(tahForm.tutar),
        paraBirimi: tahForm.paraBirimi || ana,
        kur: tahForm.paraBirimi !== ana ? Number(tahForm.kur) || undefined : 1,
        tarih: tahForm.tarih,
        odemeYontemi: tahForm.odemeYontemi,
        hesapId: tahForm.hesapId,
        aciklama: tahForm.aciklama
      }, user?.id);
      show('Ödeme alındı, hesaba yansıdı.');
      setTahForm(null);
      setTahCount(c => c + 1);
      onSaved?.(); // ana listeyi güncelle
    } catch (e) {
      show('Hata: ' + e.message, 'error');
    }
  };

  const tahsilatSil = (tahsilatId) => {
    deleteTahsilatWithHareket(tahsilatId);
    setConfirmTahDel(null);
    setTahCount(c => c + 1);
    onSaved?.();
    show('Tahsilat silindi.');
  };

  return (
    <Modal open={open} onClose={onClose} size="lg"
      title={rezervasyon ? `Rezervasyon Düzenle — ${rezervasyon.rezervasyonKodu}` : 'Yeni Rezervasyon'}
      footer={<>
        <button className="htl-btn htl-btn-ghost" onClick={onClose}>Vazgeç</button>
        <button className="htl-btn htl-btn-primary" onClick={handleSave}>
          <Icon name="save" size={16} /><span>Kaydet</span>
        </button>
      </>}
    >
      {err && (
        <div className="mb-4 px-3 py-2 rounded-md text-sm flex items-center gap-2"
          style={{background: 'var(--danger-soft)', color: 'var(--danger)'}}>
          <Icon name="alert-circle" size={16} />{err}
        </div>
      )}

      <div className="grid md:grid-cols-2 gap-4">
        <div>
          <label className="htl-label">Ana Misafir *</label>
          <select className="htl-input" value={form.anaMisafirId || ''} onChange={e => setForm({...form, anaMisafirId: e.target.value})}>
            <option value="">— Seçiniz —</option>
            {misafirler.map(m => <option key={m.id} value={m.id}>{m.ad} {m.soyad} {m.telefon ? `· ${m.telefon}` : ''}</option>)}
          </select>
        </div>
        <div>
          <label className="htl-label">Oda *</label>
          <select className="htl-input" value={form.odaId || ''} onChange={e => setForm({...form, odaId: e.target.value})}>
            <option value="">— Seçiniz —</option>
            {odalar.map(o => {
              const t = odaTipleri.find(x => x.id === o.odaTipiId);
              return <option key={o.id} value={o.id}>Oda {o.odaNumarasi} — {t?.ad || ''}</option>;
            })}
          </select>
        </div>
        <div>
          <label className="htl-label">Giriş Tarihi *</label>
          <input type="date" className="htl-input" value={form.girisTarihi || ''} onChange={e => setForm({...form, girisTarihi: e.target.value})} />
        </div>
        <div>
          <label className="htl-label">Çıkış Tarihi *</label>
          <input type="date" className="htl-input" value={form.cikisTarihi || ''} onChange={e => setForm({...form, cikisTarihi: e.target.value})} />
        </div>
        <div>
          <label className="htl-label">Yetişkin</label>
          <input type="number" min="1" className="htl-input" value={form.yetiskinSayisi || 0} onChange={e => setForm({...form, yetiskinSayisi: e.target.value})} />
        </div>
        <div>
          <label className="htl-label">Çocuk</label>
          <input type="number" min="0" className="htl-input" value={form.cocukSayisi || 0} onChange={e => setForm({...form, cocukSayisi: e.target.value})} />
        </div>
        <div>
          <label className="htl-label">Pansiyon</label>
          <select className="htl-input" value={form.pansiyonTipi || 'oda-only'} onChange={e => setForm({...form, pansiyonTipi: e.target.value})}>
            {PANSIYON_OPTS.map(p => <option key={p.v} value={p.v}>{p.l}</option>)}
          </select>
        </div>
        <div>
          <label className="htl-label">Kanal</label>
          <select className="htl-input" value={form.kanal || 'manuel'} onChange={e => setForm({...form, kanal: e.target.value})}>
            {getKanalOpts().map(p => <option key={p.v} value={p.v}>{p.l}</option>)}
          </select>
        </div>
        <div>
          <label className="htl-label">Gece Sayısı</label>
          <input type="text" className="htl-input" readOnly value={geceSayisi} style={{background: 'var(--bone-warm)'}}/>
        </div>
        <div>
          <label className="htl-label">Durum</label>
          <select className="htl-input" value={form.durum || 'onayli'} onChange={e => setForm({...form, durum: e.target.value})}>
            {STATUS_OPTS.map(p => <option key={p.v} value={p.v}>{p.l}</option>)}
          </select>
        </div>
        <div className="md:col-span-2">
          <label className="htl-label">Notlar</label>
          <textarea rows="2" className="htl-input" value={form.notlar || ''} onChange={e => setForm({...form, notlar: e.target.value})} />
        </div>
      </div>

      {/* === FİYAT BÖLÜMÜ === */}
      <div className="mt-6 pt-6" style={{borderTop: '1px solid var(--line-soft)'}}>
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <h4 className="font-display text-lg font-medium" style={{color: 'var(--forest)'}}>
            <Icon name="tag" size={18} className="inline mr-1.5" stroke="var(--brass)"/>
            Fiyat ({geceSayisi} gece)
          </h4>
          <div className="flex gap-1 p-1 rounded-lg" style={{background: 'var(--bone-warm)'}}>
            <button type="button" onClick={() => setForm({...form, fiyatModu: 'gece'})}
              className="px-3 py-1.5 rounded-md text-xs font-medium transition"
              style={{
                background: form.fiyatModu === 'gece' ? 'var(--bone-light)' : 'transparent',
                color: form.fiyatModu === 'gece' ? 'var(--forest)' : 'var(--ink-soft)',
                boxShadow: form.fiyatModu === 'gece' ? '0 1px 3px rgba(0,0,0,.08)' : 'none'
              }}>Gece Fiyatı</button>
            <button type="button" onClick={() => setForm({...form, fiyatModu: 'toplam'})}
              className="px-3 py-1.5 rounded-md text-xs font-medium transition"
              style={{
                background: form.fiyatModu === 'toplam' ? 'var(--bone-light)' : 'transparent',
                color: form.fiyatModu === 'toplam' ? 'var(--forest)' : 'var(--ink-soft)',
                boxShadow: form.fiyatModu === 'toplam' ? '0 1px 3px rgba(0,0,0,.08)' : 'none'
              }}>Toplam Tutar</button>
            <button type="button" onClick={() => setForm({...form, fiyatModu: 'detay'})}
              className="px-3 py-1.5 rounded-md text-xs font-medium transition"
              style={{
                background: form.fiyatModu === 'detay' ? 'var(--bone-light)' : 'transparent',
                color: form.fiyatModu === 'detay' ? 'var(--forest)' : 'var(--ink-soft)',
                boxShadow: form.fiyatModu === 'detay' ? '0 1px 3px rgba(0,0,0,.08)' : 'none'
              }}
              disabled={geceSayisi === 0}>Gece Bazında</button>
          </div>
        </div>

        {/* Mod 1: Gece Fiyatı (sabit, çarpılır) */}
        {form.fiyatModu === 'gece' && (
          <div className="grid md:grid-cols-2 gap-4">
            <div>
              <label className="htl-label">Gece Fiyatı ({getAnaParaBirimi()})</label>
              <input type="number" min="0" step="0.01" className="htl-input" value={form.geceFiyati || ''} onChange={e => setForm({...form, geceFiyati: e.target.value})} />
              <div className="text-xs mt-1" style={{color: 'var(--ink-soft)'}}>{geceSayisi} gece × {fmtMoney(form.geceFiyati || 0, getAnaParaBirimi())}</div>
            </div>
            <div className="flex items-end">
              <div className="rounded-lg p-3 w-full" style={{background: 'var(--bone-warm)'}}>
                <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Toplam Tutar</div>
                <div className="font-display text-2xl font-medium" style={{color: 'var(--forest)'}}>{fmtMoney(form.toplamTutar || 0, getAnaParaBirimi())}</div>
              </div>
            </div>
          </div>
        )}

        {/* Mod 2: Toplam Tutar (paylaşılır) */}
        {form.fiyatModu === 'toplam' && (
          <div className="grid md:grid-cols-2 gap-4">
            <div>
              <label className="htl-label">Toplam Tutar ({getAnaParaBirimi()})</label>
              <input type="number" min="0" step="0.01" className="htl-input" value={form.toplamTutar || ''} onChange={e => setForm({...form, toplamTutar: e.target.value})} />
              <div className="text-xs mt-1" style={{color: 'var(--ink-soft)'}}>Misafire toplam tutarı söylediğinizde bunu kullanın</div>
            </div>
            <div className="flex items-end">
              <div className="rounded-lg p-3 w-full" style={{background: 'var(--bone-warm)'}}>
                <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Gece Başına</div>
                <div className="font-display text-2xl font-medium" style={{color: 'var(--forest)'}}>
                  {geceSayisi > 0 ? fmtMoney((Number(form.toplamTutar)||0) / geceSayisi, getAnaParaBirimi()) : '—'}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Mod 3: Gece Bazında (her gece ayrı, SabeeApp tarzı) */}
        {form.fiyatModu === 'detay' && geceSayisi > 0 && (
          <div>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-4">
              {geceTarihleri.map((tarih, i) => (
                <div key={tarih}>
                  <div className="text-[11px] mb-1 text-center" style={{color: 'var(--ink-soft)'}}>
                    {new Date(tarih).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' })}
                  </div>
                  <input type="number" min="0" step="0.01" className="htl-input text-center"
                    style={{textAlign: 'center', fontWeight: 500}}
                    value={(form.geceFiyatlari && form.geceFiyatlari[i] != null) ? form.geceFiyatlari[i] : ''}
                    onChange={e => {
                      const yeni = [...(form.geceFiyatlari || [])];
                      yeni[i] = e.target.value;
                      setForm({...form, geceFiyatlari: yeni});
                    }}/>
                </div>
              ))}
            </div>
            <div className="rounded-lg p-3 flex items-center justify-between" style={{background: 'var(--bone-warm)'}}>
              <div>
                <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Toplam Tutar</div>
                <div className="font-display text-2xl font-medium" style={{color: 'var(--forest)'}}>{fmtMoney(form.toplamTutar || 0, getAnaParaBirimi())}</div>
              </div>
              <div className="text-right">
                <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Ortalama Gece</div>
                <div className="font-display text-lg font-medium" style={{color: 'var(--forest)'}}>{fmtMoney(form.geceFiyati || 0, getAnaParaBirimi())}</div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* === ÖDEME BÖLÜMÜ === */}
      {isExisting && (
        <div className="mt-6 pt-6" style={{borderTop: '1px solid var(--line-soft)'}}>
          <div className="flex items-center justify-between mb-3">
            <h4 className="font-display text-lg font-medium" style={{color: 'var(--forest)'}}>
              <Icon name="wallet" size={18} className="inline mr-1.5" stroke="var(--brass)"/>
              Ödeme & Bakiye
            </h4>
          </div>

          {/* Stat satırı */}
          <div className="grid grid-cols-3 gap-3 mb-4">
            <div className="rounded-lg p-3" style={{background: 'var(--bone-warm)'}}>
              <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Toplam</div>
              <div className="font-display text-xl font-medium mt-1">{fmtTL(toplam)}</div>
            </div>
            <div className="rounded-lg p-3" style={{background: 'var(--success-soft)'}}>
              <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--success)'}}>Ödenen</div>
              <div className="font-display text-xl font-medium mt-1" style={{color: 'var(--success)'}}>{fmtTL(odenen)}</div>
            </div>
            <div className="rounded-lg p-3" style={{background: kalan > 0 ? 'var(--danger-soft)' : 'var(--success-soft)'}}>
              <div className="text-[10px] uppercase tracking-wider" style={{color: kalan > 0 ? 'var(--danger)' : 'var(--success)'}}>Kalan Bakiye</div>
              <div className="font-display text-xl font-medium mt-1" style={{color: kalan > 0 ? 'var(--danger)' : 'var(--success)'}}>{fmtTL(kalan)}</div>
            </div>
          </div>

          {/* Hızlı tahsilat formu */}
          {tahForm ? (() => {
            const tahPB = tahForm.paraBirimi || ana;
            const tahPBInfo = PARA_BIRIMI_INFO(tahPB);
            const isFarkli = tahPB !== ana;
            // Otomatik kur (canlı kurdan)
            const otoKur = isFarkli && kurlar ? cevirKur(1, tahPB, ana, kurlar) : null;
            // Aktif kur: kullanıcı manuel girdi varsa onu, yoksa otomatik
            const aktifKur = (isFarkli && Number(tahForm.kur) > 0) ? Number(tahForm.kur) : otoKur;
            const tutarAnaPreview = (isFarkli && aktifKur) ? Number(tahForm.tutar||0) * aktifKur : Number(tahForm.tutar||0);
            const kalanSonra = kalan - tutarAnaPreview;
            // Sadece tahsilat para birimi ile aynı para birimindeki aktif hesaplar
            const uygunHesaplar = hesaplar.filter(h => h.aktif !== false && (h.paraBirimi || ana) === tahPB);

            return (
              <div className="rounded-lg p-4 mb-3" style={{background: 'var(--bone)', border: '1px solid var(--line)'}}>
                <div className="grid md:grid-cols-3 gap-3">
                  <div className="md:col-span-2">
                    <label className="htl-label">Tutar *</label>
                    <input type="number" min="0" step="0.01" className="htl-input" value={tahForm.tutar||''} onChange={e=>setTahForm({...tahForm, tutar:e.target.value})}/>
                  </div>
                  <div>
                    <label className="htl-label">Para Birimi</label>
                    <select className="htl-input" value={tahPB} onChange={e => {
                      const yeniPB = e.target.value;
                      // Para birimi değişince: uygun hesabı yeniden seç + kur sıfırla
                      const yeniUygun = hesaplar.filter(h => h.aktif !== false && (h.paraBirimi || ana) === yeniPB);
                      // Ödeme yöntemine uygun hesabı tercih et
                      let yeniHesapId = '';
                      if (tahForm.odemeYontemi === 'kredi-karti') yeniHesapId = yeniUygun.find(h => h.tip === 'pos')?.id || '';
                      else if (tahForm.odemeYontemi === 'havale') yeniHesapId = yeniUygun.find(h => h.tip === 'banka')?.id || '';
                      else if (tahForm.odemeYontemi === 'nakit') yeniHesapId = yeniUygun.find(h => h.tip === 'kasa')?.id || '';
                      if (!yeniHesapId) yeniHesapId = yeniUygun[0]?.id || '';
                      setTahForm({...tahForm, paraBirimi: yeniPB, hesapId: yeniHesapId, kur: yeniPB === ana ? 1 : ''});
                    }}>
                      {PARA_BIRIMI_OPTS.map(p => <option key={p.v} value={p.v}>{p.symbol} {p.l}</option>)}
                    </select>
                  </div>
                </div>

                {/* Para birimi için uygun hesap yoksa uyarı */}
                {uygunHesaplar.length === 0 && (
                  <div className="mt-3 px-3 py-2 rounded-md text-sm flex items-start gap-2" style={{background: 'var(--danger-soft)', color: 'var(--danger)'}}>
                    <Icon name="alert-circle" size={16}/>
                    <span><strong>{tahPB} cinsinden hesap yok.</strong> Önce Ön Muhasebe &gt; Hesaplar bölümünden {tahPB} cinsinden bir hesap açın (örn. "{PARA_BIRIMI_INFO(tahPB).l} Kasa").</span>
                  </div>
                )}

                {/* Farklı para birimiyse kur ve dönüşüm bilgisi */}
                {isFarkli && uygunHesaplar.length > 0 && (
                  <div className="mt-3 rounded-md p-3" style={{background: 'var(--brass-soft)', border: '1px solid var(--brass-light)'}}>
                    <div className="grid md:grid-cols-2 gap-3 items-end">
                      <div>
                        <label className="htl-label" style={{margin: 0, marginBottom: 4}}>
                          Kur (1 {tahPB} = ? {ana}) — rezervasyon bakiyesinden düşmek için
                        </label>
                        <div className="flex gap-2">
                          <input type="number" min="0" step="0.0001" className="htl-input"
                            placeholder={otoKur ? otoKur.toFixed(4) : 'Manuel girin'}
                            value={tahForm.kur || ''}
                            onChange={e => setTahForm({...tahForm, kur: e.target.value})}/>
                          {otoKur && (
                            <button type="button" className="htl-btn htl-btn-ghost"
                              onClick={() => setTahForm({...tahForm, kur: otoKur.toFixed(4)})}
                              title="Canlı kuru kullan">
                              <Icon name="refresh-cw" size={14}/>
                            </button>
                          )}
                        </div>
                        <div className="text-[11px] mt-1" style={{color: 'var(--ink-soft)'}}>
                          {otoKur
                            ? `Canlı kur: 1 ${tahPB} = ${otoKur.toFixed(4)} ${ana}${kurlar?.isManual ? ' (manuel)' : ''}`
                            : 'Canlı kur yok — manuel girin'
                          }
                        </div>
                      </div>
                      <div className="text-right">
                        <div className="text-[11px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Bakiyeden Düşülecek</div>
                        <div className="font-display text-xl font-medium" style={{color: 'var(--forest)'}}>
                          {aktifKur ? fmtMoney(tutarAnaPreview, ana) : '—'}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                <div className="grid md:grid-cols-2 gap-3 mt-3">
                  <div><label className="htl-label">Tarih</label><input type="date" className="htl-input" value={tahForm.tarih||''} onChange={e=>setTahForm({...tahForm, tarih:e.target.value})}/></div>
                  <div><label className="htl-label">Ödeme Yöntemi</label>
                    <select className="htl-input" value={tahForm.odemeYontemi} onChange={e => {
                      const yeni = e.target.value;
                      let onerilenHesap = tahForm.hesapId;
                      // Sadece uygun hesaplar arasından öneri
                      if (yeni === 'kredi-karti') { const p = uygunHesaplar.find(h => h.tip === 'pos'); if (p) onerilenHesap = p.id; }
                      else if (yeni === 'havale') { const b = uygunHesaplar.find(h => h.tip === 'banka'); if (b) onerilenHesap = b.id; }
                      else if (yeni === 'nakit') { const k = uygunHesaplar.find(h => h.tip === 'kasa'); if (k) onerilenHesap = k.id; }
                      setTahForm({...tahForm, odemeYontemi: yeni, hesapId: onerilenHesap});
                    }}>
                      {ODEME_OPTS.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
                    </select>
                  </div>
                  <div className="md:col-span-2">
                    <label className="htl-label">Hesap * <span style={{textTransform: 'none', color: 'var(--ink-faint)', fontWeight: 'normal'}}>(sadece {tahPB} hesapları)</span></label>
                    <select className="htl-input" value={tahForm.hesapId||''} onChange={e=>setTahForm({...tahForm, hesapId:e.target.value})}>
                      <option value="">— Seçiniz —</option>
                      {uygunHesaplar.map(h => <option key={h.id} value={h.id}>{h.ad} ({fmtMoney(getHesapBakiye(h.id), tahPB)})</option>)}
                    </select>
                  </div>
                  <div className="md:col-span-2"><label className="htl-label">Açıklama</label><input className="htl-input" value={tahForm.aciklama||''} onChange={e=>setTahForm({...tahForm, aciklama:e.target.value})}/></div>
                </div>

                {/* Bakiye etkisi önizleme */}
                {Number(tahForm.tutar) > 0 && aktifKur != null && uygunHesaplar.length > 0 && (
                  <div className="mt-3 text-xs flex items-center gap-3 px-3 py-2 rounded-md" style={{background: 'var(--bone-warm)'}}>
                    <span style={{color: 'var(--ink-soft)'}}>Bu ödemeden sonra:</span>
                    <span>Ödenen: <strong style={{color: 'var(--success)'}}>{fmtMoney(odenen + tutarAnaPreview, ana)}</strong></span>
                    <span>Kalan: <strong style={{color: kalanSonra > 0.01 ? 'var(--danger)' : 'var(--success)'}}>{fmtMoney(Math.max(0, kalanSonra), ana)}</strong></span>
                  </div>
                )}

                <div className="flex justify-end gap-2 mt-3">
                  <button className="htl-btn htl-btn-ghost" onClick={() => setTahForm(null)}>İptal</button>
                  <button className="htl-btn htl-btn-accent" onClick={tahsilatKaydet} disabled={uygunHesaplar.length === 0}>
                    <Icon name="check" size={16} stroke="white"/>Ödemeyi Al
                  </button>
                </div>
              </div>
            );
          })() : (
            <button className="htl-btn htl-btn-accent w-full justify-center mb-3" onClick={yeniTahsilatBaslat} disabled={hesaplar.length === 0}>
              <Icon name="plus" size={16} stroke="white"/>
              <span>Yeni Ödeme Al{kalan > 0 ? ` (Kalan: ${fmtMoney(kalan, ana)})` : ''}</span>
            </button>
          )}

          {/* Geçmiş tahsilatlar */}
          {tahsilatlar.length > 0 && (
            <div className="rounded-lg overflow-hidden" style={{border: '1px solid var(--line-soft)'}}>
              <table className="htl-table">
                <thead><tr><th>Tarih</th><th>Yöntem</th><th>Hesap</th><th>Açıklama</th><th className="text-right">Tutar</th><th></th></tr></thead>
                <tbody>
                  {[...tahsilatlar].sort((a,b) => (b.tarih+'').localeCompare(a.tarih+'')).map(t => {
                    const opt = ODEME_OPTS.find(o => o.v === t.odemeYontemi);
                    const hesap = hesaplar.find(h => h.id === t.hesapId);
                    const tipInfo = hesap ? HESAP_TIP_INFO(hesap.tip) : null;
                    return (
                      <tr key={t.id}>
                        <td className="text-sm">{fmtDateTR(t.tarih)}</td>
                        <td><span className="htl-badge htl-badge-info">{opt?.l || t.odemeYontemi}</span></td>
                        <td className="text-sm">
                          {hesap ? (
                            <div className="flex items-center gap-1.5">
                              <div className="w-2 h-2 rounded-full" style={{background: tipInfo.renk}}/>
                              <span>{hesap.ad}</span>
                            </div>
                          ) : <span style={{color: 'var(--ink-faint)'}}>—</span>}
                        </td>
                        <td className="text-sm" style={{color: 'var(--ink-soft)'}}>{t.aciklama||'-'}</td>
                        <td className="text-right font-medium" style={{color: 'var(--success)'}}>
                          <div>{fmtMoney(t.tutar, t.paraBirimi || ana)}</div>
                          {t.paraBirimi && t.paraBirimi !== ana && t.tutarAna != null && (
                            <div className="text-[10px] font-normal" style={{color: 'var(--ink-soft)'}}>
                              ≈ {fmtMoney(t.tutarAna, ana)}
                            </div>
                          )}
                        </td>
                        <td>
                          <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setConfirmTahDel(t)}>
                            <Icon name="trash-2" size={14} stroke="var(--danger)"/>
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      <ConfirmModal open={!!confirmTahDel} title="Tahsilatı Sil"
        msg="Bu ödeme ve hesap hareketi silinecek. Emin misiniz?"
        onConfirm={() => tahsilatSil(confirmTahDel.id)}
        onCancel={() => setConfirmTahDel(null)} />
    </Modal>
  );
};

/* ========================================================================
   SPLIT MODAL — Rezervasyonu farklı odalara böl (segmentler oluşturur)
   ======================================================================== */
const SplitModal = ({ target, odalar, odaTipleri, onClose, onSaved }) => {
  const { show } = useToast();
  const [splitDate, setSplitDate] = useState('');
  const [yeniOdaId, setYeniOdaId] = useState('');

  const isOpen = !!target;
  const isMulti = target && target.segmentler && target.segmentler.length > 0;
  const segs = target ? getOdaSegmentleri(target) : [];

  useEffect(() => {
    if (!isOpen || isMulti) {
      setSplitDate('');
      setYeniOdaId('');
      return;
    }
    if (target && target.girisTarihi && target.cikisTarihi) {
      const orta = addDays(target.girisTarihi, Math.floor(diffDays(target.girisTarihi, target.cikisTarihi) / 2));
      setSplitDate(orta);
    }
  }, [target?.id, isMulti]);

  if (!isOpen) return null;

  // Bölünmüş modda: bölmeyi geri al
  if (isMulti) {
    return (
      <Modal open={isOpen} onClose={onClose} title="Bölmeyi Geri Al" size="md"
        footer={<>
          <button className="htl-btn htl-btn-ghost" onClick={onClose}>Vazgeç</button>
          <button className="htl-btn htl-btn-danger" onClick={() => {
            const ilk = target.segmentler[0];
            db.update('rezervasyonlar', target.id, {
              segmentler: [],
              odaId: ilk.odaId,
              odaTipiId: ilk.odaTipiId,
              girisTarihi: ilk.girisTarihi,
              cikisTarihi: target.segmentler[target.segmentler.length-1].cikisTarihi
            });
            show('Bölme kaldırıldı, rezervasyon ilk odaya geri döndü.');
            onSaved();
          }}><Icon name="undo-2" size={16}/>Bölmeyi Kaldır</button>
        </>}>
        <p className="text-sm mb-3" style={{color: 'var(--ink-soft)'}}>
          Bu rezervasyon <strong>{segs.length} bölüm</strong> halinde:
        </p>
        <div className="space-y-2 mb-3">
          {segs.map((s, i) => {
            const oda = odalar.find(o => o.id === s.odaId);
            return (
              <div key={i} className="flex items-center gap-3 px-3 py-2 rounded" style={{background: 'var(--bone-warm)'}}>
                <div className="font-display text-lg" style={{color: 'var(--brass)'}}>{i+1}</div>
                <div className="flex-1">
                  <div className="font-medium">Oda {oda?.odaNumarasi || '?'}</div>
                  <div className="text-xs" style={{color: 'var(--ink-soft)'}}>{fmtDateTR(s.girisTarihi)} → {fmtDateTR(s.cikisTarihi)} · {diffDays(s.girisTarihi, s.cikisTarihi)} gece</div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="text-xs px-3 py-2 rounded" style={{background: 'var(--warn-soft)', color: 'var(--warn)'}}>
          Bölmeyi kaldırdığınızda rezervasyon ilk segment'in odasına (Oda {odalar.find(o => o.id === segs[0].odaId)?.odaNumarasi}) geri döner. Tüm tarih aralığı tek odada gözükür.
        </div>
      </Modal>
    );
  }

  // Bölünmemiş: yeni bölme oluştur
  const giris = target.girisTarihi;
  const cikis = target.cikisTarihi;
  const minSplit = addDays(giris, 1);
  const maxSplit = addDays(cikis, -1);
  const totalGeceler = diffDays(giris, cikis);
  const ilkParcaGeceler = splitDate ? diffDays(giris, splitDate) : 0;
  const ikinciParcaGeceler = splitDate ? diffDays(splitDate, cikis) : 0;
  const seciliYeniOda = yeniOdaId ? odalar.find(o => o.id === yeniOdaId) : null;
  const cakisma = (yeniOdaId && splitDate) ? checkOverlap(yeniOdaId, splitDate, cikis, target.id) : false;

  const valid = splitDate >= minSplit && splitDate <= maxSplit && yeniOdaId && yeniOdaId !== target.odaId && !cakisma;

  const save = () => {
    if (!valid) return;
    const yeniOda = odalar.find(o => o.id === yeniOdaId);
    const newSegs = [
      { odaId: target.odaId, odaTipiId: target.odaTipiId, girisTarihi: giris, cikisTarihi: splitDate },
      { odaId: yeniOdaId, odaTipiId: yeniOda.odaTipiId, girisTarihi: splitDate, cikisTarihi: cikis }
    ];
    db.update('rezervasyonlar', target.id, { segmentler: newSegs });
    show(`Rezervasyon ikiye bölündü: ${ilkParcaGeceler} gece + ${ikinciParcaGeceler} gece`);
    onSaved();
  };

  return (
    <Modal open={isOpen} onClose={onClose} title="Rezervasyonu Böl" size="md"
      footer={<>
        <button className="htl-btn htl-btn-ghost" onClick={onClose}>Vazgeç</button>
        <button className="htl-btn htl-btn-primary" onClick={save} disabled={!valid}>
          <Icon name="scissors" size={16}/>Böl
        </button>
      </>}>
      <p className="text-sm mb-3" style={{color: 'var(--ink-soft)'}}>
        <Icon name="info" size={14} className="inline mr-1"/>
        Bu rezervasyonun bir kısmını başka odaya taşıyabilirsiniz. <strong>Tek hesap olarak kalır</strong>, tahsilat ve fiyatlandırma birlikte yönetilir.
      </p>

      <div className="rounded-lg p-3 mb-4" style={{background: 'var(--bone-warm)'}}>
        <div className="text-xs uppercase tracking-wider mb-1" style={{color: 'var(--ink-soft)'}}>Mevcut Rezervasyon</div>
        <div className="text-sm">
          <strong>Oda {odalar.find(o => o.id === target.odaId)?.odaNumarasi || '?'}</strong>
          {' · '}{fmtDateTR(giris)} → {fmtDateTR(cikis)} ({totalGeceler} gece)
        </div>
      </div>

      <div className="space-y-3">
        <div>
          <label className="htl-label">Bölme Tarihi (yeni odaya geçiş günü) *</label>
          <input type="date" className="htl-input" value={splitDate}
            min={minSplit} max={maxSplit}
            onChange={e => setSplitDate(e.target.value)}/>
          <div className="text-xs mt-1" style={{color: 'var(--ink-soft)'}}>
            {minSplit !== maxSplit
              ? `Geçerli aralık: ${fmtDateTR(minSplit)} → ${fmtDateTR(maxSplit)}`
              : 'Bu rezervasyon en az 2 gecelik olmalı (bölmek için)'}
          </div>
        </div>

        <div>
          <label className="htl-label">Yeni Oda *</label>
          <select className="htl-input" value={yeniOdaId} onChange={e => setYeniOdaId(e.target.value)}>
            <option value="">— Seçiniz —</option>
            {odalar.filter(o => o.id !== target.odaId).map(o => {
              const tip = odaTipleri.find(t => t.id === o.odaTipiId);
              return <option key={o.id} value={o.id}>Oda {o.odaNumarasi} ({tip?.ad || '-'})</option>;
            })}
          </select>
          {cakisma && (
            <div className="text-xs mt-1 flex items-center gap-1" style={{color: 'var(--danger)'}}>
              <Icon name="alert-circle" size={12}/>
              <span>Bu odada {fmtDateTR(splitDate)} → {fmtDateTR(cikis)} aralığında başka rezervasyon var.</span>
            </div>
          )}
        </div>

        {splitDate && yeniOdaId && !cakisma && (
          <div className="rounded-lg p-3 mt-3" style={{background: 'var(--brass-soft)', border: '1px solid var(--brass-light)'}}>
            <div className="text-xs uppercase tracking-wider mb-2" style={{color: 'var(--forest)', fontWeight: 600}}>Önizleme</div>
            <div className="space-y-2">
              <div className="flex items-center gap-3 text-sm">
                <div className="font-display text-lg" style={{color: 'var(--brass)'}}>1</div>
                <div className="flex-1">
                  <div><strong>Oda {odalar.find(o => o.id === target.odaId)?.odaNumarasi}</strong></div>
                  <div className="text-xs" style={{color: 'var(--ink-soft)'}}>{fmtDateTR(giris)} → {fmtDateTR(splitDate)} · {ilkParcaGeceler} gece</div>
                </div>
              </div>
              <div className="flex items-center gap-3 text-sm">
                <div className="font-display text-lg" style={{color: 'var(--brass)'}}>2</div>
                <div className="flex-1">
                  <div><strong>Oda {seciliYeniOda?.odaNumarasi}</strong></div>
                  <div className="text-xs" style={{color: 'var(--ink-soft)'}}>{fmtDateTR(splitDate)} → {fmtDateTR(cikis)} · {ikinciParcaGeceler} gece</div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
};

/* ========================================================================
   PAGE: RESERVATION CALENDAR (Gantt)
   ======================================================================== */
const CalendarPage = () => {
  const { can } = useAuth();
  const [refreshKey, setRefreshKey] = useState(0);
  const [startDate, setStartDate] = useState(addDays(todayISO(), -2));
  const [days, setDays] = useState(15);  // 7 / 15 / 30
  const [filterTipId, setFilterTipId] = useState('');
  const [editingRez, setEditingRez] = useState(null);
  const [creating, setCreating] = useState(false);
  const [prefillData, setPrefillData] = useState(null); // drag-to-create için

  // Düzenleme modu — aktifken rezervasyonlar başka odaya sürüklenebilir
  const [editMode, setEditMode] = useState(false);

  // Drag state — yeni rez oluştururken (boş hücreye basıp sürüklemek)
  const [drag, setDrag] = useState(null); // { odaId, startIdx, currentIdx } veya null
  const [mouse, setMouse] = useState({ x: 0, y: 0 }); // tooltip konumu için

  // Rez drag state — mevcut rezervasyonu farklı odaya taşımak (sadece editMode'da)
  const [rezDrag, setRezDrag] = useState(null); // { rez, startOdaId, hoverOdaId, draggedSeg, segIdx } veya null
  const [moveConfirm, setMoveConfirm] = useState(null); // { rez, yeniOdaId, segIdx } — onay için
  const [splitTarget, setSplitTarget] = useState(null); // bölme modali için

  const refresh = () => setRefreshKey(k => k+1);

  const odaTipleri = db.list('odaTipleri');
  const odalar = db.list('odalar').sort((a,b) => (a.odaNumarasi+'').localeCompare(b.odaNumarasi+''));
  const filteredOdalar = filterTipId ? odalar.filter(o => o.odaTipiId === filterTipId) : odalar;
  const reservations = db.list('rezervasyonlar').filter(r => r.durum !== 'iptal' && r.durum !== 'no-show');

  const dateList = useMemo(() => Array.from({length: days}, (_, i) => addDays(startDate, i)), [startDate, days, refreshKey]);
  const cellWidth = days >= 30 ? 44 : (days >= 15 ? 60 : 80);

  const isWeekend = (iso) => { const d = new Date(iso).getDay(); return d === 0 || d === 6; };
  const today = todayISO();

  // Bir oda için, bu odaya düşen segmentleri (rezervasyonla birlikte) döndürür
  // [{ rez, seg }] — her segment ayrı bar olarak çizilir
  const getResForRoom = (odaId) => {
    const out = [];
    reservations.forEach(r => {
      const segs = getOdaSegmentleri(r);
      segs.forEach(s => {
        if (s.odaId === odaId) out.push({ rez: r, seg: s });
      });
    });
    return out;
  };

  const getResStyle = (res, seg) => {
    const tipId = (seg && seg.odaTipiId) || res.odaTipiId;
    const tip = odaTipleri.find(t => t.id === tipId);
    return { background: tip?.renk || 'var(--brass)' };
  };

  // Otelcilik gece mantığı: bar yatılan gecelerin hücrelerini TAM kaplar.
  // 4 Mayıs giriş, 6 Mayıs çıkış → 4 ve 5 mayıs gecesi yatılır (2 gece) → bar 4 ve 5 hücrelerini TAM kaplar.
  // Çıkış günü hücresi BOŞ kalır (sabah check-out).
  const computeBar = (segGiris, segCikis) => {
    // Son yatılan gece = çıkış tarihi - 1 gün
    const sonGece = addDays(segCikis, -1);
    if (sonGece < segGiris) return null; // 0 gecelik geçersiz

    const startIdx = dateList.indexOf(segGiris);
    const endIdx = dateList.indexOf(sonGece);

    // Görünür aralık: hücreyi kapsayan ilk ve son indeks (clip)
    const visibleStart = startIdx >= 0 ? startIdx : (segGiris < dateList[0] ? 0 : -1);
    const visibleEnd = endIdx >= 0 ? endIdx : (sonGece > dateList[dateList.length-1] ? dateList.length - 1 : -1);
    if (visibleStart === -1 || visibleEnd === -1 || visibleStart > visibleEnd) return null;

    // Tam hücreleri kapla, kenarlarda 2px boşluk (komşu rezervasyonların yapışık görünmemesi için)
    const left = visibleStart * cellWidth + 2;
    const width = (visibleEnd - visibleStart + 1) * cellWidth - 4;
    return { left, width: Math.max(30, width) };
  };

  // Drag-to-create: hücreye basıp sürükle, bırakınca yeni rezervasyon modali açılır
  const handleCellMouseDown = (odaId, dateIdx, e) => {
    if (!can('rezervasyon', 'ekle')) return;
    if (e.button !== 0) return; // sadece sol click
    // O odada o tarihte zaten herhangi bir segment var mı? checkOverlap kullan
    const cellDate = dateList[dateIdx];
    const cellDateNext = addDays(cellDate, 1);
    if (checkOverlap(odaId, cellDate, cellDateNext)) return;
    e.preventDefault();
    setMouse({ x: e.clientX, y: e.clientY });
    setDrag({ odaId, startIdx: dateIdx, currentIdx: dateIdx });
  };

  const handleCellMouseEnter = (odaId, dateIdx) => {
    if (!drag) return;
    if (drag.odaId !== odaId) return; // farklı odaya drag yok
    setDrag(d => ({ ...d, currentIdx: dateIdx }));
  };

  // Global mouseup — drag'i bitir + mousemove takibi (tooltip için)
  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => setMouse({ x: e.clientX, y: e.clientY });
    const onUp = () => {
      if (!drag) return;
      const lo = Math.min(drag.startIdx, drag.currentIdx);
      const hi = Math.max(drag.startIdx, drag.currentIdx);
      // En az 1 hücre seçildiyse modal aç (giriş = lo, çıkış = hi+1)
      const giris = dateList[lo];
      const cikis = addDays(dateList[hi], 1);
      // Çakışma kontrolü
      if (!checkOverlap(drag.odaId, giris, cikis)) {
        setPrefillData({ odaId: drag.odaId, girisTarihi: giris, cikisTarihi: cikis });
        setCreating(true);
      }
      setDrag(null);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [drag, dateList]);

  const isCellInDrag = (odaId, dateIdx) => {
    if (!drag) return false;
    if (drag.odaId !== odaId) return false;
    const lo = Math.min(drag.startIdx, drag.currentIdx);
    const hi = Math.max(drag.startIdx, drag.currentIdx);
    return dateIdx >= lo && dateIdx <= hi;
  };

  return (
    <div className="space-y-4">
      <div className="htl-card">
        <div className="htl-card-header">
          <div className="flex items-center gap-2 flex-wrap">
            <button className="htl-btn htl-btn-ghost" onClick={() => setStartDate(addDays(startDate, -days))}>
              <Icon name="chevron-left" size={16} /><span>-{days}</span>
            </button>
            <button className="htl-btn htl-btn-ghost" onClick={() => setStartDate(addDays(todayISO(), -2))}>Bugün</button>
            <button className="htl-btn htl-btn-ghost" onClick={() => setStartDate(addDays(startDate, days))}>
              <span>+{days}</span><Icon name="chevron-right" size={16} />
            </button>
            <input type="date" className="htl-input" style={{maxWidth: 180}} value={startDate}
              onChange={e => setStartDate(e.target.value)} />

            {/* View toggle: 7/15/30 gün */}
            <div className="flex gap-0.5 p-0.5 rounded-md" style={{background: 'var(--bone-warm)'}}>
              {[7, 15, 30].map(d => (
                <button key={d} type="button" onClick={() => setDays(d)}
                  className="px-2.5 py-1 rounded text-xs font-medium transition"
                  style={{
                    background: days === d ? 'var(--bone-light)' : 'transparent',
                    color: days === d ? 'var(--forest)' : 'var(--ink-soft)',
                    boxShadow: days === d ? '0 1px 2px rgba(0,0,0,.06)' : 'none'
                  }}>{d} gün</button>
              ))}
            </div>

            <select className="htl-input" style={{maxWidth: 200}} value={filterTipId} onChange={e => setFilterTipId(e.target.value)}>
              <option value="">Tüm oda tipleri</option>
              {odaTipleri.map(t => <option key={t.id} value={t.id}>{t.ad}</option>)}
            </select>
          </div>
          <div className="flex gap-2 flex-wrap">
            {can('rezervasyon', 'duzenle') && (
              <button type="button"
                onClick={() => setEditMode(!editMode)}
                className="htl-btn"
                style={{
                  background: editMode ? 'var(--brass)' : 'transparent',
                  color: editMode ? 'white' : 'var(--ink-soft)',
                  border: `1px solid ${editMode ? 'var(--brass)' : 'var(--line)'}`
                }}>
                <Icon name={editMode ? 'check' : 'move'} size={16} stroke={editMode ? 'white' : 'currentColor'}/>
                <span>{editMode ? 'Düzenleme Aktif' : 'Düzenleme Modu'}</span>
              </button>
            )}
            {can('rezervasyon', 'ekle') && (
              <button className="htl-btn htl-btn-accent" onClick={() => { setPrefillData(null); setCreating(true); }}>
                <Icon name="plus" size={16} stroke="white"/><span>Yeni Rezervasyon</span>
              </button>
            )}
          </div>
        </div>

        {editMode ? (
          <div className="px-5 py-2 text-xs flex items-center gap-2" style={{background: 'var(--brass-soft)', color: 'var(--forest)', borderBottom: '1px solid var(--line-soft)'}}>
            <Icon name="move" size={14}/>
            <span><strong>Düzenleme modu aktif:</strong> Rezervasyon kartını başka odaya sürükleyip bırakarak taşıyabilirsiniz. Tarih aynı kalır, oda değişir. Bırakma sonrası onay sorulacak.</span>
          </div>
        ) : can('rezervasyon', 'ekle') && (
          <div className="px-5 py-2 text-xs flex items-center gap-2" style={{background: 'var(--brass-soft)', color: 'var(--forest)', borderBottom: '1px solid var(--line-soft)'}}>
            <Icon name="info" size={14}/>
            <span><strong>İpucu:</strong> Boş hücreye basıp sağa sürükleyerek yeni rezervasyon oluşturabilirsiniz.</span>
          </div>
        )}

        <div className="htl-card-body" style={{padding: 0}}>
          <div style={{overflowX: 'auto'}}>
            <div style={{minWidth: 180 + dateList.length * cellWidth, position: 'relative'}}>
              {/* Header row */}
              <div className="htl-cal-grid" style={{gridTemplateColumns: `180px repeat(${dateList.length}, ${cellWidth}px)`, borderRadius: '10px 10px 0 0'}}>
                <div className="htl-cal-header-blank" style={{padding: '8px 12px'}}>
                  <div className="text-[11px] uppercase tracking-wider" style={{color: 'rgba(244,237,224,.7)'}}>Oda</div>
                </div>
                {dateList.map(d => (
                  <div key={d} className={`htl-cal-header ${isWeekend(d) ? 'weekend' : ''}`}>
                    <div>{new Date(d).toLocaleDateString('tr-TR', {weekday: 'short'})}</div>
                    <div className="font-display text-sm">{new Date(d).getDate()}</div>
                  </div>
                ))}
              </div>

              {/* Body */}
              {filteredOdalar.length === 0 ? (
                <div className="htl-empty" style={{borderLeft: '1px solid var(--line)', borderRight: '1px solid var(--line)', borderBottom: '1px solid var(--line)', borderRadius: '0 0 10px 10px'}}>
                  Bu filtreye uygun oda yok. Önce Odalar veya Oda Tipleri sekmesinden ekleyin.
                </div>
              ) : (
                <div className="htl-cal-grid" style={{gridTemplateColumns: `180px repeat(${dateList.length}, ${cellWidth}px)`, borderRadius: '0 0 10px 10px', borderTop: 'none', userSelect: drag ? 'none' : 'auto'}}>
                  {filteredOdalar.map((oda, ri) => {
                    const tip = odaTipleri.find(t => t.id === oda.odaTipiId);
                    const resler = getResForRoom(oda.id);
                    const isDropTarget = editMode && rezDrag && rezDrag.startOdaId !== oda.id;
                    const isHovered = isDropTarget && rezDrag.hoverOdaId === oda.id;
                    // Hover edilen odada çakışma var mı? Visual feedback için
                    let dropBlocked = false;
                    if (isHovered && rezDrag.draggedSeg) {
                      dropBlocked = checkOverlap(oda.id, rezDrag.draggedSeg.girisTarihi, rezDrag.draggedSeg.cikisTarihi, rezDrag.rez.id);
                    }
                    return (
                      <React.Fragment key={oda.id}>
                        <div className="htl-cal-room-label" style={{
                          background: isHovered ? (dropBlocked ? 'var(--danger-soft)' : 'var(--success-soft)') : undefined,
                          transition: 'background 0.1s'
                        }}>
                          <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background: tip?.renk || 'var(--brass)'}} />
                          <div>
                            <div className="font-medium">Oda {oda.odaNumarasi}</div>
                            <div className="text-[10px]" style={{color: 'var(--ink-soft)'}}>{tip?.ad || '-'}</div>
                          </div>
                        </div>
                        <div
                          style={{
                            gridColumn: `2 / span ${dateList.length}`,
                            position: 'relative',
                            background: isHovered ? (dropBlocked ? 'rgba(166,69,69,.08)' : 'rgba(74,124,89,.08)') : undefined,
                            outline: isHovered ? `2px dashed ${dropBlocked ? 'var(--danger)' : 'var(--success)'}` : 'none',
                            outlineOffset: -2,
                            transition: 'background 0.1s'
                          }}
                          onDragOver={(e) => {
                            if (!isDropTarget) return;
                            e.preventDefault();
                            e.dataTransfer.dropEffect = dropBlocked ? 'none' : 'move';
                            if (rezDrag.hoverOdaId !== oda.id) {
                              setRezDrag({...rezDrag, hoverOdaId: oda.id});
                            }
                          }}
                          onDrop={(e) => {
                            if (!isDropTarget || !rezDrag.draggedSeg) return;
                            e.preventDefault();
                            const overlap = checkOverlap(oda.id, rezDrag.draggedSeg.girisTarihi, rezDrag.draggedSeg.cikisTarihi, rezDrag.rez.id);
                            if (overlap) {
                              alert(`Oda ${oda.odaNumarasi}'da bu tarih aralığında başka bir rezervasyon var. Taşıma yapılamadı.`);
                              setRezDrag(null);
                              return;
                            }
                            // Onay sor, kullanıcı kabul ederse taşı
                            setMoveConfirm({
                              rez: rezDrag.rez,
                              yeniOda: oda,
                              eskiOda: db.get('odalar', rezDrag.draggedSeg.odaId),
                              segIdx: rezDrag.segIdx
                            });
                            setRezDrag(null);
                          }}>
                          <div style={{display: 'grid', gridTemplateColumns: `repeat(${dateList.length}, ${cellWidth}px)`, position: 'absolute', inset: 0}}>
                            {dateList.map((d, di) => {
                              const inDrag = isCellInDrag(oda.id, di);
                              return (
                                <div
                                  key={d}
                                  className={`htl-cal-cell ${d === today ? 'today' : ''} ${isWeekend(d) ? 'weekend' : ''}`}
                                  style={{
                                    cursor: editMode ? 'default' : (can('rezervasyon', 'ekle') ? 'cell' : 'default'),
                                    background: inDrag ? 'var(--brass-light)' : undefined,
                                    transition: 'background 0.05s'
                                  }}
                                  onMouseDown={editMode ? undefined : ((e) => handleCellMouseDown(oda.id, di, e))}
                                  onMouseEnter={editMode ? undefined : (() => handleCellMouseEnter(oda.id, di))}
                                />
                              );
                            })}
                          </div>
                          {resler.map(({ rez: res, seg }) => {
                            const pos = computeBar(seg.girisTarihi, seg.cikisTarihi);
                            if (!pos) return null;
                            const m = db.get('misafirler', res.anaMisafirId);
                            const isBeingDragged = rezDrag && rezDrag.rez.id === res.id && rezDrag.segIdx === seg._segIdx;
                            const isMulti = seg._isMulti;
                            const segLabel = isMulti ? `${seg._segIdx + 1}/${res.segmentler.length}` : '';
                            return (
                              <div key={`${res.id}-${seg._segIdx}`} className="htl-res-bar"
                                draggable={editMode && can('rezervasyon', 'duzenle')}
                                onDragStart={(e) => {
                                  if (!editMode) { e.preventDefault(); return; }
                                  setRezDrag({ rez: res, startOdaId: oda.id, hoverOdaId: oda.id, draggedSeg: seg, segIdx: seg._segIdx });
                                  e.dataTransfer.effectAllowed = 'move';
                                  try { e.dataTransfer.setData('text/plain', res.id); } catch (err) {}
                                }}
                                onDragEnd={() => setRezDrag(null)}
                                style={{
                                  ...pos, ...getResStyle(res, seg),
                                  cursor: editMode ? 'grab' : 'pointer',
                                  opacity: isBeingDragged ? 0.4 : 1,
                                  outline: editMode ? '1px dashed rgba(255,255,255,.6)' : 'none',
                                  outlineOffset: -3
                                }}
                                onClick={() => { if (!editMode) setEditingRez(res); }}
                                title={editMode
                                  ? `${isMulti ? `[${segLabel}] ` : ''}Sürükleyin / Makas ile böl: ${m ? m.ad+' '+m.soyad : ''} · ${fmtDateTR(seg.girisTarihi)} → ${fmtDateTR(seg.cikisTarihi)}`
                                  : `${isMulti ? `[${segLabel}] ` : ''}${m ? m.ad+' '+m.soyad : ''} · ${fmtDateTR(seg.girisTarihi)} → ${fmtDateTR(seg.cikisTarihi)}`}>
                                <Icon name={isMulti ? 'link' : (editMode ? 'move' : 'user')} size={12} stroke="white" strokeWidth={2.5} />
                                <span className="ml-1 truncate">{m ? `${m.ad} ${m.soyad}` : res.rezervasyonKodu}{isMulti ? ` · ${segLabel}` : ''}</span>

                                {/* Edit modunda makas (böl) butonu — sağ üst köşede */}
                                {editMode && can('rezervasyon', 'duzenle') && pos.width > 60 && (
                                  <button
                                    type="button"
                                    draggable={false}
                                    onMouseDown={e => e.stopPropagation()}
                                    onClick={e => {
                                      e.stopPropagation();
                                      e.preventDefault();
                                      setSplitTarget(res);
                                    }}
                                    title={isMulti ? 'Bölmeyi geri al' : 'Rezervasyonu böl'}
                                    style={{
                                      position: 'absolute',
                                      top: 2, right: 2,
                                      width: 18, height: 18,
                                      padding: 0,
                                      background: 'rgba(255,255,255,.95)',
                                      border: 'none',
                                      borderRadius: 4,
                                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                                      cursor: 'pointer',
                                      boxShadow: '0 1px 2px rgba(0,0,0,.2)'
                                    }}>
                                    <Icon name={isMulti ? 'undo-2' : 'scissors'} size={11} stroke="var(--forest)" strokeWidth={2.5}/>
                                  </button>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </React.Fragment>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* Legend */}
          <div className="px-5 py-3 flex flex-wrap gap-4 items-center text-xs" style={{borderTop: '1px solid var(--line-soft)', color: 'var(--ink-soft)'}}>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded" style={{background: 'var(--brass-soft)'}}/>Bugün</div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded" style={{background: 'var(--bone-warm)'}}/>Hafta sonu</div>
            {odaTipleri.map(t => (
              <div key={t.id} className="flex items-center gap-2">
                <div className="w-3 h-3 rounded" style={{background: t.renk}}/>{t.ad}
              </div>
            ))}
          </div>
        </div>
      </div>

      <ReservationFormModal
        open={creating || !!editingRez}
        onClose={() => { setCreating(false); setEditingRez(null); setPrefillData(null); }}
        rezervasyon={editingRez}
        prefill={prefillData}
        onSaved={refresh}
      />

      {/* Oda taşıma onay modalı */}
      <ConfirmModal
        open={!!moveConfirm}
        title="Oda Değişikliği Onayı"
        msg={moveConfirm
          ? (() => {
              const m = db.get('misafirler', moveConfirm.rez.anaMisafirId);
              const ad = m ? `${m.ad} ${m.soyad}` : moveConfirm.rez.rezervasyonKodu;
              const segs = getOdaSegmentleri(moveConfirm.rez);
              const seg = segs[moveConfirm.segIdx] || segs[0];
              const isMulti = segs.length > 1;
              return `"${ad}" rezervasyonu${isMulti ? ` ${moveConfirm.segIdx+1}/${segs.length}. segmenti` : ''} Oda ${moveConfirm.eskiOda?.odaNumarasi || '?'} → Oda ${moveConfirm.yeniOda.odaNumarasi}'a taşınacak (${fmtDateTR(seg.girisTarihi)} → ${fmtDateTR(seg.cikisTarihi)}). Onaylıyor musunuz?`;
            })()
          : ''}
        onConfirm={() => {
          const r = moveConfirm.rez;
          const segs = getOdaSegmentleri(r);
          const isMulti = r.segmentler && r.segmentler.length > 0;
          if (isMulti) {
            // Sadece ilgili segmenti güncelle
            const newSegs = r.segmentler.map((s, idx) => idx === moveConfirm.segIdx
              ? { ...s, odaId: moveConfirm.yeniOda.id, odaTipiId: moveConfirm.yeniOda.odaTipiId }
              : s
            );
            // Ana rez'in odaId'si ilk segment'in odaId'siyle senkron tutulsun (geriye uyum)
            db.update('rezervasyonlar', r.id, {
              segmentler: newSegs,
              odaId: newSegs[0].odaId,
              odaTipiId: newSegs[0].odaTipiId
            });
          } else {
            // Bölünmemiş: tüm rezervasyonun odasını değiştir
            db.update('rezervasyonlar', r.id, {
              odaId: moveConfirm.yeniOda.id,
              odaTipiId: moveConfirm.yeniOda.odaTipiId
            });
          }
          setMoveConfirm(null);
          refresh();
        }}
        onCancel={() => setMoveConfirm(null)} />

      {/* Oda taşıma onay modalı sonrası — Bölme modalı */}
      <SplitModal
        target={splitTarget}
        odalar={odalar}
        odaTipleri={odaTipleri}
        onClose={() => setSplitTarget(null)}
        onSaved={() => { setSplitTarget(null); refresh(); }}
      />

      {drag && (() => {
        const lo = Math.min(drag.startIdx, drag.currentIdx);
        const hi = Math.max(drag.startIdx, drag.currentIdx);
        const geceler = (hi - lo) + 1;
        const giris = dateList[lo];
        const cikis = addDays(dateList[hi], 1);
        const oda = odalar.find(o => o.id === drag.odaId);
        return (
          <div style={{
            position: 'fixed',
            left: mouse.x + 16, top: mouse.y - 12,
            zIndex: 99,
            background: 'var(--forest)',
            color: 'var(--bone-light)',
            padding: '8px 14px',
            borderRadius: 8,
            pointerEvents: 'none',
            fontSize: 13,
            boxShadow: '0 6px 20px rgba(0,0,0,.25)',
            whiteSpace: 'nowrap',
            border: '1px solid var(--brass)'
          }}>
            <div style={{fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 500, color: 'var(--brass-light)'}}>
              {geceler} gece
            </div>
            <div style={{fontSize: 11, opacity: .85, marginTop: 2}}>
              {fmtDateShort(giris)} → {fmtDateShort(cikis)}
            </div>
            {oda && (
              <div style={{fontSize: 10, opacity: .7, marginTop: 1}}>
                Oda {oda.odaNumarasi}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
};

/* ========================================================================
   GIDER MODAL — gider ekle/düzenle
