const GiderModal = ({ open, onClose, gider, hesaplar, kategoriler, ana, onSaved, userId, showToast }) => {
  const [form, setForm] = useState({});
  const kurlar = getActiveKurlar();

  useEffect(() => {
    if (!open) return;
    if (gider) {
      setForm({
        ...gider,
        paraBirimi: gider.paraBirimi || ana,
        kur: gider.kur || 1
      });
    } else {
      const aktifKat = kategoriler.filter(k => k.aktif !== false);
      // Ana para birimindeki ilk aktif hesabı varsayılan seç
      const aktifHesaplar = hesaplar.filter(h => h.aktif !== false);
      const anaPBHesap = aktifHesaplar.find(h => (h.paraBirimi || ana) === ana) || aktifHesaplar[0];
      setForm({
        kategoriId: aktifKat[0]?.id || '',
        hesapId: anaPBHesap?.id || '',
        tutar: '',
        paraBirimi: ana,    // varsayılan ana para birimi
        kur: 1,
        tarih: todayISO(),
        aciklama: ''
      });
    }
  }, [open, gider]);

  const formPB = form.paraBirimi || ana;
  const isFarkli = formPB !== ana;
  const otoKur = isFarkli && kurlar ? cevirKur(1, formPB, ana, kurlar) : null;
  const aktifKur = (isFarkli && Number(form.kur) > 0) ? Number(form.kur) : otoKur;
  const tutarAnaPreview = (isFarkli && aktifKur) ? Number(form.tutar||0) * aktifKur : Number(form.tutar||0);

  const seciliHesap = form.hesapId ? hesaplar.find(h => h.id === form.hesapId) : null;
  const hesapPB = seciliHesap ? (seciliHesap.paraBirimi || ana) : ana;
  const seciliKat = form.kategoriId ? kategoriler.find(k => k.id === form.kategoriId) : null;

  // Sadece form'un para birimi ile aynı PB'deki aktif hesaplar
  const uygunHesaplar = hesaplar.filter(h => h.aktif !== false && (h.paraBirimi || ana) === formPB);

  const save = () => {
    if (!form.kategoriId) return showToast('Kategori seçilmeli.', 'error');
    if (!form.hesapId) return showToast('Hesap seçilmeli.', 'error');
    if (!form.tutar || Number(form.tutar) <= 0) return showToast('Tutar 0\'dan büyük olmalı.', 'error');
    try {
      const payload = {
        kategoriId: form.kategoriId,
        hesapId: form.hesapId,
        tutar: Number(form.tutar),
        paraBirimi: formPB,
        kur: formPB !== ana ? Number(form.kur) || undefined : 1,
        tarih: form.tarih,
        aciklama: form.aciklama
      };
      if (gider) {
        updateGiderWithHareket(gider.id, payload);
        showToast('Gider güncellendi.');
      } else {
        addGiderWithHareket(payload, userId);
        showToast('Gider kaydedildi, hesaptan düşüldü.');
      }
      onSaved?.();
      onClose();
    } catch (e) {
      showToast('Hata: ' + e.message, 'error');
    }
  };

  const aktifKat = kategoriler.filter(k => k.aktif !== false);

  return (
    <Modal open={open} onClose={onClose}
      title={gider ? 'Gideri Düzenle' : 'Yeni Gider'} size="lg"
      footer={<>
        <button className="htl-btn htl-btn-ghost" onClick={onClose}>Vazgeç</button>
        <button className="htl-btn htl-btn-primary" onClick={save} disabled={uygunHesaplar.length === 0}><Icon name="save" size={16}/>Kaydet</button>
      </>}>
      <div className="space-y-4">
        <div>
          <label className="htl-label">Kategori *</label>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {aktifKat.map(k => (
              <button key={k.id} type="button" onClick={() => setForm({...form, kategoriId: k.id})}
                className="px-3 py-3 rounded-lg flex items-center gap-2 text-left transition"
                style={{
                  background: form.kategoriId === k.id ? k.renk : 'var(--bone-warm)',
                  color: form.kategoriId === k.id ? 'white' : 'var(--ink)',
                  border: `1px solid ${form.kategoriId === k.id ? k.renk : 'var(--line-soft)'}`
                }}>
                <Icon name={k.icon || 'tag'} size={16} stroke={form.kategoriId === k.id ? 'white' : k.renk}/>
                <span className="text-xs font-medium truncate">{k.ad}</span>
              </button>
            ))}
          </div>
          {aktifKat.length === 0 && (
            <div className="text-xs mt-2" style={{color: 'var(--danger)'}}>Aktif kategori yok. Önce Ayarlar &gt; Gider Kategorileri'nden ekleyin.</div>
          )}
        </div>

        <div className="grid md:grid-cols-3 gap-3">
          <div className="md:col-span-2">
            <label className="htl-label">Tutar *</label>
            <input type="number" min="0" step="0.01" className="htl-input" value={form.tutar||''} onChange={e=>setForm({...form, tutar:e.target.value})}/>
          </div>
          <div>
            <label className="htl-label">Para Birimi</label>
            <select className="htl-input" value={formPB} onChange={e => {
              const yeniPB = e.target.value;
              // Para birimi değişince uygun hesaba geç
              const yeniUygun = hesaplar.filter(h => h.aktif !== false && (h.paraBirimi || ana) === yeniPB);
              const yeniHesapId = yeniUygun[0]?.id || '';

        {/* Para birimi için uygun hesap yoksa uyarı */}
        {uygunHesaplar.length === 0 && (

            <Icon name="alert-circle" size={16}/>
            <span><strong>{formPB} cinsinden hesap yok.</strong> Önce Hesaplar sekmesinden bir {formPB} hesabı açın (örn. "{PARA_BIRIMI_INFO(formPB).l} Kasa").</span>
          </div>
        )}

        {/* Farklı para birimiyse kur ve dönüşüm bilgisi */}
        {isFarkli && uygunHesaplar.length > 0 && (
          <div className="rounded-md p-3" style={{background: 'var(--brass-soft)', border: '1px solid var(--brass-light)'}}>
            <div className="grid md:grid-cols-2 gap-3 items-end">
              <div>
                <label className="htl-label" style={{margin: 0, marginBottom: 4}}>
                  Kur (1 {formPB} = ? {ana}) — raporlamada kullanılır
                </label>
                <div className="flex gap-2">
                  <input type="number" min="0" step="0.0001" className="htl-input"
                    placeholder={otoKur ? otoKur.toFixed(4) : 'Manuel girin'}
                    value={form.kur || ''}
                    onChange={e => setForm({...form, kur: e.target.value})}/>
                  {otoKur && (
                    <button type="button" className="htl-btn htl-btn-ghost"
                      onClick={() => setForm({...form, kur: otoKur.toFixed(4)})}

                      <Icon name="refresh-cw" size={14}/>

                </div>
                <div className="text-[11px] mt-1" style={{color: 'var(--ink-soft)'}}>

        )}

        <div className="grid md:grid-cols-2 gap-3">
          <div>
            <label className="htl-label">Tarih *</label>
            <input type="date" className="htl-input" value={form.tarih||''} onChange={e=>setForm({...form, tarih:e.target.value})}/>

          <div>
            <label className="htl-label">Hesap (ödenen yer) * <span style={{textTransform: 'none', color: 'var(--ink-faint)', fontWeight: 'normal'}}>(sadece {formPB} hesapları)</span></label>
            <select className="htl-input" value={form.hesapId||''} onChange={e=>setForm({...form, hesapId:e.target.value})}>
              <option value="">— Seçiniz —</option>
              {uygunHesaplar.map(h => {
                const pb = h.paraBirimi || ana;
                return <option key={h.id} value={h.id}>{h.ad} ({fmtMoney(getHesapBakiye(h.id), pb)})</option>;
              })}
            </select>
          </div>
          <div className="md:col-span-2">
            <label className="htl-label">Açıklama</label>
            <input className="htl-input" placeholder={seciliKat ? `Örn: ${seciliKat.ad} - Mart` : 'Detay...'} value={form.aciklama||''} onChange={e=>setForm({...form, aciklama:e.target.value})}/>
          </div>
        </div>

        {/* Bakiye etkisi önizleme */}
        {seciliHesap && Number(form.tutar) > 0 && uygunHesaplar.length > 0 && (

              <span style={{color: 'var(--ink-soft)'}}>· Raporda: <strong style={{color: 'var(--danger)'}}>−{fmtMoney(tutarAnaPreview, ana)}</strong></span>

        )}
      </div>
    </Modal>
  );

const AccountingPage = () => {
  const { can, user } = useAuth();

  const refresh = () => setRefreshKey(k => k+1);
  const [tab, setTab] = useState('hesaplar');
  const [creatingTah, setCreatingTah] = useState(false);
  const [editingTah, setEditingTah] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [transferOpen, setTransferOpen] = useState(false);
  const [hesapDetay, setHesapDetay] = useState(null);
  const [hesapForm, setHesapForm] = useState(null); // { editing: hesap | null, creating: boolean }
  const [confirmHesapDel, setConfirmHesapDel] = useState(null);
  const [creatingGider, setCreatingGider] = useState(false);
  const [editingGider, setEditingGider] = useState(null);
  const [confirmGiderDel, setConfirmGiderDel] = useState(null);
  const [giderFilterKategori, setGiderFilterKategori] = useState('');

  const tahsilatlar = db.list('tahsilatlar');
  const reservations = db.list('rezervasyonlar');
  const misafirler = db.list('misafirler');
  const odalar = db.list('odalar');
  const hesaplar = db.list('hesaplar');
  const hareketler = db.list('hesapHareketleri');
  const giderler = db.list('giderler');
  const giderKategorileri = db.list('giderKategorileri');

  const today = todayISO();
  const ayBaslangic = new Date(); ayBaslangic.setDate(1); ayBaslangic.setHours(0,0,0,0); const ayBasIso = ayBaslangic.toISOString().slice(0,10);
  const yilBaslangic = new Date(); yilBaslangic.setMonth(0,1); yilBaslangic.setHours(0,0,0,0); const yilBasIso = yilBaslangic.toISOString().slice(0,10);

  const sumTahsilat = (filterFn) => tahsilatlar.filter(filterFn).reduce((s,t) => s + Number(t.tutarAna != null ? t.tutarAna : t.tutar||0), 0);
  const bugun = sumTahsilat(t => t.tarih === today);
  const buAy  = sumTahsilat(t => t.tarih >= ayBasIso);
  const buYil = sumTahsilat(t => t.tarih >= yilBasIso);
  const ana = getAnaParaBirimi();
  const kurlar = getActiveKurlar();
  const toplamBakiye = hesaplar.reduce((s, h) => {
    const ba = getHesapBakiyeAna(h.id);
    return s + (ba != null ? ba : 0);
  }, 0);
  const kurlarYok = hesaplar.some(h => {
    const pb = h.paraBirimi || ana;
    return pb !== ana && getHesapBakiyeAna(h.id) == null && getHesapBakiye(h.id) !== 0;
  });

  // Bakiye listesi
  const bakiyeRows = reservations
    .filter(r => r.durum !== 'iptal' && r.durum !== 'no-show')
    .map(r => {
      const odenen = sumTahsilat(t => t.rezervasyonId === r.id);
      const kalan = Number(r.toplamTutar||0) - odenen;
      return { rez: r, odenen, kalan };
    })
    .sort((a,b) => b.kalan - a.kalan);

  const tahsilatlarSorted = [...tahsilatlar].sort((a,b) => (b.tarih+'').localeCompare(a.tarih+''));

  /* -- Tahsilat Modal -- */
  const TahsilatModal = () => {
    const target = editingTah;
    const ana = getAnaParaBirimi();
    const kurlar = getActiveKurlar();
    const [form, setForm] = useState({});
    useEffect(() => {
      if (!creatingTah && !editingTah) return;
      if (target) {
        setForm({ ...target, paraBirimi: target.paraBirimi || ana, kur: target.kur || 1 });
      } else {
        const ilkAktifHesap = hesaplar.find(h => h.aktif !== false) || hesaplar[0];
        setForm({
          rezervasyonId: '', tutar: '', tarih: todayISO(),
          odemeYontemi: 'nakit', hesapId: ilkAktifHesap?.id || '',
          paraBirimi: ana, kur: 1,
          aciklama: ''
        });
      }
    }, [target, creatingTah]);

    // Ödeme yöntemi seçilince varsayılan hesabı öner (henüz hesapId boşsa)
    useEffect(() => {
      if (!form.odemeYontemi) return;
      if (form.hesapId) return;
      let onerilen = null;
      if (form.odemeYontemi === 'kredi-karti') onerilen = hesaplar.find(h => h.tip === 'pos');
      else if (form.odemeYontemi === 'havale') onerilen = hesaplar.find(h => h.tip === 'banka');
      else if (form.odemeYontemi === 'nakit') onerilen = hesaplar.find(h => h.tip === 'kasa');
      if (onerilen) setForm(f => ({ ...f, hesapId: onerilen.id }));
    }, [form.odemeYontemi]);

    const save = () => {
      if (!form.rezervasyonId) return show('Rezervasyon seçilmeli.', 'error');
      if (!form.hesapId) return show('Hesap seçilmeli.', 'error');
      if (!form.tutar || Number(form.tutar) <= 0) return show('Tutar 0\'dan büyük olmalı.', 'error');
      const payload = {
        ...form,
        tutar: Number(form.tutar),
        paraBirimi: form.paraBirimi || ana,
        kur: form.paraBirimi !== ana ? Number(form.kur) || undefined : 1
      };
      try {
        if (target) {
          updateTahsilatWithHareket(target.id, payload);
          show('Tahsilat güncellendi.');
        } else {
          addTahsilatWithHareket(payload, user?.id);
          show('Tahsilat eklendi, hesaba yansıdı.');
        }
        refresh();
        setCreatingTah(false); setEditingTah(null);
      } catch (e) {
        show('Hata: ' + e.message, 'error');
      }
    };

    const aktifRezler = reservations.filter(r => r.durum !== 'iptal' && r.durum !== 'no-show');
    const seciliRez = form.rezervasyonId ? reservations.find(r => r.id === form.rezervasyonId) : null;
    const seciliRezOdenen = seciliRez ? sumTahsilat(t => t.rezervasyonId === seciliRez.id && t.id !== target?.id) : 0;
    const seciliRezKalan = seciliRez ? Number(seciliRez.toplamTutar||0) - seciliRezOdenen : 0;

    const formPB = form.paraBirimi || ana;
    const isFarkli = formPB !== ana;
    const otoKur = isFarkli && kurlar ? cevirKur(1, formPB, ana, kurlar) : null;
    const aktifKur = (isFarkli && Number(form.kur) > 0) ? Number(form.kur) : otoKur;
    const tutarAnaPreview = (isFarkli && aktifKur) ? Number(form.tutar||0) * aktifKur : Number(form.tutar||0);
    const uygunHesaplar = hesaplar.filter(h => h.aktif !== false && (h.paraBirimi || ana) === formPB);

    return (
      <Modal open={creatingTah || !!editingTah} onClose={() => { setCreatingTah(false); setEditingTah(null); }}
        title={target ? 'Tahsilatı Düzenle' : 'Yeni Tahsilat'} size="lg"
        footer={<>
          <button className="htl-btn htl-btn-ghost" onClick={() => { setCreatingTah(false); setEditingTah(null); }}>Vazgeç</button>
          <button className="htl-btn htl-btn-primary" onClick={save}><Icon name="save" size={16}/>Kaydet</button>
        </>}>
        <div className="grid md:grid-cols-3 gap-4">
          <div className="md:col-span-3">
            <label className="htl-label">Rezervasyon *</label>
            <select className="htl-input" value={form.rezervasyonId||''} onChange={e=>setForm({...form, rezervasyonId:e.target.value})}>
              <option value="">— Seçiniz —</option>
              {aktifRezler.map(r => {
                const m = misafirler.find(x => x.id === r.anaMisafirId);
                const odenen = sumTahsilat(t => t.rezervasyonId === r.id);
                const kalan = Number(r.toplamTutar||0) - odenen;
                return <option key={r.id} value={r.id}>{r.rezervasyonKodu} — {m ? m.ad+' '+m.soyad : ''} — Kalan: {fmtMoney(kalan, ana)}</option>;
              })}
            </select>
            {seciliRez && (
              <div className="mt-2 px-3 py-2 rounded-md text-xs flex items-center gap-3 flex-wrap" style={{background: 'var(--bone-warm)', color: 'var(--ink-soft)'}}>
                <span>Toplam: <strong style={{color: 'var(--ink)'}}>{fmtMoney(seciliRez.toplamTutar, ana)}</strong></span>
                <span>Ödenen: <strong style={{color: 'var(--success)'}}>{fmtMoney(seciliRezOdenen, ana)}</strong></span>
                <span>Kalan: <strong style={{color: seciliRezKalan > 0 ? 'var(--danger)' : 'var(--success)'}}>{fmtMoney(seciliRezKalan, ana)}</strong></span>
              </div>
            )}
          </div>
          <div><label className="htl-label">Tarih *</label><input type="date" className="htl-input" value={form.tarih||''} onChange={e=>setForm({...form, tarih:e.target.value})}/></div>
          <div className="md:col-span-1"><label className="htl-label">Tutar *</label><input type="number" min="0" step="0.01" className="htl-input" value={form.tutar||''} onChange={e=>setForm({...form, tutar:e.target.value})}/></div>
          <div><label className="htl-label">Para Birimi</label>
            <select className="htl-input" value={formPB} onChange={e => {
              const yeniPB = e.target.value;
              const yeniUygun = hesaplar.filter(h => h.aktif !== false && (h.paraBirimi || ana) === yeniPB);
              let yeniHesapId = '';
              if (form.odemeYontemi === 'kredi-karti') yeniHesapId = yeniUygun.find(h => h.tip === 'pos')?.id || '';
              else if (form.odemeYontemi === 'havale') yeniHesapId = yeniUygun.find(h => h.tip === 'banka')?.id || '';
              else if (form.odemeYontemi === 'nakit') yeniHesapId = yeniUygun.find(h => h.tip === 'kasa')?.id || '';
              if (!yeniHesapId) yeniHesapId = yeniUygun[0]?.id || '';
              setForm({...form, paraBirimi: yeniPB, hesapId: yeniHesapId, kur: yeniPB === ana ? 1 : ''});
            }}>
              {PARA_BIRIMI_OPTS.map(p => <option key={p.v} value={p.v}>{p.symbol} {p.l}</option>)}
            </select>
          </div>

          {uygunHesaplar.length === 0 && (
            <div className="md:col-span-3 px-3 py-2 rounded-md text-sm flex items-start gap-2" style={{background: 'var(--danger-soft)', color: 'var(--danger)'}}>
              <Icon name="alert-circle" size={16}/>
              <span><strong>{formPB} cinsinden hesap yok.</strong> Önce Hesaplar sekmesinden bir {formPB} hesabı açın.</span>
            </div>
          )}

          {isFarkli && uygunHesaplar.length > 0 && (
            <div className="md:col-span-3 rounded-md p-3" style={{background: 'var(--brass-soft)', border: '1px solid var(--brass-light)'}}>
              <div className="grid md:grid-cols-2 gap-3 items-end">
                <div>
                  <label className="htl-label" style={{margin: 0, marginBottom: 4}}>Kur (1 {formPB} = ? {ana}) — bakiyeden düşmek için</label>
                  <div className="flex gap-2">
                    <input type="number" min="0" step="0.0001" className="htl-input"
                      placeholder={otoKur ? otoKur.toFixed(4) : 'Manuel girin'}
                      value={form.kur || ''}
                      onChange={e => setForm({...form, kur: e.target.value})}/>
                    {otoKur && (
                      <button type="button" className="htl-btn htl-btn-ghost"
                        onClick={() => setForm({...form, kur: otoKur.toFixed(4)})}
                        title="Canlı kuru kullan">
                        <Icon name="refresh-cw" size={14}/>
                      </button>
                    )}
                  </div>
                  <div className="text-[11px] mt-1" style={{color: 'var(--ink-soft)'}}>
                    {otoKur
                      ? `Canlı kur: 1 ${formPB} = ${otoKur.toFixed(4)} ${ana}${kurlar?.isManual ? ' (manuel)' : ''}`
                      : 'Canlı kur yok — manuel girin'}
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-[11px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Bakiyeden Düşülecek</div>
                  <div className="font-display text-xl font-medium" style={{color: 'var(--forest)'}}>
                    {aktifKur ? fmtMoney(tutarAnaPreview, ana) : '—'}
                  </div>
                </div>
              </div>
            </div>
          )}

          <div><label className="htl-label">Ödeme Yöntemi</label>
            <select className="htl-input" value={form.odemeYontemi||'nakit'} onChange={e=>setForm({...form, odemeYontemi:e.target.value})}>
              {ODEME_OPTS.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          </div>
          <div className="md:col-span-2">
            <label className="htl-label">Hesap * <span style={{textTransform: 'none', color: 'var(--ink-faint)', fontWeight: 'normal'}}>(sadece {formPB} hesapları)</span></label>
            <select className="htl-input" value={form.hesapId||''} onChange={e=>setForm({...form, hesapId:e.target.value})}>
              <option value="">— Seçiniz —</option>
              {uygunHesaplar.map(h => <option key={h.id} value={h.id}>{h.ad} ({fmtMoney(getHesapBakiye(h.id), formPB)})</option>)}
            </select>
          </div>
          <div className="md:col-span-3"><label className="htl-label">Açıklama</label><input className="htl-input" value={form.aciklama||''} onChange={e=>setForm({...form, aciklama:e.target.value})}/></div>
        </div>
      </Modal>
    );
  };

  /* -- Hesap Form Modal -- */
  const HesapFormModal = () => {
    const target = hesapForm?.editing;
    const isOpen = !!hesapForm && (hesapForm.creating || !!hesapForm.editing);
    const [form, setForm] = useState({});
    useEffect(() => {
      if (!isOpen) return;
      const ana = getAnaParaBirimi();
      if (target) setForm({ ...target, paraBirimi: target.paraBirimi || ana });
      else setForm({ ad: '', tip: 'kasa', paraBirimi: ana, renk: HESAP_TIP_INFO('kasa').renk, aciklama: '', aktif: true });
    }, [isOpen, target?.id]);

    const harSayisi = target ? hareketler.filter(h => h.hesapId === target.id).length : 0;
    const paraBirimiKilitli = target && harSayisi > 0; // mevcut hareketler varsa para birimi değiştirilemez

    const save = () => {
      if (!form.ad) return show('Ad zorunlu.', 'error');
      if (!form.paraBirimi) return show('Para birimi seçilmeli.', 'error');
      if (target) {
        // Para birimi değişimi engellenir (hareketler bozulmasın)
        const finalForm = paraBirimiKilitli ? { ...form, paraBirimi: target.paraBirimi } : form;
        db.update('hesaplar', target.id, finalForm); show('Hesap güncellendi.');
      } else {
        db.add('hesaplar', { ...form, olusturmaTarihi: new Date().toISOString() }); show('Hesap eklendi.');
      }
      refresh();
      setHesapForm(null);
    };

    return (
      <Modal open={isOpen} onClose={() => setHesapForm(null)}
        title={target ? 'Hesabı Düzenle' : 'Yeni Hesap'}
        footer={<>
          <button className="htl-btn htl-btn-ghost" onClick={() => setHesapForm(null)}>Vazgeç</button>
          <button className="htl-btn htl-btn-primary" onClick={save}><Icon name="save" size={16}/>Kaydet</button>
        </>}>
        <div className="grid md:grid-cols-2 gap-4">
          <div className="md:col-span-2"><label className="htl-label">Ad *</label><input className="htl-input" placeholder="Örn: Euro Kasa, TR Banka..." value={form.ad||''} onChange={e=>setForm({...form, ad:e.target.value})}/></div>

          <div className="md:col-span-2">
            <label className="htl-label">Hesap Tipi</label>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
              {HESAP_TIP_OPTS.map(t => (
                <button key={t.v} type="button" onClick={() => setForm({...form, tip: t.v, renk: t.renk})}
                  className="px-3 py-3 rounded-lg flex flex-col items-center gap-1 text-xs font-medium transition"
                  style={{
                    background: form.tip === t.v ? t.renk : 'var(--bone-warm)',
                    color: form.tip === t.v ? 'white' : 'var(--ink-soft)',
                    border: `1px solid ${form.tip === t.v ? t.renk : 'var(--line-soft)'}`
                  }}>
                  <Icon name={t.icon} size={20} stroke={form.tip === t.v ? 'white' : 'currentColor'} />
                  <span>{t.l}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="md:col-span-2">
            <label className="htl-label">Para Birimi *</label>
            <div className="grid grid-cols-4 gap-2">
              {PARA_BIRIMI_OPTS.map(p => (
                <button key={p.v} type="button"
                  disabled={paraBirimiKilitli}
                  onClick={() => setForm({...form, paraBirimi: p.v})}
                  className="px-3 py-3 rounded-lg flex flex-col items-center gap-1 text-xs font-medium transition"
                  style={{
                    background: form.paraBirimi === p.v ? 'var(--forest)' : 'var(--bone-warm)',
                    color: form.paraBirimi === p.v ? 'var(--bone-light)' : 'var(--ink)',
                    border: `1px solid ${form.paraBirimi === p.v ? 'var(--forest)' : 'var(--line-soft)'}`,
                    opacity: paraBirimiKilitli && form.paraBirimi !== p.v ? 0.4 : 1,
                    cursor: paraBirimiKilitli ? 'not-allowed' : 'pointer'
                  }}>
                  <div className="font-display text-xl font-medium">{p.symbol}</div>
                  <div className="text-[10px]">{p.l}</div>
                </button>
              ))}
            </div>
            {paraBirimiKilitli && (
              <div className="text-xs mt-2 px-3 py-2 rounded-md flex items-start gap-2" style={{background: 'var(--warn-soft)', color: 'var(--warn)'}}>
                <Icon name="lock" size={14}/>
                <span>Bu hesapta {harSayisi} hareket var, para birimi değiştirilemez. Yeni hesap açıp eski hesabı pasif yapabilirsiniz.</span>
              </div>
            )}
          </div>

          <div className="md:col-span-2"><label className="htl-label">Açıklama</label><input className="htl-input" value={form.aciklama||''} onChange={e=>setForm({...form, aciklama:e.target.value})}/></div>
          <div className="md:col-span-2 flex items-center gap-3">
            <div className={`htl-switch ${form.aktif ? 'on' : ''}`} onClick={() => setForm({...form, aktif: !form.aktif})}/>
            <label className="htl-label" style={{margin: 0}}>Aktif (kapatılan hesap tahsilatlarda görünmez)</label>
          </div>
        </div>
      </Modal>
    );
  };

  /* -- Transfer Modal -- */
  const TransferModal = () => {
    const [tab, setTab] = useState('normal'); // 'normal' | 'doviz'
    const [form, setForm] = useState({});
    useEffect(() => {
      if (!transferOpen) return;
      const aktif = hesaplar.filter(h => h.aktif !== false);
      setForm({
        kaynakId: aktif[0]?.id || '',
        hedefId:  aktif[1]?.id || aktif[0]?.id || '',
        tutar: '',                  // normal transfer için
        kaynakTutar: '',            // döviz için: kaynak hesaptan çıkan
        hedefTutar: '',             // döviz için: hedef hesaba giren
        tarih: todayISO(), aciklama: ''
      });
      setTab('normal');
    }, [transferOpen]);

    const aktifHesaplar = hesaplar.filter(h => h.aktif !== false);
    const kaynak = form.kaynakId ? hesaplar.find(h => h.id === form.kaynakId) : null;
    const hedef  = form.hedefId  ? hesaplar.find(h => h.id === form.hedefId)  : null;
    const kPB = kaynak?.paraBirimi || getAnaParaBirimi();
    const hPB = hedef?.paraBirimi  || getAnaParaBirimi();
    const ayniPB = kaynak && hedef && kPB === hPB;

    // Tab seçenekleri sınırlı: aynı PB ise normal, farklı PB ise döviz öneriliyor
    // Kullanıcı zorlasa da farklı PB için "normal" seçemiyor
    const canNormal = ayniPB;
    const canDoviz = !!kaynak && !!hedef && form.kaynakId !== form.hedefId;

    // Tab otomatik geçiş — para birimleri farklıysa döviz tab'ına geç
    useEffect(() => {
      if (!kaynak || !hedef) return;
      if (!ayniPB && tab === 'normal') setTab('doviz');
      if (ayniPB && tab === 'doviz') setTab('normal'); // farklıyken döviz açık + sonra aynıya geri dönerse normale al
    }, [form.kaynakId, form.hedefId]);

    // Döviz için otomatik kur önerisi
    const otoKurDoviz = (canDoviz && kPB !== hPB) ? cevirKur(1, kPB, hPB) : null;
    // Kullanıcı kaynakTutar girince hedef tutar otomatik öneri (kullanıcı override edebilir)
    const onerilenHedefTutar = (Number(form.kaynakTutar) > 0 && otoKurDoviz)
      ? (Number(form.kaynakTutar) * otoKurDoviz)
      : null;
    const efKur = (Number(form.kaynakTutar) > 0 && Number(form.hedefTutar) > 0)
      ? Number(form.hedefTutar) / Number(form.kaynakTutar)
      : null;

    const save = () => {
      try {
        if (!form.kaynakId || !form.hedefId) return show('Kaynak ve hedef hesap seçilmeli.', 'error');
        if (form.kaynakId === form.hedefId) return show('Kaynak ve hedef aynı olamaz.', 'error');
        if (tab === 'normal') {
          if (!ayniPB) return show('Farklı para birimleri için "Döviz Transferi" sekmesini kullanın.', 'error');
          if (!form.tutar || Number(form.tutar) <= 0) return show('Tutar 0\'dan büyük olmalı.', 'error');
          yapTransfer({
            kaynakId: form.kaynakId, hedefId: form.hedefId,
            tutar: Number(form.tutar), tarih: form.tarih, aciklama: form.aciklama
          });
          show('Transfer yapıldı.');
        } else {
          if (!form.kaynakTutar || Number(form.kaynakTutar) <= 0) return show('Kaynak tutarı 0\'dan büyük olmalı.', 'error');
          if (!form.hedefTutar  || Number(form.hedefTutar)  <= 0) return show('Hedef tutarı 0\'dan büyük olmalı.', 'error');
          yapDovizTransfer({
            kaynakId: form.kaynakId, hedefId: form.hedefId,
            kaynakTutar: Number(form.kaynakTutar),
            hedefTutar: Number(form.hedefTutar),
            tarih: form.tarih, aciklama: form.aciklama
          });
          show('Döviz transferi yapıldı.');
        }
        refresh();
        setTransferOpen(false);
      } catch (e) {
        show('Hata: ' + e.message, 'error');
      }
    };

    return (
      <Modal open={transferOpen} onClose={() => setTransferOpen(false)} title="Hesaplar Arası Transfer" size="lg"
        footer={<>
          <button className="htl-btn htl-btn-ghost" onClick={() => setTransferOpen(false)}>Vazgeç</button>
          <button className="htl-btn htl-btn-primary" onClick={save}>
            <Icon name={tab === 'doviz' ? 'arrow-right-left' : 'arrow-left-right'} size={16}/>
            <span>{tab === 'doviz' ? 'Döviz Transferi Yap' : 'Transfer Yap'}</span>
          </button>
        </>}>

        {/* Tab seçici */}
        <div className="flex gap-1 mb-4 -mt-2 p-1 rounded-lg" style={{background: 'var(--bone-warm)', width: 'fit-content'}}>
          <button type="button"
            disabled={!canNormal && (kaynak && hedef && !ayniPB)}
            onClick={() => setTab('normal')}
            className="px-4 py-1.5 rounded-md text-sm font-medium transition"
            style={{
              background: tab === 'normal' ? 'var(--bone-light)' : 'transparent',
              color: tab === 'normal' ? 'var(--forest)' : 'var(--ink-soft)',
              boxShadow: tab === 'normal' ? '0 1px 3px rgba(0,0,0,.08)' : 'none',
              opacity: (!canNormal && kaynak && hedef) ? 0.4 : 1,
              cursor: (!canNormal && kaynak && hedef) ? 'not-allowed' : 'pointer'
            }}>
            <Icon name="arrow-left-right" size={14} className="inline mr-1"/>Aynı Para Birimi
          </button>
          <button type="button"
            onClick={() => setTab('doviz')}
            className="px-4 py-1.5 rounded-md text-sm font-medium transition"
            style={{
              background: tab === 'doviz' ? 'var(--bone-light)' : 'transparent',
              color: tab === 'doviz' ? 'var(--forest)' : 'var(--ink-soft)',
              boxShadow: tab === 'doviz' ? '0 1px 3px rgba(0,0,0,.08)' : 'none'
            }}>
            <Icon name="arrow-right-left" size={14} className="inline mr-1"/>Döviz Transferi
          </button>
        </div>

        <div className="grid md:grid-cols-2 gap-4">
          <div>
            <label className="htl-label">Kaynak Hesap (Çıkış)</label>
            <select className="htl-input" value={form.kaynakId||''} onChange={e=>setForm({...form, kaynakId:e.target.value})}>
              <option value="">— Seçiniz —</option>
              {aktifHesaplar.map(h => {
                const pb = h.paraBirimi || getAnaParaBirimi();
                return <option key={h.id} value={h.id}>{h.ad} ({fmtMoney(getHesapBakiye(h.id), pb)})</option>;
              })}
            </select>
            {kaynak && (
              <div className="text-xs mt-1" style={{color: 'var(--ink-soft)'}}>
                {kPB} · Bakiye: <strong>{fmtMoney(getHesapBakiye(form.kaynakId), kPB)}</strong>
              </div>
            )}
          </div>
          <div>
            <label className="htl-label">Hedef Hesap (Giriş)</label>
            <select className="htl-input" value={form.hedefId||''} onChange={e=>setForm({...form, hedefId:e.target.value})}>
              <option value="">— Seçiniz —</option>
              {aktifHesaplar.map(h => {
                const pb = h.paraBirimi || getAnaParaBirimi();
                return <option key={h.id} value={h.id}>{h.ad} ({pb})</option>;
              })}
            </select>
            {hedef && (
              <div className="text-xs mt-1" style={{color: 'var(--ink-soft)'}}>
                {hPB} · Bakiye: <strong>{fmtMoney(getHesapBakiye(form.hedefId), hPB)}</strong>
              </div>
            )}
          </div>

          {/* Para birimi uyarısı */}
          {kaynak && hedef && !ayniPB && tab === 'normal' && (
            <div className="md:col-span-2 px-3 py-2 rounded-md text-sm flex items-center gap-2" style={{background: 'var(--warn-soft)', color: 'var(--warn)'}}>
              <Icon name="alert-circle" size={16}/>
              <span>Kaynak ({kPB}) ve hedef ({hPB}) farklı para birimlerinde. <strong>"Döviz Transferi"</strong> sekmesini kullanın.</span>
            </div>
          )}

          {/* NORMAL TRANSFER FORMU */}
          {tab === 'normal' && ayniPB && (
            <>
              <div>
                <label className="htl-label">Tutar ({kPB}) *</label>
                <input type="number" min="0" step="0.01" className="htl-input" value={form.tutar||''} onChange={e=>setForm({...form, tutar:e.target.value})}/>
              </div>
              <div>
                <label className="htl-label">Tarih</label>
                <input type="date" className="htl-input" value={form.tarih||''} onChange={e=>setForm({...form, tarih:e.target.value})}/>
              </div>
            </>
          )}

          {/* DÖVİZ TRANSFER FORMU */}
          {tab === 'doviz' && kaynak && hedef && (
            <>
              <div>
                <label className="htl-label">Çıkan Tutar ({kPB}) *</label>
                <input type="number" min="0" step="0.01" className="htl-input"
                  placeholder={`${kPB} olarak`}
                  value={form.kaynakTutar||''}
                  onChange={e => {
                    const v = e.target.value;
                    // Hedef tutarı otomatik öneri (kullanıcı manuel değiştirmediyse)
                    let newHedef = form.hedefTutar;
                    if (otoKurDoviz && Number(v) > 0) {
                      newHedef = (Number(v) * otoKurDoviz).toFixed(2);
                    }
                    setForm({...form, kaynakTutar: v, hedefTutar: newHedef});
                  }}/>
              </div>
              <div>
                <label className="htl-label">Giren Tutar ({hPB}) *</label>
                <input type="number" min="0" step="0.01" className="htl-input"
                  placeholder={`${hPB} olarak`}
                  value={form.hedefTutar||''}
                  onChange={e => setForm({...form, hedefTutar: e.target.value})}/>
              </div>

              {/* Kur bilgi paneli */}
              <div className="md:col-span-2 rounded-md p-3" style={{background: 'var(--brass-soft)', border: '1px solid var(--brass-light)'}}>
                <div className="grid md:grid-cols-3 gap-3 items-center text-sm">
                  <div>
                    <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Canlı Kur (referans)</div>
                    <div className="font-display text-base font-medium" style={{color: 'var(--forest)'}}>
                      {otoKurDoviz ? `1 ${kPB} = ${otoKurDoviz.toFixed(4)} ${hPB}` : '—'}
                    </div>
                  </div>
                  <div>
                    <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Kullandığınız Kur</div>
                    <div className="font-display text-base font-medium" style={{color: 'var(--brass)'}}>
                      {efKur ? `1 ${kPB} = ${efKur.toFixed(4)} ${hPB}` : '—'}
                    </div>
                  </div>
                  <div>
                    {otoKurDoviz && (
                      <button type="button" className="htl-btn htl-btn-ghost text-xs"
                        onClick={() => {
                          if (Number(form.kaynakTutar) > 0) {
                            setForm({...form, hedefTutar: (Number(form.kaynakTutar) * otoKurDoviz).toFixed(2)});
                          }
                        }}>
                        <Icon name="refresh-cw" size={12}/>
                        <span>Canlı Kuru Uygula</span>
                      </button>
                    )}
                  </div>
                </div>
                {efKur && otoKurDoviz && Math.abs(efKur - otoKurDoviz) / otoKurDoviz > 0.05 && (
                  <div className="text-[11px] mt-2 flex items-center gap-1" style={{color: 'var(--warn)'}}>
                    <Icon name="alert-triangle" size={12}/>
                    <span>Kullandığınız kur canlı kurdan %{(Math.abs(efKur - otoKurDoviz) / otoKurDoviz * 100).toFixed(1)} sapıyor.</span>
                  </div>
                )}
              </div>

              <div>
                <label className="htl-label">Tarih</label>
                <input type="date" className="htl-input" value={form.tarih||''} onChange={e=>setForm({...form, tarih:e.target.value})}/>
              </div>
              <div></div>
            </>
          )}

          <div className="md:col-span-2">
            <label className="htl-label">Açıklama</label>
            <input className="htl-input" placeholder={tab === 'doviz' ? 'Örn: Euro kasadan TL hesaba bozdurma' : 'Örn: Kasa fazlasını bankaya yatırma'}
              value={form.aciklama||''} onChange={e=>setForm({...form, aciklama:e.target.value})}/>
          </div>
        </div>
      </Modal>
    );
  };

  /* -- Hesap Detay Modal — geçmiş hareketler -- */
  const HesapDetayModal = () => {
    const isOpen = !!hesapDetay;
    const hesap = hesapDetay;
    const harList = hesap ? hareketler.filter(h => h.hesapId === hesap.id).sort((a,b) => (b.tarih+b.olusturmaTarihi+'').localeCompare(a.tarih+a.olusturmaTarihi+'')) : [];
    const tipInfo = hesap ? HESAP_TIP_INFO(hesap.tip) : null;
    const hesapPB = hesap ? (hesap.paraBirimi || getAnaParaBirimi()) : getAnaParaBirimi();
    const ana = getAnaParaBirimi();
    const bakiye = hesap ? getHesapBakiye(hesap.id) : 0;
    const bakiyeAna = hesap ? getHesapBakiyeAna(hesap.id) : 0;
    // Running balance (eskiye doğru)
    let runningBalance = bakiye;
    const harWithBalance = harList.map(h => {
      const before = runningBalance;
      runningBalance = runningBalance - Number(h.tutar||0);
      return { ...h, balanceAfter: before };
    });

    return (
      <Modal open={isOpen} onClose={() => setHesapDetay(null)} size="lg"
        title={hesap ? `${hesap.ad} — Hesap Detayı` : 'Hesap'}
        footer={<>
          <button className="htl-btn htl-btn-ghost" onClick={() => setHesapDetay(null)}>Kapat</button>
        </>}>
        {hesap && (
          <div className="space-y-4">
            <div className="rounded-lg p-4 flex items-center justify-between flex-wrap gap-3" style={{background: tipInfo.renk + '15', border: `1px solid ${tipInfo.renk}30`}}>
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-lg flex items-center justify-center" style={{background: tipInfo.renk}}>
                  <Icon name={tipInfo.icon} size={22} stroke="white"/>
                </div>
                <div>
                  <div className="font-display text-xl font-medium flex items-center gap-2" style={{color: 'var(--forest)'}}>
                    {hesap.ad}
                    <span className="htl-badge htl-badge-neutral" style={{fontFamily: 'DM Sans', fontSize: 11}}>
                      {PARA_BIRIMI_INFO(hesapPB).symbol} {hesapPB}
                    </span>
                  </div>
                  <div className="text-xs" style={{color: 'var(--ink-soft)'}}>{tipInfo.l}{hesap.aciklama ? ` · ${hesap.aciklama}` : ''}</div>
                </div>
              </div>
              <div className="text-right">
                <div className="text-xs uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Mevcut Bakiye</div>
                <div className="font-display text-2xl font-medium" style={{color: bakiye >= 0 ? 'var(--forest)' : 'var(--danger)'}}>
                  {fmtMoney(bakiye, hesapPB)}
                </div>
                {hesapPB !== ana && bakiyeAna != null && (
                  <div className="text-xs" style={{color: 'var(--ink-soft)'}}>
                    ≈ {fmtMoney(bakiyeAna, ana)}
                  </div>
                )}
              </div>
            </div>

            <div>
              <h4 className="font-display text-base font-medium mb-2" style={{color: 'var(--forest)'}}>Hareket Geçmişi ({harList.length})</h4>
              {harList.length === 0 ? (
                <div className="htl-empty">Bu hesapta henüz hareket yok.</div>
              ) : (
                <div className="overflow-x-auto rounded-lg" style={{border: '1px solid var(--line-soft)'}}>
                  <table className="htl-table">
                    <thead><tr><th>Tarih</th><th>Tip</th><th>Açıklama</th><th className="text-right">Tutar</th><th className="text-right">Bakiye</th></tr></thead>
                    <tbody>
                      {harWithBalance.map(h => {
                        const ti = HAREKET_TIP_INFO(h.tip);
                        const isPos = Number(h.tutar) >= 0;
                        return (
                          <tr key={h.id}>
                            <td className="text-sm">{fmtDateTR(h.tarih)}</td>
                            <td><span className={`htl-badge ${isPos ? 'htl-badge-success' : 'htl-badge-danger'}`}>{ti.l}</span></td>
                            <td className="text-sm">{h.aciklama || '-'}</td>
                            <td className="text-right font-medium" style={{color: isPos ? 'var(--success)' : 'var(--danger)'}}>
                              {isPos ? '+' : ''}{fmtMoney(h.tutar, hesapPB)}
                            </td>
                            <td className="text-right text-sm" style={{color: 'var(--ink-soft)'}}>{fmtMoney(h.balanceAfter, hesapPB)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        )}
      </Modal>
    );
  };

  return (
    <div className="space-y-4">
      {kurlarYok && (
        <div className="px-4 py-3 rounded-lg flex items-start gap-2 text-sm" style={{background: 'var(--warn-soft)', color: 'var(--warn)', border: '1px solid var(--warn)'}}>
          <Icon name="alert-triangle" size={16}/>
          <span>Bazı hesaplar farklı para birimlerinde fakat kur bilgisi yok. <strong>Toplam Bakiye</strong> tam yansıtılamıyor — Ayarlar &gt; Para Birimi &amp; Kur sekmesinden kurları güncelleyin.</span>
        </div>
      )}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="htl-stat">
          <div className="htl-stat-label">Toplam Bakiye ({ana})</div>
          <div className="htl-stat-value" style={{fontSize: 26}}>{fmtMoney(toplamBakiye, ana)}</div>
          <div className="htl-stat-sub">{hesaplar.length} hesap · ana para biriminde</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Bugün Tahsilat</div>
          <div className="htl-stat-value" style={{fontSize: 26}}>{fmtMoney(bugun, ana)}</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Bu Ay</div>
          <div className="htl-stat-value" style={{fontSize: 26}}>{fmtMoney(buAy, ana)}</div>
        </div>
        <div className="htl-stat">
          <div className="htl-stat-label">Bu Yıl</div>
          <div className="htl-stat-value" style={{fontSize: 26}}>{fmtMoney(buYil, ana)}</div>
        </div>
      </div>

      <div className="htl-card">
        <div className="htl-card-header" style={{paddingBottom: 0, borderBottom: 'none'}}>
          <div className="flex gap-1 -mb-[1px]" style={{borderBottom: '1px solid var(--line-soft)', flex: 1, flexWrap: 'wrap'}}>
            <div className={`htl-tab ${tab === 'hesaplar' ? 'active' : ''}`} onClick={() => setTab('hesaplar')}>Hesaplar</div>
            <div className={`htl-tab ${tab === 'bakiye' ? 'active' : ''}`} onClick={() => setTab('bakiye')}>Rezervasyon Bakiyeleri</div>
            <div className={`htl-tab ${tab === 'tahsilat' ? 'active' : ''}`} onClick={() => setTab('tahsilat')}>Tahsilat Geçmişi</div>
            <div className={`htl-tab ${tab === 'giderler' ? 'active' : ''}`} onClick={() => setTab('giderler')}>Giderler</div>
          </div>
          <div className="flex gap-2">
            {tab === 'hesaplar' && can('onMuhasebe','ekle') && (
              <>
                <button className="htl-btn htl-btn-ghost" onClick={() => setTransferOpen(true)} disabled={hesaplar.length < 2}>
                  <Icon name="arrow-left-right" size={16}/><span className="hidden sm:inline">Transfer</span>
                </button>
                <button className="htl-btn htl-btn-primary" onClick={() => setHesapForm({ creating: true })}>
                  <Icon name="plus" size={16} stroke="var(--bone-light)"/><span>Yeni Hesap</span>
                </button>
              </>
            )}
            {(tab === 'bakiye' || tab === 'tahsilat') && can('onMuhasebe','ekle') && (
              <button className="htl-btn htl-btn-accent" onClick={() => setCreatingTah(true)}>
                <Icon name="plus" size={16} stroke="white"/><span>Tahsilat</span>
              </button>
            )}
            {tab === 'giderler' && can('onMuhasebe','ekle') && (
              <button className="htl-btn htl-btn-accent" onClick={() => setCreatingGider(true)}>
                <Icon name="minus-circle" size={16} stroke="white"/><span>Yeni Gider</span>
              </button>
            )}
          </div>
        </div>

        {tab === 'hesaplar' && (
          <div className="htl-card-body">
            {hesaplar.length === 0 ? (
              <div className="htl-empty">
                <Icon name="wallet" size={32} stroke="var(--ink-faint)"/>
                <p className="mt-2">Henüz hesap yok. "Yeni Hesap" ile kasa veya banka tanımlayın.</p>
              </div>
            ) : (
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                {hesaplar.map(h => {
                  const tipInfo = HESAP_TIP_INFO(h.tip);
                  const hesapPB = h.paraBirimi || ana;
                  const pbInfo = PARA_BIRIMI_INFO(hesapPB);
                  const bakiye = getHesapBakiye(h.id);
                  const bakiyeAna = getHesapBakiyeAna(h.id);
                  const harSayisi = hareketler.filter(x => x.hesapId === h.id).length;
                  const inactive = h.aktif === false;
                  return (
                    <div key={h.id} className="rounded-xl overflow-hidden cursor-pointer transition hover:shadow-lg"
                      style={{background: 'var(--bone-light)', border: '1px solid var(--line-soft)', opacity: inactive ? 0.6 : 1}}
                      onClick={() => setHesapDetay(h)}>
                      <div style={{height: 4, background: tipInfo.renk}}/>
                      <div className="p-4">
                        <div className="flex items-start justify-between mb-3 gap-2">
                          <div className="flex items-center gap-2 min-w-0">
                            <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style={{background: tipInfo.renk + '20'}}>
                              <Icon name={tipInfo.icon} size={18} stroke={tipInfo.renk}/>
                            </div>
                            <div className="min-w-0">
                              <div className="font-medium truncate">{h.ad}</div>
                              <div className="text-xs flex items-center gap-1.5" style={{color: 'var(--ink-soft)'}}>
                                <span>{tipInfo.l}</span>
                                <span style={{color: 'var(--line)'}}>·</span>
                                <span style={{fontWeight: 600, color: 'var(--brass)'}}>{pbInfo.symbol} {hesapPB}</span>
                                {inactive && <span style={{color: 'var(--danger)'}}>· Pasif</span>}
                              </div>
                            </div>
                          </div>
                          <div className="flex gap-1 flex-shrink-0" onClick={e => e.stopPropagation()}>
                            {can('onMuhasebe','duzenle') && (
                              <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setHesapForm({ editing: h })}>
                                <Icon name="pencil" size={14} stroke="var(--ink-soft)"/>
                              </button>
                            )}
                            {can('onMuhasebe','sil') && (
                              <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setConfirmHesapDel(h)}>
                                <Icon name="trash-2" size={14} stroke="var(--danger)"/>
                              </button>
                            )}
                          </div>
                        </div>
                        <div className="font-display text-2xl font-medium" style={{color: bakiye >= 0 ? 'var(--forest)' : 'var(--danger)'}}>
                          {fmtMoney(bakiye, hesapPB)}
                        </div>
                        {hesapPB !== ana && bakiyeAna != null && (
                          <div className="text-xs mt-0.5" style={{color: 'var(--ink-soft)'}}>
                            ≈ {fmtMoney(bakiyeAna, ana)}
                          </div>
                        )}
                        <div className="flex items-center justify-between mt-2 text-xs" style={{color: 'var(--ink-soft)'}}>
                          <span>{harSayisi} hareket</span>
                          <span className="flex items-center gap-1">Detay <Icon name="chevron-right" size={12}/></span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {tab === 'bakiye' && (
          <div className="overflow-x-auto">
            {bakiyeRows.length === 0 ? (
              <div className="htl-empty">Aktif rezervasyon yok.</div>
            ) : (
              <table className="htl-table">
                <thead><tr><th>Rezervasyon</th><th>Misafir</th><th>Oda</th><th>Tarih</th><th className="text-right">Toplam</th><th className="text-right">Ödenen</th><th className="text-right">Kalan</th></tr></thead>
                <tbody>
                  {bakiyeRows.map(({rez, odenen, kalan}) => {
                    const m = misafirler.find(x => x.id === rez.anaMisafirId);
                    const o = odalar.find(x => x.id === rez.odaId);
                    return (
                      <tr key={rez.id}>
                        <td className="font-mono text-xs">{rez.rezervasyonKodu}</td>
                        <td>{m ? `${m.ad} ${m.soyad}` : '-'}</td>
                        <td>{o?.odaNumarasi || '-'}</td>
                        <td className="text-xs">{fmtDateShort(rez.girisTarihi)} → {fmtDateShort(rez.cikisTarihi)}</td>
                        <td className="text-right">{fmtTL(rez.toplamTutar)}</td>
                        <td className="text-right" style={{color: 'var(--success)'}}>{fmtTL(odenen)}</td>
                        <td className="text-right font-medium" style={{color: kalan > 0 ? 'var(--danger)' : 'var(--success)'}}>{fmtTL(kalan)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        )}

        {tab === 'tahsilat' && (
          <div className="overflow-x-auto">
            {tahsilatlarSorted.length === 0 ? (
              <div className="htl-empty">Henüz tahsilat yok.</div>
            ) : (
              <table className="htl-table">
                <thead><tr><th>Tarih</th><th>Rezervasyon</th><th>Misafir</th><th>Yöntem</th><th>Hesap</th><th>Açıklama</th><th className="text-right">Tutar</th><th></th></tr></thead>
                <tbody>
                  {tahsilatlarSorted.map(t => {
                    const r = reservations.find(x => x.id === t.rezervasyonId);
                    const m = r ? misafirler.find(x => x.id === r.anaMisafirId) : null;
                    const opt = ODEME_OPTS.find(o => o.v === t.odemeYontemi);
                    const hesap = hesaplar.find(h => h.id === t.hesapId);
                    const tipInfo = hesap ? HESAP_TIP_INFO(hesap.tip) : null;
                    return (
                      <tr key={t.id}>
                        <td>{fmtDateTR(t.tarih)}</td>
                        <td className="font-mono text-xs">{r?.rezervasyonKodu || '-'}</td>
                        <td>{m ? `${m.ad} ${m.soyad}` : '-'}</td>
                        <td><span className="htl-badge htl-badge-info">{opt?.l || t.odemeYontemi}</span></td>
                        <td>
                          {hesap ? (
                            <div className="flex items-center gap-1.5 text-xs">
                              <div className="w-2 h-2 rounded-full" style={{background: tipInfo.renk}}/>
                              <span>{hesap.ad}</span>
                            </div>
                          ) : <span style={{color: 'var(--ink-faint)'}}>—</span>}
                        </td>
                        <td className="text-sm" style={{color: 'var(--ink-soft)'}}>{t.aciklama||'-'}</td>
                        <td className="text-right font-medium" style={{color: 'var(--success)'}}>
                          <div>{fmtMoney(t.tutar, t.paraBirimi || getAnaParaBirimi())}</div>
                          {t.paraBirimi && t.paraBirimi !== getAnaParaBirimi() && t.tutarAna != null && (
                            <div className="text-[10px] font-normal" style={{color: 'var(--ink-soft)'}}>
                              ≈ {fmtMoney(t.tutarAna, getAnaParaBirimi())}
                            </div>
                          )}
                        </td>
                        <td>
                          <div className="flex justify-end gap-1">
                            {can('onMuhasebe','duzenle') && <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setEditingTah(t)}><Icon name="pencil" size={14} stroke="var(--ink-soft)" /></button>}
                            {can('onMuhasebe','sil') && <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setConfirmDel(t)}><Icon name="trash-2" size={14} stroke="var(--danger)" /></button>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        )}

        {tab === 'giderler' && (() => {
          const filtered = giderler
            .filter(g => !giderFilterKategori || g.kategoriId === giderFilterKategori)
            .sort((a,b) => (b.tarih+'').localeCompare(a.tarih+''));

          // Stat'lar (ana para biriminde)
          const giderToplamAna = (filterFn) => giderler.filter(filterFn).reduce((s,g) => s + Number(g.tutarAna != null ? g.tutarAna : g.tutar||0), 0);
          const giderBugun = giderToplamAna(g => g.tarih === today);
          const giderBuAy  = giderToplamAna(g => g.tarih >= ayBasIso);
          const giderBuYil = giderToplamAna(g => g.tarih >= yilBasIso);

          // Kategori bazlı dağılım (bu ay)
          const kategoriDagilim = giderKategorileri.map(k => {
            const tut = giderler.filter(g => g.kategoriId === k.id && g.tarih >= ayBasIso).reduce((s,g) => s + Number(g.tutarAna != null ? g.tutarAna : g.tutar||0), 0);
            return { kat: k, tut };
          }).filter(x => x.tut > 0).sort((a,b) => b.tut - a.tut);

          return (
            <>
              <div className="htl-card-body">
                <div className="grid grid-cols-3 gap-3 mb-4">
                  <div className="rounded-lg p-3" style={{background: 'var(--bone-warm)'}}>
                    <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Bugün Gider</div>
                    <div className="font-display text-xl font-medium mt-1" style={{color: 'var(--danger)'}}>{fmtMoney(giderBugun, ana)}</div>
                  </div>
                  <div className="rounded-lg p-3" style={{background: 'var(--bone-warm)'}}>
                    <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Bu Ay</div>
                    <div className="font-display text-xl font-medium mt-1" style={{color: 'var(--danger)'}}>{fmtMoney(giderBuAy, ana)}</div>
                  </div>
                  <div className="rounded-lg p-3" style={{background: 'var(--bone-warm)'}}>
                    <div className="text-[10px] uppercase tracking-wider" style={{color: 'var(--ink-soft)'}}>Bu Yıl</div>
                    <div className="font-display text-xl font-medium mt-1" style={{color: 'var(--danger)'}}>{fmtMoney(giderBuYil, ana)}</div>
                  </div>
                </div>

                {/* Kategori bazlı dağılım (bu ay) */}
                {kategoriDagilim.length > 0 && (
                  <div className="rounded-lg p-3 mb-4" style={{background: 'var(--bone)', border: '1px solid var(--line-soft)'}}>
                    <div className="text-xs font-medium mb-2" style={{color: 'var(--ink-soft)'}}>BU AYIN KATEGORİ DAĞILIMI</div>
                    <div className="space-y-1.5">
                      {kategoriDagilim.map(({kat, tut}) => {
                        const yuzde = giderBuAy > 0 ? (tut / giderBuAy) * 100 : 0;
                        return (
                          <div key={kat.id} className="flex items-center gap-3 text-sm">
                            <div className="flex items-center gap-2 min-w-0" style={{flex: '1 1 0'}}>
                              <Icon name={kat.icon || 'tag'} size={14} stroke={kat.renk}/>
                              <span className="truncate">{kat.ad}</span>
                            </div>
                            <div className="rounded-full overflow-hidden" style={{background: 'var(--line-soft)', height: 6, width: 100}}>
                              <div style={{width: `${yuzde}%`, height: '100%', background: kat.renk}}/>
                            </div>
                            <div className="text-right" style={{minWidth: 90}}>
                              <div className="font-medium">{fmtMoney(tut, ana)}</div>
                              <div className="text-[10px]" style={{color: 'var(--ink-faint)'}}>%{yuzde.toFixed(1)}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Filtre */}
                <div className="mb-3 flex gap-2 flex-wrap">
                  <select className="htl-input" style={{maxWidth: 250}} value={giderFilterKategori} onChange={e => setGiderFilterKategori(e.target.value)}>
                    <option value="">Tüm kategoriler</option>
                    {giderKategorileri.filter(k => k.aktif !== false).map(k => <option key={k.id} value={k.id}>{k.ad}</option>)}
                  </select>
                </div>
              </div>

              <div className="overflow-x-auto">
                {filtered.length === 0 ? (
                  <div className="htl-empty">
                    <Icon name="receipt" size={32} stroke="var(--ink-faint)"/>
                    <p className="mt-2">{giderler.length === 0 ? 'Henüz gider kaydı yok. "Yeni Gider" ile başlayın.' : 'Bu filtreye uyan gider yok.'}</p>
                  </div>
                ) : (
                  <table className="htl-table">
                    <thead><tr><th>Tarih</th><th>Kategori</th><th>Hesap</th><th>Açıklama</th><th className="text-right">Tutar</th><th></th></tr></thead>
                    <tbody>
                      {filtered.map(g => {
                        const kat = giderKategorileri.find(k => k.id === g.kategoriId);
                        const hesap = hesaplar.find(h => h.id === g.hesapId);
                        const tipInfo = hesap ? HESAP_TIP_INFO(hesap.tip) : null;
                        return (
                          <tr key={g.id}>
                            <td>{fmtDateTR(g.tarih)}</td>
                            <td>
                              {kat ? (
                                <div className="flex items-center gap-2">
                                  <div className="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style={{background: kat.renk + '25'}}>
                                    <Icon name={kat.icon || 'tag'} size={13} stroke={kat.renk}/>
                                  </div>
                                  <span>{kat.ad}</span>
                                </div>
                              ) : <span style={{color: 'var(--ink-faint)'}}>—</span>}
                            </td>
                            <td>
                              {hesap ? (
                                <div className="flex items-center gap-1.5 text-xs">
                                  <div className="w-2 h-2 rounded-full" style={{background: tipInfo.renk}}/>
                                  <span>{hesap.ad}</span>
                                </div>
                              ) : <span style={{color: 'var(--ink-faint)'}}>—</span>}
                            </td>
                            <td className="text-sm" style={{color: 'var(--ink-soft)'}}>{g.aciklama||'-'}</td>
                            <td className="text-right font-medium" style={{color: 'var(--danger)'}}>
                              <div>−{fmtMoney(g.tutar, g.paraBirimi || ana)}</div>
                              {g.paraBirimi && g.paraBirimi !== ana && g.tutarAna != null && (
                                <div className="text-[10px] font-normal" style={{color: 'var(--ink-soft)'}}>
                                  ≈ {fmtMoney(g.tutarAna, ana)}
                                </div>
                              )}
                            </td>
                            <td>
                              <div className="flex justify-end gap-1">
                                {can('onMuhasebe','duzenle') && <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setEditingGider(g)}><Icon name="pencil" size={14} stroke="var(--ink-soft)"/></button>}
                                {can('onMuhasebe','sil') && <button className="p-1.5 rounded hover:bg-[var(--bone-warm)]" onClick={() => setConfirmGiderDel(g)}><Icon name="trash-2" size={14} stroke="var(--danger)"/></button>}
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            </>
          );
        })()}
      </div>

      <TahsilatModal />
      <HesapFormModal />
      <TransferModal />
      <HesapDetayModal />
      <GiderModal
        open={creatingGider || !!editingGider}
        onClose={() => { setCreatingGider(false); setEditingGider(null); }}
        gider={editingGider}
        hesaplar={hesaplar}
        kategoriler={giderKategorileri}
        ana={ana}
        onSaved={refresh}
        userId={user?.id}
        showToast={show}
      />
      <ConfirmModal open={!!confirmDel} title="Tahsilatı Sil"
        msg="Bu tahsilatı silmek istediğinize emin misiniz? Hesap hareketi de geri alınacak."
        onConfirm={() => {
          deleteTahsilatWithHareket(confirmDel.id);
          setConfirmDel(null); refresh();
          show('Tahsilat ve hesap hareketi silindi.');
        }}
        onCancel={() => setConfirmDel(null)} />
      <ConfirmModal open={!!confirmHesapDel} title="Hesabı Sil"
        msg={confirmHesapDel ? `"${confirmHesapDel.ad}" hesabını silmek istediğinize emin misiniz? ${hareketler.filter(h => h.hesapId === confirmHesapDel.id).length} hareket kalacak ama hesaba bağlı olmayacak.` : ''}
        onConfirm={() => { db.delete('hesaplar', confirmHesapDel.id); setConfirmHesapDel(null); refresh(); show('Hesap silindi.'); }}
        onCancel={() => setConfirmHesapDel(null)} />
      <ConfirmModal open={!!confirmGiderDel} title="Gideri Sil"
        msg="Bu gider ve karşılık hesap hareketi silinecek. Emin misiniz?"
        onConfirm={() => {
          deleteGiderWithHareket(confirmGiderDel.id);
          setConfirmGiderDel(null); refresh();
          show('Gider silindi.');
        }}
        onCancel={() => setConfirmGiderDel(null)} />
    </div>
  );
};
