<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Hoteluter — Otel Yönetim Sistemi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Tailwind CDN production warning'ini sustur ve config tanımla
  if (window.tailwind) {
    tailwind.config = { corePlugins: { preflight: true } };
  }
  // === DEBUG / TEŞHİS SİSTEMİ ===
  window.__htlLog = [];
  window.__htlAddLog = function(level, msg) {
    var ts = new Date().toLocaleTimeString('tr-TR');
    window.__htlLog.push('[' + ts + '][' + level + '] ' + msg);
    var box = document.getElementById('htl-debug-log');
    if (box) box.textContent = window.__htlLog.join('\n');
  };
  window.__htlSetStatus = function(text) {
    var s = document.getElementById('htl-status');
    if (s) s.textContent = text;
    window.__htlAddLog('info', text);
  };
  // Console hooks
  ['log','warn','error'].forEach(function(m) {
    var orig = console[m];
    console[m] = function() {
      try {
        var args = Array.prototype.slice.call(arguments).map(function(x){
          if (x instanceof Error) return x.stack || x.message;
          if (typeof x === 'object') { try { return JSON.stringify(x); } catch(e) { return String(x); } }
          return String(x);
        }).join(' ');
        window.__htlAddLog(m, args);
      } catch(e) {}
      return orig.apply(console, arguments);
    };
  });
  // Hata yakalama
  window.addEventListener('error', function(e) {
    var msg = e.message + (e.filename ? ' @ ' + (e.filename.split('/').pop()) + ':' + e.lineno : '');
    window.__htlAddLog('ERROR', msg);
    var s = document.getElementById('htl-status');
    if (s) { s.textContent = '⚠️ Hata: ' + e.message; s.style.color = '#a64545'; }
  });
  window.addEventListener('unhandledrejection', function(e) {
    window.__htlAddLog('REJECT', String(e.reason && (e.reason.stack || e.reason.message) || e.reason));
  });

  __htlSetStatus = window.__htlSetStatus;
  // Yükleme aşamaları
  __htlSetStatus('1/5 · HTML yüklendi, kütüphaneler indiriliyor...');

  // 5 saniye sonra hâlâ takılıysa ek bilgi ver
  setTimeout(function() {
    if (document.getElementById('initial-loader')) {
      var hint = document.getElementById('htl-hint');
      if (hint) hint.style.display = 'block';
    }
  }, 5000);
  // 12 saniye sonra debug paneli aç
  setTimeout(function() {
    if (document.getElementById('initial-loader')) {
      var dbg = document.getElementById('htl-debug-wrap');
      if (dbg) dbg.style.display = 'block';
    }
  }, 12000);
</script>
<script>
  // Çoklu CDN fallback ile script yükle. Her başarılı yükleme sonrası global var kontrolü yapar.
  function htlLoadScript(name, sources, globalCheck, onSuccess, onAllFail) {
    var i = 0;
    function tryNext() {
      if (i >= sources.length) {
        window.__htlSetStatus('❌ ' + name + ' hiçbir CDN\'den yüklenemedi');
        onAllFail && onAllFail();
        return;
      }
      var src = sources[i];
      var host = src.split('/')[2];
      window.__htlAddLog('info', name + ' deneniyor: ' + host);
      var s = document.createElement('script');
      s.src = src;
      s.crossOrigin = 'anonymous';
      s.onload = function() {
        // Gerçekten global'e atandı mı kontrol et
        if (globalCheck()) {
          window.__htlAddLog('info', '✓ ' + name + ' yüklendi (' + host + ')');
          onSuccess && onSuccess();
        } else {
          window.__htlAddLog('warn', name + ' onload tetiklendi ama global eksik (' + host + ')');
          i++; tryNext();
        }
      };
      s.onerror = function() {
        window.__htlAddLog('warn', '✗ ' + name + ' başarısız: ' + host);
        i++; tryNext();
      };
      document.head.appendChild(s);
    }
    tryNext();
  }

  // 1. React yükle
  window.__htlSetStatus('2/5 · React yükleniyor...');
  htlLoadScript('React',
    [
      'https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      'https://unpkg.com/react@18.3.1/umd/react.production.min.js'
    ],
    function() { return typeof window.React !== 'undefined'; },
    function() {
      // 2. ReactDOM yükle
      window.__htlSetStatus('3/5 · ReactDOM yükleniyor...');
      htlLoadScript('ReactDOM',
        [
          'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
          'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js'
        ],
        function() { return typeof window.ReactDOM !== 'undefined'; },
        function() {
          // 3. Babel yükle
          window.__htlSetStatus('4/5 · Babel yükleniyor (büyük dosya, biraz sürebilir)...');
          htlLoadScript('Babel',
            [
              'https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js',
              'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js',
              'https://unpkg.com/@babel/standalone@7.23.5/babel.min.js'
            ],
            function() { return typeof window.Babel !== 'undefined'; },
            function() {
              // 4. Lucide yükle (kritik değil)
              htlLoadScript('Lucide',
                [
                  'https://cdn.jsdelivr.net/npm/lucide@0.298.0/dist/umd/lucide.min.js',
                  'https://unpkg.com/lucide@0.298.0/dist/umd/lucide.min.js'
                ],
                function() { return typeof window.lucide !== 'undefined'; },
                function() { startBabelTransform(); },
                function() {
                  window.__htlAddLog('warn', 'Lucide yüklenemedi ama uygulama çalışacak (ikonlar gri kutu)');
                  startBabelTransform();
                }
              );
            }
          );
        }
      );
    }
  );

  function startBabelTransform() {
    window.__htlSetStatus('4/5 · Babel uygulamayı derliyor (5-15sn)...');
    setTimeout(function() {
      try {
        if (window.Babel && Babel.transformScriptTags) {
          Babel.transformScriptTags();
        } else {
          window.__htlSetStatus('❌ Babel.transformScriptTags fonksiyonu bulunamadı');
        }
      } catch (e) {
        window.__htlSetStatus('❌ Babel transform hatası: ' + e.message);
        window.__htlAddLog('ERROR', e.stack || e.message);
        var dbg = document.getElementById('htl-debug-wrap');
        if (dbg) dbg.style.display = 'block';
      }
    }, 50);
  }
</script>

<style>
  :root {
    --bone: #f4ede0;
    --bone-light: #faf6ec;
    --bone-warm: #ebe2cf;
    --forest: #1f3a2e;
    --forest-soft: #2d4f3f;
    --forest-deep: #15291f;
    --ink: #1a1a1a;
    --ink-soft: #6b6b6b;
    --ink-faint: #9b9b9b;
    --brass: #a87842;
    --brass-light: #c89968;
    --brass-soft: #e8d4b8;
    --line: #d8cfba;
    --line-soft: #e8e0cd;
    --success: #4a7c59;
    --success-soft: #d9e6dc;
    --warn: #c87f3e;
    --warn-soft: #f3e3d0;
    --danger: #a64545;
    --danger-soft: #efd5d5;
    --info: #4a6b85;
    --info-soft: #d8e2eb;
  }
  html, body, #root { height: 100%; }
  body {
    background: var(--bone);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
  .font-body { font-family: 'DM Sans', system-ui, sans-serif; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--brass-light); }

  /* Inputs */
  .htl-input {
    background: var(--bone-light);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--ink);
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .htl-input:focus {
    outline: none;
    border-color: var(--brass);
    box-shadow: 0 0 0 3px var(--brass-soft);
  }
  .htl-input::placeholder { color: var(--ink-faint); }
  .htl-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: .02em;
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
  }
  .htl-btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 500;
    font-size: 14px;
    transition: all .15s;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .htl-btn-primary {
    background: var(--forest);
    color: var(--bone-light);
  }
  .htl-btn-primary:hover { background: var(--forest-soft); }
  .htl-btn-accent {
    background: var(--brass);
    color: white;
  }
  .htl-btn-accent:hover { background: var(--brass-light); }
  .htl-btn-ghost {
    background: transparent;
    color: var(--ink);
    border-color: var(--line);
  }
  .htl-btn-ghost:hover { background: var(--bone-warm); }
  .htl-btn-danger {
    background: var(--danger);
    color: white;
  }
  .htl-btn-danger:hover { background: #8a3838; }
  .htl-btn:disabled { opacity: .5; cursor: not-allowed; }

  .htl-card {
    background: var(--bone-light);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
  }
  .htl-card-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .htl-card-body { padding: 18px 22px; }

  /* Sidebar link */
  .htl-sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-radius: 8px;
    color: rgba(244, 237, 224, .72);
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
    font-weight: 400;
  }
  .htl-sidebar-link:hover {
    background: rgba(255,255,255,.06);
    color: var(--bone-light);
  }
  .htl-sidebar-link.active {
    background: var(--forest-deep);
    color: var(--brass-light);
  }
  .htl-sidebar-link.active .htl-sidebar-indicator {
    opacity: 1;
  }
  .htl-sidebar-indicator {
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 8px;
    width: 3px;
    background: var(--brass);
    border-radius: 0 3px 3px 0;
    opacity: 0;
  }

  /* Status badges */
  .htl-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .htl-badge-success { background: var(--success-soft); color: var(--success); }
  .htl-badge-warn    { background: var(--warn-soft);    color: var(--warn); }
  .htl-badge-danger  { background: var(--danger-soft);  color: var(--danger); }
  .htl-badge-info    { background: var(--info-soft);    color: var(--info); }
  .htl-badge-neutral { background: var(--bone-warm);    color: var(--ink-soft); }

  /* Table */
  .htl-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .htl-table thead th {
    background: var(--bone-warm);
    color: var(--ink-soft);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  .htl-table tbody td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 14px;
    color: var(--ink);
    vertical-align: middle;
  }
  .htl-table tbody tr:hover td { background: rgba(232, 212, 184, .12); }
  .htl-table tbody tr:last-child td { border-bottom: none; }

  /* Modal */
  .htl-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(21, 41, 31, .55);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 16px;
    backdrop-filter: blur(2px);
    animation: fadeIn .15s ease-out;
  }
  .htl-modal {
    background: var(--bone-light);
    border-radius: 14px;
    width: 100%;
    max-width: 640px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    border: 1px solid var(--line);
    box-shadow: 0 24px 60px rgba(15, 31, 23, .25);
    animation: slideUp .2s ease-out;
  }
  .htl-modal-lg { max-width: 880px; }
  .htl-modal-sm { max-width: 460px; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Calendar grid */
  .htl-cal-grid {
    display: grid;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bone-light);
  }
  .htl-cal-cell {
    border-right: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft);
    height: 48px;
    position: relative;
    background: var(--bone-light);
  }
  .htl-cal-cell.today { background: var(--brass-soft); }
  .htl-cal-cell.weekend { background: var(--bone-warm); }
  .htl-cal-room-label {
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line-soft);
    height: 48px;
    padding: 8px 12px;
    background: var(--bone-warm);
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    position: sticky;
    left: 0;
    z-index: 2;
  }
  .htl-cal-header {
    border-right: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line);
    background: var(--forest);
    color: var(--bone-light);
    font-size: 11px;
    padding: 6px 4px;
    text-align: center;
    font-weight: 500;
  }
  .htl-cal-header.weekend { background: var(--forest-deep); }
  .htl-cal-header-blank {
    background: var(--forest-deep);
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
    position: sticky;
    left: 0;
    z-index: 3;
  }
  .htl-res-bar {
    position: absolute;
    top: 6px;
    bottom: 6px;
    border-radius: 6px;
    padding: 0 10px;
    display: flex;
    align-items: center;
    color: white;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    overflow: hidden;
    white-space: nowrap;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    transition: transform .1s, box-shadow .1s;
    z-index: 1;
  }
  .htl-res-bar:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,.2);
    z-index: 4;
  }

  /* Login styles */
  .htl-login-bg {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(168, 120, 66, .12) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(45, 79, 63, .15) 0%, transparent 50%),
      var(--forest-deep);
  }

  /* Stat card */
  .htl-stat {
    background: var(--bone-light);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .htl-stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--brass);
  }
  .htl-stat-label {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: .06em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .htl-stat-value {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 500;
    color: var(--forest);
    line-height: 1;
    margin-top: 8px;
  }
  .htl-stat-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  /* Mobile drawer */
  .htl-drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(21, 41, 31, .5);
    z-index: 40;
  }

  /* Tab */
  .htl-tab {
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s;
  }
  .htl-tab:hover { color: var(--ink); }
  .htl-tab.active {
    color: var(--forest);
    border-bottom-color: var(--brass);
  }

  /* Empty state */
  .htl-empty {
    padding: 48px 16px;
    text-align: center;
    color: var(--ink-faint);
  }

  /* Toast */
  .htl-toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--forest);
    color: var(--bone-light);
    padding: 12px 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,.2);
    z-index: 200;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideUp .2s ease-out;
    max-width: 360px;
  }
  .htl-toast.success { background: var(--success); }
  .htl-toast.error { background: var(--danger); }

  /* Avatar */
  .htl-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--brass);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
  }

  /* Switch */
  .htl-switch {
    position: relative;
    width: 38px; height: 22px;
    background: var(--line);
    border-radius: 999px;
    cursor: pointer;
    transition: background .2s;
    flex-shrink: 0;
  }
  .htl-switch.on { background: var(--forest); }
  .htl-switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .htl-switch.on::after { transform: translateX(16px); }

  /* Decorative divider for login */
  .htl-divider-ornament {
    display: flex; align-items: center; gap: 12px;
    color: var(--brass-light);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .3em;
  }
  .htl-divider-ornament::before, .htl-divider-ornament::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--brass), transparent);
  }

  @media (max-width: 768px) {
    .htl-stat-value { font-size: 28px; }
  }
</style>
</head>
<body>
<div id="root">
  <div id="initial-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f4ede0;font-family:'DM Sans',system-ui,sans-serif;z-index:9999;padding:20px;overflow-y:auto">
    <div style="text-align:center;color:#1f3a2e;max-width:640px;width:100%">
      <div style="display:inline-block;width:40px;height:40px;border:3px solid #d8cfba;border-top-color:#a87842;border-radius:50%;animation:htlspin 0.8s linear infinite"></div>
      <div style="margin-top:16px;font-family:'Fraunces',Georgia,serif;font-size:28px;font-weight:500">Hoteluter</div>
      <div id="htl-status" style="margin-top:8px;font-size:13px;color:#6b6b6b;min-height:18px">başlatılıyor...</div>

      <div id="htl-hint" style="display:none;margin-top:20px;padding:14px;background:#faf6ec;border:1px solid #d8cfba;border-radius:10px;font-size:13px;color:#1f3a2e;text-align:left">
        <strong>5 saniyedir bekliyorsanız:</strong> Babel, 2400+ satırlık React kodunu derliyor — yavaş bilgisayarda 10–15sn sürebilir. Lütfen biraz daha bekleyin.
      </div>

      <div id="htl-debug-wrap" style="display:none;margin-top:20px;text-align:left">
        <div style="font-size:12px;color:#6b6b6b;margin-bottom:6px">
          <strong>Tanı paneli</strong> — bu metni Mert'e WhatsApp/mail ile yapıştırın:
        </div>

/* ========================================================================
   ICON HELPER (Lucide) — Lucide yüklenmese bile failsafe
   ======================================================================== */
const Icon = ({ name, size = 18, className = '', stroke = 'currentColor', strokeWidth = 2 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    try {
      ref.current.innerHTML = '';
      if (window.lucide && typeof window.lucide.createIcons === 'function') {
        const el = document.createElement('i');
        el.setAttribute('data-lucide', name);
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        ref.current.appendChild(el);
        window.lucide.createIcons({
          attrs: { stroke: stroke, 'stroke-width': strokeWidth, width: size, height: size }
        });
      } else {
        // Fallback: küçük dolu daire ki düzen bozulmasın
        const fb = document.createElement('span');
        fb.style.cssText = `display:inline-block;width:${size}px;height:${size}px;border-radius:2px;background:currentColor;opacity:0.25`;
        ref.current.appendChild(fb);
      }
    } catch (e) {
      // ikon render edilemezse uygulama akışını bozma
    }
  }, [name, size, stroke, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, flexShrink: 0 }} />;
};

/* ========================================================================
   DATA LAYER (localStorage abstraction)
   v0.2'de Firestore'a geçince sadece bu blok değişecek
   ======================================================================== */
const STORAGE_KEY = 'hoteluter_v01';

const db = {
  _read() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  _write(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  },
  _ensureCollection(name) {
    const data = this._read() || {};
    if (!data[name]) data[name] = [];
    this._write(data);
    return data[name];
  },
  list(collection) {
    const data = this._read() || {};
    return data[collection] || [];
  },
  get(collection, id) {
    return this.list(collection).find(x => x.id === id);
  },
  add(collection, obj) {
    const data = this._read() || {};
    if (!data[collection]) data[collection] = [];
    const newObj = { ...obj, id: obj.id || `${collection}_${Date.now()}_${Math.random().toString(36).slice(2,7)}` };
    data[collection].push(newObj);
    this._write(data);
    return newObj;
  },
  update(collection, id, partial) {
    const data = this._read() || {};
    const items = data[collection] || [];
    const idx = items.findIndex(x => x.id === id);
    if (idx === -1) return null;
    items[idx] = { ...items[idx], ...partial };
    this._write(data);
    return items[idx];
  },
  delete(collection, id) {
    const data = this._read() || {};
    const items = data[collection] || [];
    data[collection] = items.filter(x => x.id !== id);
    this._write(data);
  },
  getMeta(key) {
    const data = this._read() || {};
    return data._meta ? data._meta[key] : undefined;
  },
  setMeta(key, value) {
    const data = this._read() || {};
    if (!data._meta) data._meta = {};
    data._meta[key] = value;
    this._write(data);
  },
  getOtel() {
    const list = this.list('otel');
    return list[0] || null;
  },
  setOtel(obj) {
    const data = this._read() || {};
    data.otel = [{ ...obj, id: obj.id || 'otel_main' }];
    this._write(data);
  }
};

  }

  // Mevcut tahsilatlardan hesapId'si olmayanları varsayılan kasaya bağla + hareket düş
  const hesaplar = db.list('hesaplar');
  const varsayilanKasa = hesaplar.find(h => h.tip === 'kasa') || hesaplar[0];
  const varsayilanPOS  = hesaplar.find(h => h.tip === 'pos')  || varsayilanKasa;
  const varsayilanBanka= hesaplar.find(h => h.tip === 'banka')|| varsayilanKasa;

  const eskiTahsilatlar = db.list('tahsilatlar').filter(t => !t.hesapId);
  eskiTahsilatlar.forEach(t => {
    // Ödeme yöntemine göre uygun hesabı seç
    let hedefHesap = varsayilanKasa;
    if (t.odemeYontemi === 'kredi-karti') hedefHesap = varsayilanPOS;
    else if (t.odemeYontemi === 'havale')   hedefHesap = varsayilanBanka;
    db.update('tahsilatlar', t.id, { hesapId: hedefHesap.id });

    const varOlanHareket = db.list('hesapHareketleri').find(h => h.tahsilatId === t.id);
    if (!varOlanHareket) {

      db.add('hesapHareketleri', {
        hesapId: hedefHesap.id,

        tahsilatId: t.id,
        transferId: null,
        olusturmaTarihi: t.olusturmaTarihi || new Date().toISOString()

    }
  });

  db.setMeta('seeded_v02_hesaplar', true);
};

  { v: 'USD', l: 'Dolar',    symbol: '$',  locale: 'tr-TR' },

  { v: 'GBP', l: 'Sterlin',  symbol: '£',  locale: 'tr-TR' }
];
const PARA_BIRIMI_INFO = (v) => PARA_BIRIMI_OPTS.find(p => p.v === v) || PARA_BIRIMI_OPTS[0];

// Otelin ana para birimi (raporlar, hesap bakiyeleri burada)
const getAnaParaBirimi = () => {
  const otel = db.getOtel();
  return (otel && otel.anaParaBirimi) || 'EUR';
};

// Bir tutarı belirli para biriminde formatla
const fmtMoney = (amount, currency) => {
  const cur = currency || getAnaParaBirimi();
  const info = PARA_BIRIMI_INFO(cur);
  try {
    return new Intl.NumberFormat(info.locale, {
      style: 'currency',
      currency: cur,
      maximumFractionDigits: 2
    }).format(Number(amount) || 0);
  } catch (e) {
    return `${info.symbol}${(Number(amount)||0).toFixed(2)}`;
  }
};

// Geriye dönük uyumluluk: fmtTL artık ana para birimini formatlar

};
const _writeKurCache = (data) => localStorage.setItem(KUR_CACHE_KEY, JSON.stringify(data));

// Tüm para birimi çiftleri için EUR base'li tablo döner: { EUR: 1, USD: 1.08, TRY: 38.5, GBP: 0.84 }
const fetchKurlar = async () => {
  try {
    const url = 'https://api.frankfurter.app/latest?from=EUR&to=USD,TRY,GBP';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const rates = { EUR: 1, ...json.rates };
    const data = {
      base: 'EUR',
      rates,
      date: json.date,
      fetchedAt: new Date().toISOString(),
      source: 'frankfurter.app (ECB)'
    };
    _writeKurCache(data);
    return data;
  } catch (e) {
    return null;
  }
};

const getKurlar = () => {
  const cache = _readKurCache();
  if (!cache) return null;
  const age = Date.now() - new Date(cache.fetchedAt).getTime();
  return { ...cache, isStale: age > KUR_CACHE_TTL_MS };
};

const getActiveKurlar = () => {

  const cache = getKurlar();

// Kur dönüşüm: from currency → to currency
// rates EUR base olduğundan: amount_in_EUR = amount / rates[from], amount_in_to = amount_in_EUR * rates[to]
const cevirKur = (amount, from, to, kurlar) => {
  if (!amount) return 0;
  if (from === to) return Number(amount);
  const k = kurlar || getActiveKurlar();
  if (!k || !k.rates || !k.rates[from] || !k.rates[to]) return null;
  const amountInBase = Number(amount) / k.rates[from];
  return amountInBase * k.rates[to];
};

/* ========================================================================
   ACCOUNTING HELPERS — hesap bakiyesi, atomik tahsilat+hareket, transfer
   ======================================================================== */
const getHesapBakiye = (hesapId) => {
  return db.list('hesapHareketleri')
    .filter(h => h.hesapId === hesapId)
    .reduce((s, h) => s + Number(h.tutar || 0), 0);
};

// Hesabın kendi para birimi
const getHesapParaBirimi = (hesapId) => {
  const h = db.get('hesaplar', hesapId);
  return (h && h.paraBirimi) || getAnaParaBirimi();
};

// Hesap bakiyesini ana para birimine çevir (kurla)
const getHesapBakiyeAna = (hesapId) => {
  const ana = getAnaParaBirimi();
  const pb = getHesapParaBirimi(hesapId);
  const bakiye = getHesapBakiye(hesapId);
  if (pb === ana) return bakiye;
  const cev = cevirKur(bakiye, pb, ana);
  return cev != null ? cev : null;
};

const getRezervasyonOdenen = (rezervasyonId) => {
  return db.list('tahsilatlar')
    .filter(t => t.rezervasyonId === rezervasyonId)
    .reduce((s, t) => s + Number(t.tutarAna != null ? t.tutarAna : t.tutar || 0), 0);
};

// Tahsilat ve karşılığı hesap hareketini birlikte yarat
// KURAL: tahsilatın paraBirimi == hesabın paraBirimi olmalı
// hesap hareketi hesabın kendi para biriminde tutulur
// tutarAna (ana para birimi karşılığı) sadece raporlama/rezervasyon bakiyesi için hesaplanır
const addTahsilatWithHareket = (tahsilat, kullaniciId) => {
  const hesap = db.get('hesaplar', tahsilat.hesapId);
  if (!hesap) throw new Error('Hesap bulunamadı');
  const ana = getAnaParaBirimi();
  const hesapPB = hesap.paraBirimi || ana;
  const tahsilatPB = tahsilat.paraBirimi || hesapPB;

  // Para birimi uyuşmazlık kontrolü
  if (tahsilatPB !== hesapPB) {
    throw new Error(`Bu hesap ${hesapPB} cinsinden, ödeme ${tahsilatPB} cinsinden yapılamaz. Uygun para birimindeki hesap seçin.`);
  }

  const tutarOrij = Math.abs(Number(tahsilat.tutar) || 0);
  // tutarAna: rezervasyon bakiyesinden düşmek için ana para birimine çevir
  let kur = 1;
  let tutarAna = tutarOrij;
  if (tahsilatPB !== ana) {
    if (tahsilat.kur && Number(tahsilat.kur) > 0) {
      kur = Number(tahsilat.kur);
      tutarAna = tutarOrij * kur;
    } else {
      const cev = cevirKur(tutarOrij, tahsilatPB, ana);
      if (cev !== null && cev > 0) {
        tutarAna = cev;
        kur = tutarAna / tutarOrij;
      } else {
        throw new Error('Kur bilgisi yok. Önce ayarlardan kur güncelleyin veya manuel kur girin.');
      }
    }
  }

  const t = db.add('tahsilatlar', {
    ...tahsilat,
    paraBirimi: tahsilatPB,
    kur,
    tutar: tutarOrij,        // orijinal para biriminde
    tutarAna,                // ana para biriminde (rezervasyon bakiyesi için)
    olusturmaTarihi: new Date().toISOString(),
    olusturanId: kullaniciId
  });
  const rez = tahsilat.rezervasyonId ? db.get('rezervasyonlar', tahsilat.rezervasyonId) : null;
  // Hesap hareketi HESABIN para biriminde — tahsilatPB === hesapPB olduğu için tutarOrij kullanıyoruz
  const aciklamaText = (rez ? `Tahsilat · ${rez.rezervasyonKodu}` : (tahsilat.aciklama || 'Tahsilat'))
    + (tahsilatPB !== ana ? ` (≈ ${tutarAna.toFixed(2)} ${ana} @ ${kur.toFixed(4)})` : '');
  db.add('hesapHareketleri', {
    hesapId: tahsilat.hesapId,
    tarih: tahsilat.tarih,
    tutar: tutarOrij,
    paraBirimi: hesapPB,
    tip: 'tahsilat',
    aciklama: aciklamaText,
    rezervasyonId: tahsilat.rezervasyonId || null,
    tahsilatId: t.id,
    transferId: null,
    olusturmaTarihi: new Date().toISOString()
  });
  return t;
};

// Tahsilat sil — bağlı hareketi de sil
const deleteTahsilatWithHareket = (tahsilatId) => {
  const hareketler = db.list('hesapHareketleri').filter(h => h.tahsilatId === tahsilatId);
  hareketler.forEach(h => db.delete('hesapHareketleri', h.id));
  db.delete('tahsilatlar', tahsilatId);
};

// Tahsilat güncelle — eski hareketleri silip yeniden oluştur
const updateTahsilatWithHareket = (tahsilatId, partial) => {
  const old = db.get('tahsilatlar', tahsilatId);
  if (!old) return null;
  const merged = { ...old, ...partial };
  const hesap = db.get('hesaplar', merged.hesapId);
  if (!hesap) throw new Error('Hesap bulunamadı');
  const ana = getAnaParaBirimi();
  const hesapPB = hesap.paraBirimi || ana;
  const tahsilatPB = merged.paraBirimi || hesapPB;

  if (tahsilatPB !== hesapPB) {
    throw new Error(`Bu hesap ${hesapPB} cinsinden, ödeme ${tahsilatPB} cinsinden yapılamaz.`);
  }

  const tutarOrij = Math.abs(Number(merged.tutar) || 0);
  let kur = 1;
  let tutarAna = tutarOrij;
  if (tahsilatPB !== ana) {
    if (merged.kur && Number(merged.kur) > 0) {
      kur = Number(merged.kur);
      tutarAna = tutarOrij * kur;
    } else {
      const cev = cevirKur(tutarOrij, tahsilatPB, ana);
      if (cev !== null && cev > 0) {
        tutarAna = cev;
        kur = tutarAna / tutarOrij;
      } else {
        throw new Error('Kur bilgisi yok. Önce ayarlardan kur güncelleyin.');
      }
    }
  }
  // Eski hareketleri sil
  const hareketler = db.list('hesapHareketleri').filter(h => h.tahsilatId === tahsilatId);
  hareketler.forEach(h => db.delete('hesapHareketleri', h.id));
  // Tahsilatı güncelle
  const final = { ...merged, paraBirimi: tahsilatPB, kur, tutar: tutarOrij, tutarAna };
  db.update('tahsilatlar', tahsilatId, final);
  const rez = final.rezervasyonId ? db.get('rezervasyonlar', final.rezervasyonId) : null;
  const aciklamaText = (rez ? `Tahsilat · ${rez.rezervasyonKodu}` : (final.aciklama || 'Tahsilat'))
    + (tahsilatPB !== ana ? ` (≈ ${tutarAna.toFixed(2)} ${ana} @ ${kur.toFixed(4)})` : '');
  db.add('hesapHareketleri', {
    hesapId: final.hesapId,
    tarih: final.tarih,
    tutar: tutarOrij,
    paraBirimi: hesapPB,
    tip: 'tahsilat',
    aciklama: aciklamaText,
    rezervasyonId: final.rezervasyonId || null,
    tahsilatId: tahsilatId,
    transferId: null,
    olusturmaTarihi: new Date().toISOString()
  });
  return final;
};

// Hesaplar arası transfer — aynı para biriminde
const yapTransfer = ({ kaynakId, hedefId, tutar, tarih, aciklama }) => {
  if (kaynakId === hedefId) throw new Error('Kaynak ve hedef hesap aynı olamaz');
  if (!Number(tutar) || Number(tutar) <= 0) throw new Error('Tutar 0\'dan büyük olmalı');
  const kaynak = db.get('hesaplar', kaynakId);
  const hedef = db.get('hesaplar', hedefId);
  if (!kaynak || !hedef) throw new Error('Hesap bulunamadı');
  const kPB = kaynak.paraBirimi || getAnaParaBirimi();
  const hPB = hedef.paraBirimi  || getAnaParaBirimi();
  if (kPB !== hPB) {
    throw new Error(`Kaynak (${kPB}) ve hedef (${hPB}) farklı para birimlerinde. "Döviz Transferi" kullanın.`);
  }
  const transferId = `tr_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  const aciklamaText = aciklama || `Transfer: ${kaynak.ad} → ${hedef.ad}`;
  db.add('hesapHareketleri', {
    hesapId: kaynakId, tarih,
    tutar: -Math.abs(Number(tutar)),
    paraBirimi: kPB,
    tip: 'transfer-cikis',
    aciklama: aciklamaText,
    rezervasyonId: null, tahsilatId: null, transferId,
    olusturmaTarihi: new Date().toISOString()
  });
  db.add('hesapHareketleri', {
    hesapId: hedefId, tarih,
    tutar: Math.abs(Number(tutar)),
    paraBirimi: hPB,
    tip: 'transfer-giris',
    aciklama: aciklamaText,
    rezervasyonId: null, tahsilatId: null, transferId,
    olusturmaTarihi: new Date().toISOString()
  });
  return transferId;
};

// Döviz Transferi — farklı para birimleri arası
// Kaynaktan kaynakTutar (kaynak para biriminde) çıkar
// Hedefe hedefTutar (hedef para biriminde) girer
// Kullanıcı kuru kendi belirler (sahada bozdurma örneğin)
const yapDovizTransfer = ({ kaynakId, hedefId, kaynakTutar, hedefTutar, tarih, aciklama }) => {
  if (kaynakId === hedefId) throw new Error('Kaynak ve hedef hesap aynı olamaz');
  if (!Number(kaynakTutar) || Number(kaynakTutar) <= 0) throw new Error('Kaynak tutar 0\'dan büyük olmalı');
  if (!Number(hedefTutar)  || Number(hedefTutar)  <= 0) throw new Error('Hedef tutar 0\'dan büyük olmalı');
  const kaynak = db.get('hesaplar', kaynakId);
  const hedef  = db.get('hesaplar', hedefId);
  if (!kaynak || !hedef) throw new Error('Hesap bulunamadı');
  const kPB = kaynak.paraBirimi || getAnaParaBirimi();
  const hPB = hedef.paraBirimi  || getAnaParaBirimi();
  // Aynı para biriminde de döviz transferi yapılabilir mi? Mantıken sadece farklı olunca anlamlı,
  // ama kısıtlamayalım — kullanıcı isterse aynı para biriminde de farklı tutarlarla transfer yapabilir
  // (hesap düzeltme amacıyla). Yine de uyarı için engellemiyoruz.
  const efKur = Number(hedefTutar) / Number(kaynakTutar); // 1 kPB = ? hPB
  const transferId = `dvz_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  const aciklamaText = aciklama
    || `Döviz Transferi: ${kaynak.ad} (${Number(kaynakTutar).toFixed(2)} ${kPB}) → ${hedef.ad} (${Number(hedefTutar).toFixed(2)} ${hPB}) @ ${efKur.toFixed(4)}`;
  db.add('hesapHareketleri', {
    hesapId: kaynakId, tarih,
    tutar: -Math.abs(Number(kaynakTutar)),
    paraBirimi: kPB,
    tip: 'doviz-transfer-cikis',
    aciklama: aciklamaText,
    rezervasyonId: null, tahsilatId: null, transferId,
    kur: efKur,  // referans için
    olusturmaTarihi: new Date().toISOString()
  });
  db.add('hesapHareketleri', {
    hesapId: hedefId, tarih,
    tutar: Math.abs(Number(hedefTutar)),
    paraBirimi: hPB,
    tip: 'doviz-transfer-giris',
    aciklama: aciklamaText,
    rezervasyonId: null, tahsilatId: null, transferId,
    kur: efKur,
    olusturmaTarihi: new Date().toISOString()
  });
  return transferId;
};

// Transfer sil (her iki hareketi)
const silTransfer = (transferId) => {
  const hareketler = db.list('hesapHareketleri').filter(h => h.transferId === transferId);
  hareketler.forEach(h => db.delete('hesapHareketleri', h.id));
};

/* ====== GİDER İŞLEMLERİ ======
   Gider = hesaptan çıkan para. Kategori bazlı.
   KURAL (tahsilat ile simetrik): gider.paraBirimi == hesap.paraBirimi olmalı.
   Yani: USD borç ödeyeceksen USD hesabından öde. Mantıken hesap fiziksel
   olarak o parayı tutuyor — başka PB'den para çıkamaz.
   tutarAna alanı ana para birimi karşılığını saklar (raporlama için).
*/
const addGiderWithHareket = (gider, kullaniciId) => {
  const hesap = db.get('hesaplar', gider.hesapId);
  if (!hesap) throw new Error('Hesap bulunamadı');
  const ana = getAnaParaBirimi();
  const hesapPB = hesap.paraBirimi || ana;
  const giderPB = gider.paraBirimi || hesapPB;

  // Para birimi uyuşmazlık kontrolü
  if (giderPB !== hesapPB) {
    throw new Error(`Bu hesap ${hesapPB} cinsinden, ödeme ${giderPB} cinsinden yapılamaz. Uygun para birimindeki hesap seçin.`);
  }

  const tutarOrij = Math.abs(Number(gider.tutar) || 0);
  if (tutarOrij <= 0) throw new Error('Tutar 0\'dan büyük olmalı');

  // Ana para birimi karşılığı (raporlar için)
  let kur = 1;
  let tutarAna = tutarOrij;
  if (giderPB !== ana) {
    if (gider.kur && Number(gider.kur) > 0) {
      kur = Number(gider.kur);
      tutarAna = tutarOrij * kur;
    } else {
      const cev = cevirKur(tutarOrij, giderPB, ana);
      if (cev !== null && cev > 0) {
        tutarAna = cev;
        kur = tutarAna / tutarOrij;
      } else {
        throw new Error('Kur bilgisi yok. Önce ayarlardan kur güncelleyin veya manuel kur girin.');
      }
    }
  }

  const g = db.add('giderler', {
    ...gider,
    paraBirimi: giderPB,
    kur,
    tutar: tutarOrij,
    tutarAna,
    olusturmaTarihi: new Date().toISOString(),
    olusturanId: kullaniciId
  });

  const kat = gider.kategoriId ? db.get('giderKategorileri', gider.kategoriId) : null;
  const aciklamaText = `Gider · ${kat?.ad || 'Kategorisiz'}` + (gider.aciklama ? ` · ${gider.aciklama}` : '')
    + (giderPB !== ana ? ` (≈ ${tutarAna.toFixed(2)} ${ana} @ ${kur.toFixed(4)})` : '');
  db.add('hesapHareketleri', {
    hesapId: gider.hesapId,
    tarih: gider.tarih,
    tutar: -tutarOrij,
    paraBirimi: hesapPB,
    tip: 'gider',
    aciklama: aciklamaText,
    rezervasyonId: null,
    tahsilatId: null,
    transferId: null,
    giderId: g.id,
    olusturmaTarihi: new Date().toISOString()
  });
  return g;
};

const deleteGiderWithHareket = (giderId) => {
  const hareketler = db.list('hesapHareketleri').filter(h => h.giderId === giderId);
  hareketler.forEach(h => db.delete('hesapHareketleri', h.id));
  db.delete('giderler', giderId);
};

const updateGiderWithHareket = (giderId, partial) => {
  const old = db.get('giderler', giderId);
  if (!old) return null;
  const merged = { ...old, ...partial };
  const hesap = db.get('hesaplar', merged.hesapId);
  if (!hesap) throw new Error('Hesap bulunamadı');
  const ana = getAnaParaBirimi();
  const hesapPB = hesap.paraBirimi || ana;
  const giderPB = merged.paraBirimi || hesapPB;

  if (giderPB !== hesapPB) {
    throw new Error(`Bu hesap ${hesapPB} cinsinden, ödeme ${giderPB} cinsinden yapılamaz.`);
  }

  const tutarOrij = Math.abs(Number(merged.tutar) || 0);
  let kur = 1;
  let tutarAna = tutarOrij;
  if (giderPB !== ana) {
    if (merged.kur && Number(merged.kur) > 0) {
      kur = Number(merged.kur);
      tutarAna = tutarOrij * kur;
    } else {
      const cev = cevirKur(tutarOrij, giderPB, ana);
      if (cev !== null && cev > 0) {
        tutarAna = cev;
        kur = tutarAna / tutarOrij;
      } else {
        throw new Error('Kur bilgisi yok. Önce ayarlardan kur güncelleyin.');
      }
    }
  }
  // Eski hareketleri sil
  const hareketler = db.list('hesapHareketleri').filter(h => h.giderId === giderId);
  hareketler.forEach(h => db.delete('hesapHareketleri', h.id));
  // Güncelle
  const final = { ...merged, paraBirimi: giderPB, kur, tutar: tutarOrij, tutarAna };
  db.update('giderler', giderId, final);
  // Yeni hareket
  const kat = final.kategoriId ? db.get('giderKategorileri', final.kategoriId) : null;
  const aciklamaText = `Gider · ${kat?.ad || 'Kategorisiz'}` + (final.aciklama ? ` · ${final.aciklama}` : '')
    + (giderPB !== ana ? ` (≈ ${tutarAna.toFixed(2)} ${ana} @ ${kur.toFixed(4)})` : '');
  db.add('hesapHareketleri', {
    hesapId: final.hesapId,
    tarih: final.tarih,
    tutar: -tutarOrij,
    paraBirimi: hesapPB,
    tip: 'gider',
    aciklama: aciklamaText,
    rezervasyonId: null,
    tahsilatId: null,
    transferId: null,
    giderId: giderId,
    olusturmaTarihi: new Date().toISOString()
  });
  return final;
};

/* Bir rezervasyonun segmentlerini döndürür.
   Bölünmemiş rezervasyon → tek "sanal segment" olarak döner (ana odaId + giris/cikis).
   Bölünmüş rezervasyon → segmentler array'i döner.
   Bu sayede tüm görüntüleme/çakışma kodu segment-uniform çalışır. */
const getOdaSegmentleri = (rez) => {
  if (rez.segmentler && rez.segmentler.length > 0) {
    return rez.segmentler.map((s, idx) => ({ ...s, _segIdx: idx, _isMulti: rez.segmentler.length > 1 }));
  }
  return [{
    odaId: rez.odaId,
    odaTipiId: rez.odaTipiId,
    girisTarihi: rez.girisTarihi,
    cikisTarihi: rez.cikisTarihi,
    _segIdx: 0,
    _isMulti: false
  }];
};

/* Tarih çakışması kontrolü — segment-aware
   excludeRezId: aynı rezervasyonun başka segmentlerini ignore et (kendi içinde çakışma sayılmaz) */
const checkOverlap = (odaId, giris, cikis, excludeRezId = null) => {
  const aktifDurumlar = ['onay-bekliyor', 'onayli', 'giris-yapildi', 'cikis-yapildi'];
  return db.list('rezervasyonlar').some(r => {
    if (r.id === excludeRezId) return false;
    if (!aktifDurumlar.includes(r.durum)) return false;
    const segs = getOdaSegmentleri(r);
    return segs.some(s =>
      s.odaId === odaId &&
      !(cikis <= s.girisTarihi || giris >= s.cikisTarihi)
    );
  });
};

const AuthContext = createContext(null);
const useAuth = () => useContext(AuthContext);

const AuthProvider = ({ children }) => {
  const [user, setUser] = useState(() => {
    const saved = localStorage.getItem('hoteluter_session');
    return saved ? JSON.parse(saved) : null;
  });

  const login = (kullaniciAdi, sifre) => {
    const users = db.list('users');
    const u = users.find(x => x.kullaniciAdi === kullaniciAdi && x.sifre === sifre && x.aktif);
    if (!u) return { ok: false, msg: 'Kullanıcı adı veya şifre hatalı' };
    setUser(u);
    localStorage.setItem('hoteluter_session', JSON.stringify(u));
    return { ok: true };
  };
  const logout = () => {
    setUser(null);
    localStorage.removeItem('hoteluter_session');
  };
  const refreshUser = () => {
    if (!user) return;
    const fresh = db.get('users', user.id);
    if (fresh) {
      setUser(fresh);
      localStorage.setItem('hoteluter_session', JSON.stringify(fresh));
    }
  };
  const can = (modul, action = 'goruntule') => {
    if (!user) return false;
    if (user.rol === 'superadmin') return true;
    return !!(user.permissions && user.permissions[modul] && user.permissions[modul][action]);
  };

  return (
    <AuthContext.Provider value={{ user, login, logout, refreshUser, can }}>
      {children}
    </AuthContext.Provider>
  );
};
